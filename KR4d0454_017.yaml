front:
  text: 靜修先生文集卷之十七
  hash: sha256:88bf1694a2d257f657bb21d17c09b60efb1f1090ca46fb38127fa898095ea620
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_017-1a}
body:
  text: 墓表孝子田君墓表鳴呼天地至大萬物至衆而人與一物於其間其爲形至微也自天地未生之初極天地旣壞之後前瞻後察浩乎其無窮人與百年於其間其爲時無幾也其形雖㣲而有可以參天地者存焉其時雖無幾而有可以與天地相終始者存焉故君子當平居無事之時於其一身之微百年之頃必愼守而深惜惟恐其或傷而失之實非有以貪夫生也亦將以全夫此而巳矣又其當大變處大節其所以參天地者以之而立其所以與天地相終始者以之而行而回視夫百年之頃一身之微曾何足爲輕重於其間哉然其所以參天地而與之相終始者皆天理人心之所不容巳而人之所以生者也於此而全焉一死之餘其生氣流行於天地萬物之間者凜千載而自若也使其舎此而爲區區歳月筋骸之計而禽視鳥息於天地間而其心固巳死矣而其所不容已者或時發焉則自視其身亦有不若死之爲愈者是欲全其生而實未甞生欲免一死而繼以百千萬死嗚呼可勝哀也哉先人嘗手録金源貞祐以來致死於其所天者十餘人而武臣戰卒及閭巷草野之人爲多而予毎覽之未甞不始焉而慚愓若不自容中焉而感激爲之泣下終則毛骨竦然若有所振勵者故爲之訪諸故老揆諸小說攷其姓里增補而詳記之惟恐其事之不傳也近復得清苑孝子田君焉貞祐元年十二月十有七日保州䧟盡驅居民出而君及其父與焉是夕下令老者殺卒聞命以殺爲嬉未及君之父者十餘人而君乃惻然欲代其父死遂潛往伏其父於下以兩手據地俛而延頸以待之卒舉火未暇省閱君項腦中兩刀而死夜及半幸復蘇後二日令再下無老㓜盡殺時君巳以藝𬒳選而行次安肅矣聞其父死謂人曰我當逃歸葬吾父遂歸求父尸而得之負以渉河水傷脛至血出發母塜下尸而塞之乃還而衆不之覺也嗚呼此其所以爲孝子者歟其子道章資高爽喜讀書而遺山元公陵川郝公皆嘗爲詩文以美之雅善予一日狀其父之孝行訪予於易水之上且曰古者孝友雖庶人得書於史官而先人之孝行若是生無一命之旌而死遂無一言之託以傳不朽爲先人子者亦何以自立於丗今謀所以表夫墓惟先生實哀之言巳泣數行下嗚呼予尚忍不銘君也哉君諱喜丗爲保之清苑人其仕至佩金符其壽四十三其卒則歳乙未閏七月考彦妣喬母兄嘉其所娶實望族韓有婦德鄉里稱爲韓孝婦其壽八十六男女三道昭道章裴氏女寅孫五温良㳟儉讓曾孫四元亞季德昌銘曰嗚呼蹈斧鉞而致死猶淵氷之歸全其死者藐焉此身之微其全者浩乎此心之天有纍雖丘匪丘者存有圎雖石匪石惟文百丗之下有旌古而勵俗者必名此曰孝子之原過者其式之孰獨匪人洺水李君墓表君諱守通字彦誠姓李氏其先中山人五丗祖從太宋靖國間仕至朝散大夫因宦游至洺水愛其風土衍沃而占籍焉遂爲洺水人高祖恵明中武舉官武翼大夫同知鄜州節度使曾祖智靜避靖康之亂隱居不仕祖德遷娶刘氏生君之考道元讀書有立志動止以礼年五十即斷家事關白就太一翁受道籙開别第以居娶張氏生二子長曰守進君其次子也君資樂易與物無忤喜施予善談論能言漢唐五季事歷歷如数目前君旣故家且有才具故素爲州郡所推擇及金人南徙囯朝遷諸州工人實燕京而􅊢邢洺者即舉君授符而緫之後以將作如制数䝉寵賚已而不樂曰是身可役役於是邪遂委符歸郷里歳時㑹耆老故人相與娯樂享年九十以至元九年十月二十有八日无疾而逝葬武道鎭先塋娶景州處士刘從直之女婦道母儀郷邑以為法先君二十年年五十八卒生男子三人長全福季全安皆早丗中子曰全祐女子一人適千户任某𥘉東瀛先生䔥錬師公弼有重名所與游皆當丗名士今上在濳邸屡以安車徴之至則待以客礼其前後條對惟及治道而所薦舉亦皆天下之選蓋竒特之士厭於丗故而以方外自隱者也君以全祐㓜有羸疾不任婚宦乃命棄家師事之今以斈識清修先賜號觀妙大師再加純一眞人深爲上及皇太子之所眷顧焉二十五年春純一遣使持君丗次行事請於予曰予家自朝散公起家兩丗貴顯後漸卑下爰至先考方圖逺紹先業㝷又棄去而以樂終今全祐老矣雖兩被璽書而奉祠宫觀之秩甚隆復不能追及先丗又旁無支屬可以後吾親者思所以慰吾親惟有旌紀丘隴之一路耳平昔願交吾子凡以是故今敢以是累吾子吾子其母辭嗚呼吾純一託跡玄虚旣老而能不忘其親雖其天彞之秉自不容巳然予於是益信東瀛爲竒特之士而其門人之所觀感而得之者固如是乃爲叙其始終且系之辭以識吾純一之悲焉曰天開兮地闢惟寅兮生人寅之所生兮有吾之先幾億万傳兮延及此身如根而榦兮如幹而枝前旣有承兮後當有滋惕焉傷哉兮而息於斯稟丗短長兮厥𥘉不齊不滑以人兮乃天之爲稽伯陽之所崇兮曰生與慈彼綿綿其不輟兮由叚干而膠西物與道以爲體兮今舎此其孰依惟純一之超詣兮知反本之當悲渺黃鶴之翩翩兮過故墟而徘徊撫長楸而太息兮勤金石以告哀處士冦君墓表君冦氏諱靖字唐臣祖禹父曽耕於中山安喜陘號質行家君始力斈爲士當金遷國汴梁河朔内附一軍分戍鎭定間開府屈君爲掾時約法未定刑賞惟意君所論一如平丗師出將吏額士卒輸虜獲爲常君獨不取惟受田募十户爲屯以食汴梁旣破衣冠内徙者大爲歉所苦君見之必盡力以恤天下旣定中書令耶律楚材奏䟽遣使分諸道設科選士中者復其家終身擇䟽通者補郡縣詳議君旣中選仍署之縣君曰向從事紛紛中思濟人且自全耳今兵已戢獲奉先人遺體守墳墓足矣尚復仕邪乃謝去隱居敎授安勤樂儉日爲琴数弄讀易一編即所居自號松溪翁其子三爲關洛州郡恒得以佳山水恱親籃輿孫擁琴尊僮隨徜徉嘨詠超然物外自樂也君安重善下澹然無縁飾重以經渉丗故斈易見消長理故一意事内於凢得䘮欣戚不乆留中甞偶爲浮薄軰所陵侮旁觀者怒欲前擊君止之曰彼智不及相知故然是宜哀矜家有私口二三君嘆曰物理有代謝是旣服勤我乆子孫宜不忍更隷之也悉毀劵釋去年八十以至元甲戌秋九月三日無疾而終葬先塋東北以其配蒲水魏氏祔子男二長元亨㓜失明精於術數次元德早以文學名天下相國廉希憲薦事今上濳邸從征江南自眞定宣撫司諮議歷懷孟京兆判官遷知陜州再加同知岳州緫管轉同知京畿都漕運使改燕南河北提刑按察副使今擢爲兩浙都轉運使爲政廉易姚左丞樞楊參政果王承旨磐皆作詩以美之女一嫁同里著姓甄氏孫男六曰某某女三皆嫁仕族因及拜君床下甞與聞其平生重以其子請宜銘以表君曰閱衰或興象消息也感彼更迭無終極也寧開灵臺爲樂國也早勤耋歌時所職也彼蜚冲天伸此屈也有繁孫枝本惟一也體君所學銘以易也墓銘武強尉孫君墓銘戊申夏六月丁巳武強尉孫君以疾卒臨卒䟽其子繼賢等曰吾以先丗澤生有四幸若等可勿忘金崇慶末河朔大亂凡二十餘年數千里間人民殺戮幾盡其存者以户口計千百不一餘而吾與存焉一幸也其存焉者又多轉徙南北寒飢路隅甚至髠鉗黥灼於臧獲之間者皆是也而吾未甞去墳墓且獲尉郷縣焉二幸也當其擾攘時侵陵逼奪無復紀序而吾四妺一弟俾皆以禮婚嫁今皆成家若與丗不相與者三幸也平居非強宗丗亂受陵暴自其分爾而吾乃爲郷人所推遂得挺身樹柵保千餘家凡族黨姻戚皆頼以安全四幸也吾挾是以没上有以承先人下有以遺若等無恨矣後卒十日附葬范原之先塋後葬三十有八年繼賢始狀其爵里且誦所遺言請予銘予按君諱善眞定武強人祖泰父成皆業農稸粟甞遇歳凶貸飢者不責償歳癸酉我師畧河間君始以所保柵附大城以降得賜官修武校尉佩銀符後以功遷忠翊金亡始罷諸鎭兵令各封賞有功者遂署本縣尉以終娶李氏周氏張氏子男四人長即繼賢奉訓大夫知深州次繼勲行軍百户繼忠本縣諸軍奥魯長官繼貞都元帥府知事獨繼忠爲張氏子餘皆周出也周年今九十康寧女四人皆適令族孫男九人弼承信校尉行軍千户佩銀符輔行軍百户餘尚㓜銘三章章八句天開洪爐若有所試彼紛枯荄秪以滋熾謂天不仁此獨何存吁此何希彼獨爾繁紛如仆僵君身堂堂蕩焉崩離君閭熈熈吾幸所資一柵之力微有相之區區何及凉風至止繒纊不儲哀哀履霜兒寒何需有興吾詩孰不欷歔匪有所興一尉奚書易州太守郭君墓銘金貞祐主南渡而元軍北還是時河朔爲墟蕩然無統強焉弱陵衆焉寡暴孰得而控制之故其遺民自相吞噬殆盡間有豪傑之資者則天必誘其衷使聚其郷鄰保其險阻示以紀律使不相犯以相守望卒之事定而後復業凡今所存非其人則其人之子孫也嗚呼盖亦無幾矣而向之所謂豪傑者後皆眞擁雄城而爲大官其子孫或沿襲取將相凡其宗族故舊與同事者亦皆布列在位享富貴之樂而其所頼以存及其子孫則爲之臣民而服其役出租賦而禄之彼亦非幸也蓋天以是報其功人以是報其力僅適其平而巳易之蔡國張公柔則當時開壁於易山諸砦者君其女兄子也君諱弘敬字仲禮易之定興人曾祖安仁祖儀皆業農考彦成以醇謹勤力爲蔡公所倚任甞攝行元帥事君性警敏美姿容讀書善射蔡公器之復以女妻焉丁未授束鹿長庚戌遷易州太守壬子改完州易人以善政請於是復爲易州時官制未立諸侯得自辟署曰長曰太守皆從一時之制云以甲寅三月十日卒以是月二十一日葬於河内之兆子男一人奉議大夫謙即夫人張氏出也後三十年謙泣涕來請曰謙不幸早孤今思所以報吾親欲得先生長者一言以銘其墓託以不朽庶幾少慰人子之心乃拜旣許又拜予迫於禮文謹且備而終銘之銘曰生物爲心乃厭其蕃自㳙㳙而洪河洪河滔滔沃之焦山曾不思造物之艱難顧兹方慘而有忻茁然碩果孰靳天心可觀史氏命凡胡甚不仁斬首曰級書多是勤抑不知取賞于一時之所私事者乃所以受罰于千萬丗公共之天孰不知忌此而獨使道家爲知言易山峩峩昔誰壁門易山之民今誰子孫爲斯人之婿也爲斯人之子也爲易州者固宜斯人兹實其墳郭君夫人張氏墓誌銘夫人諱文婉字麗卿姓張氏蔡國武康公柔之子年十有五嫁郭氏是爲故攝行元帥事彦成之婦故易州太守弘敬之妻今奉議大夫謙之母也夫人之母毛氏金大興尹王翛然之外孫賢而好禮故夫人生而有儀則時蔡公開國燕趙間隱然古方伯如郭氏皆所自署者夫人旣嫁能抑抑敬戒其舅姑夫子上下咸曰宜嫁十有五年而夫亡夫人復能以禮自將綱紀家政内而養老撫孤使䘮祭婚宦皆以時外而事母夫人病盡憂至三刲股肉以進癰潰則親爲吮之無難色又三十年以至元二十一年五月二十三日以疾卒春秋六十以後五月一日合祔于河内夫氏之墓謙以狀如右請銘夫銘葬非古也婦人綂於夫者特銘則尤爲非雖然有則舉之古今人子之心所同然者以是則爲宜且瘞之將誌其藏非以表白也雖婦人亦宜銘曰觀法于坤隂敎之師婉彼夫人秉是壼彞於赫公族莫敢我夷姑得而婦夫得而妻及茲孤惸毅然有守哀哀良人母恤爾後姑曰予婦兒曰予母屬曰予主以左以右盛忘其貴憂安其勤士難其兼婦乃有人宜壽以樂鈞其報施虧之又虧孰主張是彼將有特自獻其天其天維何河内之原得從以藏魄没其寧幽文象德匪事著明新安王生墓銘新安王綱居母䘮以哀毀致疾繼而其父病作而綱竟以憂終其師容城先生爲銘其墓其辭曰禮之未制也人或徑情人之未知也禮有失平生制禮之後爲學禮之人不俯就之而夭禍是嬰如九原之可作將聲言以責生雖然出繼有嗣終養有兄生没其寧事有過厚薄俗可驚吾當作銘靜修先生文集卷之十七
