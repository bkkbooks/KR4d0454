front:
  text: 劉君夢吉天資卓軼早歲讀書屬文落筆驚人既又涵浸義理充廣問學故聲名益大以肆裕宗皇帝方毓德青宫聞其賢以贊善大夫召至京師未幾辭以親老歸養居數歲朝廷尊仰徳誼拜集賢學士又以疾辭踰年遂不起春秋纔四十有二縉紳惜之門生裒集詩文得數百篇右轄張公子有篤故舊之義且哀其無後將鋟木傳需僕為序僕與君同侍從春坊相從非一日嘗以事過保定君適居母憂衰絰中留連願接為半日留頗訝君形體癯瘁須髮頒白意其哀毁而然不謂一别遽成永訣其悵惘為何如也若夫君之辭章閑婉冲澹清壯頓挫理融而旨逺備作者之體自當傳之不朽庸何序為姑述梗概如此君諱因夢吉其字自號靜修云東平李謙序靜修先生文集目録卷之一
