body:
  text: 辭白雲二章五言古詩韓魏公祠仙臺黃金臺經古城馮瀛王吟詩臺張燕公讀書堂龍潭名飲山亭西山池上勸飲女蘿生松枝有大如天地孤雲雜著集首陶句晨起書事丁丑五月二十八日偶書游天城游源泉㑹飲山中玉溪精廬隱仙谷游雲水菴題歳寒亭泛舟西溪喜雨以雨我公田分韻得雨字雪花酒分韻得如字種松詠梅白蓮玉簪瓊花圖八月十七日望白馬篇翟節婦詩併序卷之二五言古詩郭翁詩併序友善堂詩送文子周使江西九日登洪崖有道士居此今二十年不睡矣游龍宫獨酌寄宋生三月二十二日同仲韞飲北溪分韻得却字蜀葵寓意有懷行家園藥畦種芋登聖泉菴秋晚豋西山沙溝二詠漱霞巖飛泉亭九日攜諸生登西山六華峯書堂谷晏坐寓意二首呉山夜雪圖重游北溪分韻得暉字燕歌行月下獨酌代來使答淵明四皓二首嚴光答樂天問三首李伯堅宣慰荆南併序幽禽送劉校書回李從事北上送郝仲常游北嶽植榴學東坡小圃五詠枸𣏌地黃甘菊薯蕷黃精卷之三和陶和九日閑居和歸田園居五首和乞食和連雨獨飲和移居二首和還舊居和九月九日和飲酒二十首和有㑹而作併序和擬古九首和雜詩十一首和詠貧士七首和詠二䟽和詠三良和詠荆軻和讀山海經十三首卷之四七言古詩桃源行明妃曲塞翁行武當野老歌感秋思古人之不可見也飲後西山登荆軻山薛稷雙鶴㓜安濯足圖采菊圖歸去來圖雪翠軒山中飲山亭雨後巫山圖李賀醉吟後賦赤壁圖陳氏莊采石圖金太子允㳟唐人馬宋理宗書宮扇併序續十二辰詩渡白溝登鎭州龍興寺閣過易州登西樓瘍醫劉茂之詩卷乙亥十月往平定奔外舅郭判官䘮早發土門宿故關書所見范寛雪山荆南送橘食筍送寇長卿同知岳州卷之五七言古詩三月三日許天祥置酒東城飲仲誠椰瓢熈明殿古墨宋度宗元章論書帖霸陵圖友人送枳木丸送徐生還鄂併序明河秋夕圖趙生水墨虎美人仲誠家藏張蔡公石女剪製香奩絶巧持以求予詩金太子允㳟墨竹阿寅百晬盠吾王翁畫像併序張元帥寳刀山行見馬耳峯雪浪石王君奉命賑濟彰德過予求詩同仲實南湖賞蓮醉中走筆明逺堂賞蓮醉賦玉簪緝熈殿硯宋理宗宋徽宗賜周準人馬圖雪翠軒觀太寧火南溪行煙霞觀雲巢松白鴈行宋高宗題李唐秋江圖卷之六雜言觀雷溪游郎山挂書牛角圖浙江潮圖清江曲先天漆硯詩併序示孫諧半丗宿田家卷之七五言律詩除夕晚上易臺登武陽郷郡南樓懷古蒲城道中夏夜重游源泉張氏别墅書堂旅夜三首生日虞帝廟二首竒村道中城南有客早行白菊水亭夏日野興二首秋望雜詩早發濡上偶書重渡滹沱恒山樓登鎭州陽和門辛巳中秋旅亭獨坐文章一身周邵上塜送東海相士寄答祖丈贈答徐生憶金坡道院過唐水望堯山哭張之傑宋道人八十詩哀郭勸農寒夜閱竇氏名方感范女郷人王母九十哀徐生眼醫詩卷禇母節孝詩卷寄彦通頥齋張先生挽卷與先奉直府君同住金太學山中憶故人何太夫人壽二首送尹宰夢採松脂及甘菊鸚鵡過奉先種杞移甘菊採野苣食苽白秋日張監院過酒令觀藥爐自戲二首旅夜送友生名醫張國綱挽卷送成判官盧學士按察江東郭判官按察廣右楊子忠緫管福州登保府市閣烏古論顯之母夫人挽章劉仲文挽章併序簜尊宋祕監索賦寄子東太守示張源宣慰孫公慶七十詩嘉甫從親王鎭懷孟卷之八七言律詩春隂秋日有感多病日午偶成湖上十月朔展省後登古城有感道士孫伯英故居併序過郷縣西方古故居併序登雄州城樓夢先隴宿玉泉村先父甞欲卜隱于此外家西園李花入山晩眺山中月夕惡鳥五月二十三日登樓曉出西塘良辰南樓野亭㑹飲三首淺酌夢鎭州潭園先父舊隱過鎭州井陘淮隂侯廟二首讀漢高帝紀易臺秋夕大風有感盆池水燈方鏡西䆫有懷記夢併序捲簾偶作高亭放歌自適老岸丗上幾葉萬古老大山石人生夏日即事冬日午䆫馬酒平昔冬日次人韻中秋人情次韻答張夢符侍郎卷之九七言律詩有客雨夜現前上塚桃花菊夏日幽居二首夏日飲山亭午睡新晴醉梨送人官浙西九日客至贈趙丈八十詩併序九月晦日過鎭州宿趙徴士皇極道菴寄張之傑黃精地黃合釀名以地仙酒席上分賦二杯二首張氏西園示彩麟除夕秋郊薔薇酒送董巨濟尋親賈氏溪堂望易京七月九日往雄州水門菴答或者以所註孫子見示二首溪光亭看雨避暑玉溪山飲江漢白郷先生漢韓太傳嬰墓玉柱雙清香對菊西湖玉乳峯積雨溪光亭小憇都山劉丈九十詩卷秋夜憫旱過徐橋宿龍宮過東安趙宋先塋秋夜洪元宫明日擬到天城哭王之才編修張仲賢宣慰淮東過予山中臨别贈詩白海青城樓待雨憇謁山寺唐張忠孝山亭故基武陽故臺次韻答范陽郭生登武遂北城卷之十七言律詩定興文廟枯杏復花其尹求詩縣君奉議君故治訾相士詩卷寄彦通癸酉大雨次人韻次韻答河間趙君玉寄次韻答王之才付阿山誦水北道館與客㑹飲野亭晨坐野興郭太守提舉松江新秋放歌雙清堂遺址反垂柳短吟玉簪爆栗示有寄宿郷僧致公房哭申也秋霖贈韓道人海南鳥贈司馬道士春日游山㑹飲北山次韻答趙君玉登中山北城題贈郄道人詩卷暮春山游新曆千户喬侯挽卷宿華陽臺飲聞雞臺留題山房西山雅㑹次韻憫雨宿趙山人房有懷有懷樓上白蒲何太夫人生日次韻劉尚書尊號禮成貧士故人見訪山中淶陽李丈九十夀登高有感送人官呉中孫沁州哀挽卷之十一五言絶句明珠穴二首滴水龕石潭春日愼獨毀譽偶書夢中作觀化四皓圖石鼎聮句圖白樂天琵琶行圖百蝶圖子期聽琴圖夢題村舎壁上己卯正月三日村居雜詩五首屏上草蟲四首螳螂蝸牛螻蛄螽斯飲山亭雜花卉八首牡丹芍藥薔薇萱草夜合酴醾木槿蜀葵看雪絶句出花商方爵盆池偶書二首筭盤吕洞賔畫像鴈圖史處士挽章飲山亭獨坐二首偶成溪橋歩月圖題山水扇頭二首内一首六言卷之十二七言絶句臘盡讀史評試筆二首山中客夜抱陽南軒喜雨書事六首九日九飲擬横渠元日十詠體山行銅雀瓦硯春曉以杖畫雪偶成仙人圖二首春暮講學而首章二首講八佾首章二首講周而不比章講人之生也直章驕吝講求仁得仁章二首一元新居二首今月採柏圖採藥堯民圖四首豳風圖三首觀梅有感山家溪上偶書西郊夏日早秋春盡寒食道中行藥有感故園寒食山家宿山寺感事廢園記夢己卯九月二十八日夢過先妣墓得詩覺而忘其第三句因足成之己卯元日二首庚辰元日二首下山三首戲判游山詩卷三首漫記七首草亭睡起寒食出郭即事卷之十三七言絶句冬曉可菴許田棄瓢圖二首癸酉書事米元章雲煙疊嶂圖二首宋理宗南樓風月横披二首題枯木怪石圖探春酬寫眞者夢中題吟風亭壁題秋景扇頭月下金太子允㳟墨竹二首游飲山亭二首宿山村里社圖二首曽點扇頭二首燕居圖理西齋成幽人圖二首郭氏家山圖書李渤聮德高蹈圖五首秋山平逺圖郭熈山水卷憶飲山亭晝睡客來啼鳥郝生知林州謝處士載月圖送琴客還池州五首早起大暑絶句偶書山泉即事睡起田孝子詩卷朱孝子割股詩卷二首鼔城龍湫讀史偶書雲山晩景圖書田舎壁煑茶龜蓮圖祖愚菴家藏畫冊二二首敗荷野鴨風柳牧牛讀史漫記梅雀扇頭春雲出谷横披見梅狂生名吾山亭宿洪崖觀絶句北䆫看雪秋煙疊嶂圖次人韻二首卷之十四七言絶句書事五首登樓絶句雪嶺遇雨寫眞詩卷三首漫題顔曽二首雜詩五首梁甫吟偶讀漫記二首道境感興七首畫猿山行遇雨華山圖邯鄲欹枕圖天命夜坐即席賦燈花瓶聲二首霜落山寺早起落花答友人見寄中山道中次人望雨韻李伯時馬中秋無月答問目執其兩端章高卧圖孫尚書家山水卷三首對棊夷皓聞角題宋理宗詩卷後勉齋憃齋跋遺山墨跡題崔氏雪竹海棠二軒王君願縱私屬詩卷陶母剪髮横披王治中請蠲免回題孫氏永慕圖賀廉侯舉次兒子寄楊晉州二首萬壽宫館舎陳雄州止善堂詩卷朱君挽章踈齋二首李臨城哀挽字仲温長卿兒子百晬二首卷之十五樂府水調歌頭念奴嬌二首玉漏遲鵲橋仙二首木蘭花三首菩薩蠻四首清平樂五首人月圎二首太常引三首風中柳西江月二首南卿子二首朝中措臨江仙二首喜遷鶯卷之十六碑中順大夫彰德路緫管渾源孫公先塋碑銘澤州長官叚公墓碑銘懷孟萬户劉公先塋碑銘大元明威將軍後衛親軍緫管李公先塋碑銘大元故正議大夫禮部尚書王公神道碑銘清苑尹耶律公遺愛碑卷之十七墓表孝子田君墓表洛水李君墓表處士寇君墓表墓銘武強尉孫君墓銘易水太守郭君墓銘郭君夫人墓誌銘新安王生墓銘卷之十八記馴䑕記櫝蓍記麟齋記輞川圖記退齋記饕餮古器記何氏二鶴記歸雲菴記高林重修孔子廟記游高氏園記種德亭記鶴菴記卷之十九序趙徴士集註隂符經序内經類編序篆隷偏傍正譌序莊周夢蝶圖序送郝季常知潁州序送翟判官序送張仲賢宣慰淮東序静華君張氏墨竹詩序賜杖詩序都山老人九十詩序壽史翁百歳詩序廉公恵更名序古里氏名字序徐生哀挽序田景延寫眞詩序中祀釋奠儀序李公勉復𥘉名序卷之二十說唯諾說唯諾後說張濳名說憃齋說遂𥘉亭說道貴堂說皇甫巽字說王景勉名字說少中李公名字說嘉氏子字說銘王孝女旌門銘併序友松軒銘併序贊神農畫像贊王允中眞贊退翁眞贊郭安道眞贊書畫像自警祝文己卯春釋菜先聖文告峨山龍湫文祭文祭楊待制文祭參知政事王彦才文祭張御史文祭郷丈王利甫文哀辭玉田楊先生哀辭併序卷之二十一書上宰相書答田尚書書答何尚書書與王經畧書答張推官書答王判官書䟽王治中請趙君玉䟽請趙敎授就師席䟽靈陽觀鳩糧䟽雜著節彖武遂楊翁遺事書示瘍醫讀薬書雜記二條敘節婦賈韓卷二十二題跋書太極圖後書康節詩後跋懷素藏眞律公二帖墨本後書王維集後書高允圖後跋魯公祭季明姪文眞蹟後書王子端草書後題婁生平鈒摸本後書遼金以來諸人辭翰後跋朱文公傑然直方二帖眞蹟後静修先生文集目録終
