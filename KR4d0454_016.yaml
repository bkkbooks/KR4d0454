  text: 靜修先生文集卷之十六
  hash: sha256:8501c8e43f76b8eee41b0642060949504fabeaea22120949dbf8070a5c643353
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_016-1a}
body:
  text: 碑中順大夫彰德路總管渾源孫公先塋碑銘中統元年今天子即位草昧一革古制寖復及至元改元則建官立法幾於備矣獨御史臺未立於是今彰德總管孫公公亮慨然以為言不報五年以言者益衆始立之故首以公為監察御史屢有所彈舉天子以硬目之尋出簽山東東西道提刑按察司事臺薦其所行知大體遷山北遼東道副使既而有今命焉子始識公於鎮州於其言論風㫖巳得其所謂良御史者及其子拱與子交則又得其出處之詳者如此然於其名位赫著子孫蕃衍則疑其必有發之者而尚未及知也一日公使拱持書抵子曰先公以末丗之孤裔奮然為起家之始祖使公亮輩得有所沿襲凡以豫曾大父及大父勤德利物之所致以隱不仕今巳不可得而考其迹矣而先公則資沉鷙豪宕重然諾好施豫年十六七巳有志於功名值金真祐之變即欲應募為兵其親或難之因逃去謁西京師謀年以驍勇得近幸時金主南遷謀年帥欲有所奔問而難其人公感激請行見金主於真定得報歸往復二千里甫七日及西京內附國朝所置守帥馬侯熟其膽略表授義軍千户尋復董平山府甲工從軍潞州之役力出其伯父成族兄公政於俘虜鳯翔之役太宗詔從臣分誅居民違者以軍法論輒嘆曰誠能脫衆人死實不愛一身况主上見問必有以對而未必死邪遂盡匿已所分者河南之役汴既降仍不聽居民自出日餓死不可計遂請於大帥速不歹以渾源名族如御史雷氏同知均州樊氏張具瞻馬正卿王仲賢土祿楊玉者數十家而出且護而歸之鄉里先夫人杜氏亦嚴正有法平山府有妄告工人變者皆力為營救之賴以全活者甚衆此皆見之太常許君靖所録行實及鄉先賢之所撰紀而先塋下棺之碑則無以銘之惟有以待乎子之言以信於後人也按孫氏丗為州之橫山人公之曽大父某娶何氏四子慶祐慶文慶元祿和慶文則公之大父也娶趙氏有婦德二子威平平早丗威即公之考也夙巧慧少出入戰陳每患丗之甲胄不堅壽其婦兄杜伸則考工記所謂燕人能為函者因密得其法且能創蹄筋翎根别為之太宗親射之不少貫寵以金符故其從征邠乾諸州也見其攻拔不避矢石帝勞之曰汝縱不自愛獨不為甲胃惜乎又命諸將衣其所進甲目之曰汝等熟所愛重諸將各以意對帝皆不之許曰能扞蔽尓以與我國家立功名者非此人之甲邪顧無以之對者何也復以錦衣錫之前後所領平山安平諸工人皆俘虜之餘殆少生意數為表給衣廩子女以勸之諸工人至今感之如父母年若干終於平陽河南懷州順天諸路工匠都總管帝聞為嗟恨久之杜氏年八十八下及五丗孫疾公率其子拱擏振等諸孫謙諧誼等以問見公佩金虎符拱擏皆佩金符曰吾家起寒微今一門貴盛但當竭忠勤以報國家爾言竟卒嗚呼當大變故夫人之與氣運而升降者以人視之非必盡有所以致之者而其豫奪之間又未必盡得其平也疑若一出於偶然而巳抑不知人之所見者以一丗為終始固不能如天之所見者之久且逺也豫固知孫氏之有以發之者也然而公未老事業尚未既而拱有才氣謙既以能丗其業而奏隸東宫而諧亦頴悟豫他日又可以考其淺深厚薄於此也銘曰昔龍之山有晦而淪必孫氏之先蓋有嗟其屈者謂天道之或愆今曄其華賁及丘原亦有嗟者謂賦豫之或偏彼嗟者愚不究其終而不探其源孰馭龍山游萬物巔渺下視乎神川歷百丗而循一環不輊不軒而得夫造物者之權玄鐡符握黃金色寒翠屏雷列瀚海雲翻有物蕩盡再造坤乾有惻天心莫救其然孰其庇之孰其翼之於此時而保全乘此時而騰騫孰其誘之孰其相之人皆嗜殺我獨愓焉惟山西之名御史曰雷默與劉雲郁乎相輝一代人門惟將作君武臣桓桓有子如公復與雷劉之子而驄馬聮翩相彼根株有此蔓延窮天地物極天地年又安有不定之天夏蟲疑水孰大其觀後之嗟者示此銘言澤州長官假公墓碑銘公諱直字正卿姓假氏丗為澤州晉城人少英偉有識慮甲戌之秋南北分裂河北河東山東郡縣盡廢兵凶相仍寇賊充斥公乃奮然興起率鄉黨族屬為約束相聚以自守及天子命太師以王爵領諸將兵來略地豪傑並應公遂以衆歸之事定論功行賞分土傳丗一如古封建法公起澤應得澤遂佩黃金符為州長官草餘年方天下初集國家以澤衝隘别置守兵久之山民不勝其橫往往自棄為群盜公上言願罷守兵請身任諸隘保其無虞朝廷從之群盜遂息公見澤民避兵多未復乃藉其舍業於其親戚鄰人户末約曰俟主還與之户如故分出賦如業是以民多還集且户額少而丁業優故賦輕而易足兵後屢饑其還民無産者復不能自生公為出粟食之不使流散時新法藏亡甚嚴鄉民不一一曉知澤當諸軍往來之衝病俘多亡留民家者若以藏論藉沒從坐保伍為空公乃豫為符劵為官使收養以俟諸軍物色者後凡留俘家皆得以不藏釋州民𬒳俘他郡者公多為購得之兵死暴露者公必為收瘞之當大變之餘兵氣未巳生意未復而澤風翕然巳為樂土矣公又大修廟學堂筵齊廡庖㕑惟備仍割負郭良田千畒購書萬卷以給之州人李俊民在金時以明經為舉首後國朝亦𬒳纍徴賜號莊靖先生蓋有道之士也是時方避地河南隱約自處公迎而師之凡澤之名士散在四方者亦必百方招延必至而後巳故不五六年州之學徒通經預選者百草有二人時今上在濳邸有以公興學禮士聞者嘉之特命提舉本州學校事未拜而公卒年六十五子紹隆嗣後卅五年紹隆遣其子倪從事李蕡持公行狀及莊靖所作州學記造某所蕡贊倪代紹隆拜曰請先生銘先公豫按傳記𥘉澤俗淳朴民不知學至宋治平中明道程先生為晉城三年諸鄉皆立校暇時親至為正兒童所讀書句讀擇其秀異者為置學舍糧具而親教之去邑才十餘年服儒服者已數百人由是盡宋與金澤恆號稱多士故公雖不學起行間然其生長見聞必有起其趨向者故當用武之際獨能以立學為先敦勸修舉使前賢數百年之遺風不遂廢墜謂倪乃祖用是當銘倪應曰諾謹拜銘之賜公考諱順妣趙氏夫人衛氏張氏馬氏李氏子男四紹隆今以遷轉法行加武略將軍移知葭州國初凡守親王分地者一子當備宿衛紹先宿衛王府紹祖早卒紹宗未仕女一適裴氏孫男六倪儀信傑佐仁女四長早卒次適何氏郭氏李氏卒於甲寅六月三月而葬葬建興鄉沙城里先塋公平生朝京師一朝王二王寵錫甚渥初太師承制封拜時授潞州元帥府右監軍云銘曰天荒澤方庸試程氏邦家幾時春風百丗生為後民為幸巳多矧嗣守土公如幸何以富以教循序兼盡公焉取斯承此餘潤公生閔勞謂樂斯驕閲其堂中皤然蓋公公生用武謂如貔虎跡其嬉游泮水優柔魯城絃歌不以兵壞既安既寧宜爾多賴不逺公阡大刻銘詩於乎澤人勿替爾思懷孟萬户劉公先塋碑銘至元十一年詔大丞相伯顔領諸將兵伐宋有志之士咸喜乘此際㑹思效計勇以自奮是時今懷孟萬户劉公潭以丗襲上百户攝行千户事將七百人屬今尚書古丞史公格由西道進是年渡江以攻下一堡生得將二人攻沙市先登加忠顯校尉遷總把明年以攻下十餘堡生得將一人攻潭州先登加昭信校尉明年以略定㧕賔雍三州生得將一人攻靜江先登賜銀符加武略將軍為真千户明年以攻下鬱林化二州略定廉欽高雷四州生得安撫使二人將四人加武德將軍明年以從平章政事阿里海牙過海略定瓊州降大將六人賜金符加宣武將軍遷總管守瓊州又以略定萬安軍攻下黎洞一百草所降大將三人賜虎符加顯武將軍明年又以略定吉陽昌化二軍諸洞寨加明威將軍為萬户兼安撫使鎮海招討使守瓊凡九年以民夷既定來朝京師遂加廣威將軍授今職移鎮嚴州國朝兵制尚質其將帥皆以所統户數名故有百千萬户三等其符節有金銀虎符亦三等又於百千之間置總把千萬之間置總管以為遷拜旌賞之漸其許佩符節子孫襲職二事則惟將帥得之故將帥在今為美官而至佩虎符為萬户則又為最貴矣公自以階襲至此過家上冢圖報光澤以近丗多刻石先塋叙先丗名跡如古先廟碑者乃再拜以事狀來請按顯曾祖考諱德安隱居不仕妣張氏楊氏顯祖考祁陽府君諱寶姿幹竒偉氣略過人當金主貞祐棄河朔徙都汴時有張甫者據信安武仙者據真定皆為金守易定之間大為所擾而蔡國張公柔開府滿城凡州縣來歸者皆承制封拜令各城守相為應援以禦敵乃以祁州為祁陽府令左副元帥賈公輔行帥府祁陽以府君為行府右監軍仙軍嘗攻深澤新樂二縣府君將兵往救大敗仙軍二縣之人賴以安全後仙將柴姓者襲取冀州府君從張賈二公往救之時天大雪深三尺與柴軍遇張公陷雪馬倒為柴所逼府君以一矢斃之柴軍遂潰而張公獲免上府君功授宣武將軍祁陽府通判再遷總管後以年老致仕優游鄉里享年若干妣李氏楊氏姜氏顯考蒲隂府君諱丗鼎以䕃補蒲隂尉後以良家子從軍特授上百户戍亳嘗以主帥命將五千人攝帥府事攻荆山身先士卒不避矢石竟被創而廢享年若干妣齊氏張氏三丗皆葬祁州蒲隂之北鄉百長原其宗支别有圖列碑隂銘曰自比而南天開元基遼漸燕垂金奠淮夷厭分裂邪孰撤藩籬白鴈一舉橫絶天池彼瘴海兮藏鯨鯨巨鬛如城兮尾如旗安得壯士兮驅而守之矯惟劉公熊羆虎貔奮髯一呼黎山為摧強黎是讎罷民之依被祥雲瑞日固為可喜不有風霆孰行天威方挽強是賴而一字奚施我聞瓊人劉公之思相彼甘棠根株在兹乃今燕趙如唐山西或一矢斃敵赴主將之難或百戰致命合荆山之圍蓋三丗受射而後出益竒語彼瓊人有來京師道出於祁黃蕉丹荔當一酹劉公先塋之碑大元明威將軍後衛親軍總管李公先塋碑銘至元十七年丞相伯顔以舊所領諸將中四人見皇太子曰此皆臣收江南時渡江水戰攻城略地為國家盡力命臣所親見者是時天下事聽皇太子處置乃命四人者母外補可使將侍衛親軍仍賜食殿中今致仕後衛總管清苑李公其一也公便騎射材趫過人雖自幼以宦家子從軍為將校然每喜與士大夫游且其居近豫故聞其勳爵行事也習壬戌憲宗南征將兵隸史忠武公至巴州能却敵攻諸柵先登至崇慶卒遇敵江峽奪戰艦中統元年今上北征復將兵隸忠武至吉河三年李璮叛將兵隸張勇烈公圍濟南日夜與賊戰獲賊衆十餘人明年詔河南統軍略地荆南將勇敢分攻堅柵多所克拔九年圍襄陽十一年丞相伐宋為衙前將至鄂州部所將引戰艦入江至郢州夜奪浮橋攻沙陽新城二柵先登渡江將勇敢水軍首與敵遇取旗奪戰艦甲仗既渡能盡却所當守岸兵復入江順流追奔至白虎山明年取真州能退敵焚其舟時敵將夏貴水軍陳巢湖勢不可犯能破其堅奪旗鼓戰艦取常州將勇敢先登拔其城又略定蘇秀二州此其功憲宗時中書右丞闊公子清牒為百户中統二年璽書遷總把錫以銀符至元十一年軍職例加散官授敦武校尉十三年遷武略將軍錫以金符為千户十五年加武德將軍再加宣武將軍為總管十七年遷明威將軍為後衛親軍總管後例減總管復為千户凡六𬒳璽書再授符節憲宗南征時詔賞白金一鋌北征時今上賞錦衣一襲圍濟南時親王為大將者賞白金半鋌渡江時丞相賞馬一匹白金一鋌此其爵賞下濟南出誤為賊所汙者數十人死拜衛率讓其同列先巳最後補此其行車公知豫習聞是謂豫曰凡此皆藉先丗今思報效而先塋近在縣之臨水里考品制得樹碑願列先丗各行使子孫知仁祐今日者有所自皇考諱義大元開國時從楊甲立柵保南甲為李丙所害乃慨然以義動衆共殺丙以復所事讎其衆遂推為長後大帥山赤丹略地燕南乃以衆歸之朝廷賜以璽書金符俾就領其衆為權府如古留後天下既定乃浮沉里社年八十二終請書是為銘豫按司馬遷自序多及巳蓋史家變例故公勳爵亦宜附見以榮先丗公諱仁祐字安卿男一人曰元襲公職女一人嫁簽行樞密院事王公之子守銘曰吁其好還卧榻不容白鴈載飛于彬益雄有翼而從咸第其功南至于江淮北至于沙漠東至于青齊西至于巴庸惟公生平預折四衝當酹以告其先曰疇昔生男不愧矢蓬留後復讎天亦義之報不在躬彼欒幽業龜螭而豐銘以賁之庸壽厥封大元故正議大夫禮部尚書王公神道碑銘公本東萊王氏其大父曰溫娶周氏生永福多才有逺識見金末亂避地徙燕慕陶朱公為人用其道以富天下既定遂列名莊聖皇太后封邑籍中後被教主管都城課稅比五品京官實為宛平王氏始祖娶某氏生公中統𥘉選良家子入侍東宫公甫弱冠儀觀甚偉氣宇粹然太保劉公秉忠見而器之引以與選服勤守恪漸致近密有詔皇太子裁决天下事凡時政所急民瘼所係知無不言是時宫職未備而湯沐分邑地廣事繁當有攸屬乃拜公正議大夫工部尚書行本位下隨路民匠都總管及詔立東宫官屬為家丞蓋令署帝鄉貴臣故以公為二又别置儲用司掌貨幣出納以公廉悉特令兼之前後所蒞咸以精飭事治獲嘉奬後以病辭職不許辭不巳逾年乃許仍令食祿如故復上言既不事事而食祿臣心誠所未安又不許面陳其不可至於再三方許至元二十六年皇孫出鎮懷孟天子重其事選及侍東宫舊臣老成練逹者護之以行公乃行陛辭天子目之良久以為得人營幕所在軍政肅然未幾召還二十八年天子更易大臣一新時政詔求才可用而久不仕者群臣咸舉公拜禮部尚書復以病辭皇太子妃召問曰人皆欲進卿獨求退何也對曰臣見宫庭舊人如臣等輩十去八九臣蒙恩最厚願留侍皇孫備宿衛更直實不忍去聞者莫不嗟勸明年薨問疾給葬故事畢舉既葬詹事張九思曰公從事東宫三十餘年小心愼默無少玷闕而其辭受去就之間風義凜然有可激勵後丗者不可不書其神道冝有碑碑宜得劉某銘其孤鵬持集賢直學士趙孟俯所撰行狀來請公豫所知資孝友為人誠實樂易讀書務躬行不徒事章句其居家教子撫孤婺恤宗族秩然有序銘固無愧公諱倚字輔臣其夫人張氏薊州節度使滋之女九思姊也內助成家其子男二人鵬為長朝列大夫異樣總管府總管秩視九卿鵠讀書未仕女三人長適鷹坊總管韓某之子某次適集賢學士劉遜之子庶次適夫人之族子謹其孫男一人遂𥘉女一人幼其壽五十三其薨之日正月戊申其葬之日二月甲申其所葬在盧師山下銘曰正從惟一是為臣則偉公得依確乎不移初仕東朝曰勤汝嘉允惟帝卿來視豫家身方病休心未職免鶴駕仙游鸞聲未逺帝曰豫孫往藩於懷疇咨家老作傳惟諧還歸幾時乃卿於里難忘本初臣心安此嗚呼忠哉兹惟公墟吉實銘之過者勿驅清苑尹耶律公遺愛碑至元九年五月以工部主事耶律公伯堅為清苑尹後四年八月用臺薦擢同知恩州事公字壽之桓州人氣豪爽有幽燕俠士風其接人雖一無所失而中有裁鑑樂與當丗名士游雖貧乏至典衣延致不少解有御錯縱才昔或薦公規措關陜川蜀財賦詔可之公至為條件利病疏畫出納事治而物安識者稱其能性明决憲司及府有滯獄必檄公乎之公能不以刑得其情而訟者亦以公所理無冤為政不事表襮而民知愛不任刑罰而民知畏作事必為逺計使人得以守其成法而不即壞亂其處巳御下則欲與者避其廉受罰者思其公其為清苑也安肅苦徐水之害訴於大農欲以人力奪水之故道道而東之東則縣之境也其地形有不能遂其迅激之性者而水必終反其故道而其沮洳波蕩壞民田幾千頃彼之害既不得而除而重以其害貽我畚鍤巳興民睨視之莫知計所出公為圖地形指陳利害要農官及郡侯與俱行視以止之縣之西塘水利溉民田甚廣有力者以磑奪之而民無訴所公至為斷理以每歲溉田之餘月分之磑仍聞省部著為定制縣居南北衝每歲為親王大官治供帳於縣西以十月成至明年復撤而新之吏得媒糵其事而至歲費不資公以一廢館舍移其所不足分俸祿以繼之館成而是役絶縣西南衛村多古斥堠溝塹時伏盜其間公為墮其高堙其下而奪其穴焉盜於是息縣舊雜民居而縣之鹽法息錢例當巳有公曰是錢在我不必有公廨在縣不可無遂割之以起廨凡連年和買之不降其直者公至白之執政盡降之凡府之賦縣有不均者公輒曰寧得罪於上而不敢得罪於下必有爭辨得其平而後巳移恩之明年恩人巳刻石頌公又明年清苑之耆老故吏亦思公不忘以豫與公有一日之雅介吾友趙安之請豫紀公之遺愛豫亦樂以循吏為天下勸而又喜邑人能被公之化而不忘其舊官長之賢故次第其民之所以謡公者而為之詩庶其傳之採官以存一邑之風且為他日太史氏之傳循吏者以張本焉鳴呼使邑人歌之野足以為農勸歌之邑足以為吏勸歌之道路聞之恩人又足以致奪公之私怨公早歷臺閣人望其通顯可立致既而獨從外𥙷今又老且病將不能復與功名㑹此在人不能無少難者而公處之裕如使恩人間而歌之以壽公則其沉滯之思雖不待有所慰而後忘而其及人之樂則或因此而長之也其辭曰我行東野有田離離燥焉膏腴彼鄰不知持以囓水孰恤我飢惟耶律公出言若堤奪田於水障水以歸西塘之陂無水旱虞非陂得歲食我惟渠水匪附勢奚捨我趨望公之來使我心休公浚以理渠來舒舒公實水來公實水去田雖我田實公錫與我之德公非惟水故有勢非水微公孰禦縣官渠渠公力所支昔有絲棼今皆畫旗聞公車音吏戒勿嬉旗來揚揚有宫以息彼安其宫我安斯室車不知服子不知力彼盜之穴南據丘隅公行視之荷鍤與俱昔路斯棘化而通途奪田與我奪時與我以耕以穡於以飽我食惟公食持以勞公公曰歸止飽爾羸癃公堂宴深孰公不容天乃私恩奪公于東惟彼東人相戒以化無勞我公我思我公神其相之惟壽康公俾公其來之靜修先生文集卷之十六
