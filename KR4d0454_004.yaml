  text: 靜修先生文集卷之四
  hash: sha256:29dc5f68ea43ac1644537b9598d1fb3633600628e3d5e8cf02e0941f527bec4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_004-1a}
body:
  text: 七言古詩桃源行六王掃地阿房起桃源與秦分一水小國寡民君所憐賦役多慙負天子天家正朔不得知手種桃枝辨四時遺風百丗尚不泯俗無君長人熈熈漁舟載入人間丗却悔桃花露蹤跡曾聞父老說秦強不信而今解亡國畫圖曾識武陵溪飛鴻滅没天之西但恨於今又千載不聞再有漁人迷明妃曲初聞丹青寫明眸明妃私喜六宫羞再聞北使選絶色六宫無慮明妃愁妾身只有愁可必萬里今從漢宫出悔不别君未識時免使君心憐玉質君心有憂在逺方但恨妾身是女郎飛鴻不解琵琶語秪帶離愁歸故鄉故郷休嗟妾薄命此身雖死君恩重來時無數後宫花明日飄零成底用宫花無用妾如何傳去哀絃幽思多君王要聽新聲譜爲譜高皇猛士歌塞翁行塞翁少小壟上鋤塞翁老來能捕魚宋家昔日塞翁行屯田校尉功不如西山瀛海接千里長城又見開長渠要將一水限南北笑殺當年劉六符天敎陂澤養鴈鶩留與金人賦子虚我來郷國覽風土髣髴檛鼔笛嗚嗚胷中雲夢忽巳失酒酣懷古皆平蕪昔年阻水羣盜居塞翁子孫殺欲無至今遺老向人泣前宋監邊無逺圖武當野老歌南陽武當天下稀峯巒巧避山自迷青天飛鳥不可度但見萬壑空煙霏山不知人從太古白雲飛來天作主旌旗明滅漢陽津幾閱東西互夷虜老人住此今百年自言三丗絶人煙往事不聞宣政後初心欲返羲皇前脯鹿爲粮豹爲席竹樹蒼蒼歳寒國天分地拆保無憂怪見北風山鬼泣一聲白鴈巳成擒回望丹梯淚滿襟傳與桃源休避丗武陵不似武當深感秋思古人之不可見也湘絃悠悠阻清音駕車欲往洛水深白榆一葉警河漢萬里碧霄中夜心玉鸞翩翩紛翠羽髣髴機絲隔煙霧瓊枝難得芳華年惟恐流光兩遲暮河傍有星名牽牛此星旣出令人愁明朝再見明河影巳隔人間萬古秋飲後日光射雨明珠璣怒氣鬰作垂天蜺天漿海波吸巳竭倒影徑入黃金巵金巵一傾天宇閑天公愁吐胷中竒海風掀舉催月出吹落酒面浮明輝瓊枝瑞露千萬斛肝腸蕭蕭清欲飢金宫銀闕此何處夜半夢落崑崙西眼中之人素所期赤霜爲袍丹霞衣明星煌煌何太速碧霄悵望白雲低西山西山龍蟠幾千里力盡西風吹不起夜來赤脚踏蒼鱗一著神鞭上箕尾天風泠泠清人肌醉抱明月人間歸嫦娥灑淚不敢語銀河鼔浪霑人衣寄謝君平莫饒舌袖中此物無人知登荆軻山兩山巉巉補天色中有萬斛江聲哀人言此地荆軻館尚餘廢壘山之隈太子西來函關開誰信生兒爲禍胎筆頭斷取江山去巳覺全燕如死灰馬遷尚俠非史才淵明憤丗傷幽懷春秋盗例乆不舉紫陽老筆生風雷遺臺古樹空崔嵬平蕪落日寒煙堆紛紛此丗亦良苦今古燕秦經幾回憂來徑欲浮蓬萊安得魯連同一杯碣石東頭喚羨門六鰲載我三山來薛稷雙鶴胎禽寥廓非人境只許清江見寒影書家筆頭垂露姿一變凌雲更修整前鶴忘機如易馴後鶴昂藏不可羣二鶴相看如有語松下磐石少此人㓜安濯足圖漢家無復雲臺功生平不識大耳公眼中天意鏡中語此身只有扁舟東關東諸公亦英雄百年能辦山陽封歸來老柏號秋風丗事悠悠七十翁乾坤故物兩足在霜海浮雲空復空無刀可斷華太尉有死不爲丕太中丹靑白㡌凜氷雪高山目送冥飛鴻爲問蘇家好兄弟萬古北海誰眞龍長公愛文舉次公愛㓜安盖氣質各以類云采菊圖天門折翼不再舉䄂手四海橫流前長星飲汝一杯酒留我萬古羲皇天廟堂袞袞宋元勲爭信東籬有晉臣南山果識悠然處不惜寒香持贈君歸去來圖淵明豪氣昔未除翶翔八表凌天衢歸來荒徑手自鋤草中恐生劉寄奴中年欲與夷皓俱晚節樂地歸唐虞平生磊磊一物無停雲懷人早所圖有酒今與龐通沽眼中之人不可呼哀歌撫卷聲嗚鳴雪翠軒西山萬古靑未了黛緑鬟雲巳傾倒豈知太虚忽生白怳如厚夜今復曉紫陽僊翁見本根白波開天餘浩渺胸中盤屈此高寒曾夢肝腸倚天表蒼崖飛來天出巧爲護煙嵐翠如掃萬縷塞煙吹不舉靜秀依依見姢好此時先生一開軒平生壁立今玉削脚底游塵軟更紅黒頭擾擾誰爲雄臨風回首三太息安得置此氷壷中西山秀色千萬重一顧可洗浮雲空遥望飛泉駕逺壑中有一路開雙松人間風日不到處來訪軒中雪翠翁山中山中望塔倚天表今得全山如立草不知天地視全山何如一粒江湖渺平生老眼如層挮昨日所爲今兒嬉神功天巧秪如此人力區區能幾爾丗間壯觀徒紛紜堯舜事業猶浮雲飲山亭雨後山如翠浪經雨漲開軒似坐扁舟上西風爲我吹拍天要駕雲帆恣吾往太行一千年一青才遇先生醉眼醒却笑劉伶糟麯底豈知身亦屬螟蛉巫山圖朔風捲地聲如雷西南想見巫山摧江南圖籍二百年一炬盡作江陵灰不知此圖何所得眼中十二猶崔嵬猿聲髣髴餘山哀行雲欲行行復回神宫縹緲望不極乘風御氣無九垓區區雲夢蹄涔爾豈知更有陽雲臺李賀醉吟圖赤虬翩翩渺無聞望之不見矧可親浮丗浮名等濁溷眼中擾擾投詩人心肝未了人間春尨眉尚作哦詩顰太平瑞物不易得昌黎先生掌中珍北風蕭蕭吹野麟千年淚雨埋青雲乾坤清氣老不死舟鳳再來須見君後賦赤壁圖公無渡河歸去來周郎䄂裏藏風雷老狐千年快一擊金眸玉瓜不凡才先生平生兩賦耳江山華髪心悠哉只今畫裏風月笛尚有老驥嘶風哀眼中驚波不西歸玄鶴夜半從天廻曹劉閑氣今何處船頭好在白雲堆陳氏莊陳氏園林千户封晴樓水閣圍春風翠華當年此駐蹕太平天子長楊宫浮雲南去繁華歇回首梁園亦灰滅淵明亂後獨歸來欲傳龍山想愁絶今我獨行㝷故基前日家僮白髮垂相看不用吞聲哭試賦宗周黍離離陳氏先父之外家也金章宗毎遊獵必宿其家淵明謂先父龍山指孟嘉事采石圖何年鑿江倚青壁乞與中原作南北天公老眼如看畫萬里才堪論咫尺蛾眉亭中愁欲滴曾見江南幾亡國百年回首又戈船可憐辛苦磯頭石江頭老父說當年夜捲長風曉無跡古人袞袞去不返江水悠悠來無極只今莫道昔人非未必山川似舊時龍蟠虎踞有時歇月白風清無盡期古人看畫論兵機我今看畫詩自竒平生曾有金陵夢似記扁舟月下歸金太子允㳟唐人馬道人神駿心所憐天人龍種畫亦然房星流光忽當眼徑欲攬轡秋風前漢家金粟幾蒼煙江都筆勢猶翩翩東丹獵騎自豪貴風氣惜有遼東偏天人秀發長白山畫圖省識開元年金源馬坊全盛日四十萬匹如秦州天敎劫火留此幅玉花浮動青連錢英靈無復汗石馬悲鳴眞似泣金僊只今回首望甘泉汾水繁華鴈影邊竒探竟隨轍跡盡兀坐宛在驊騮先人間若有穆天子我詩當作祁招篇宋理宗書宫扇併序杭州宫扇二好事者得之燕市一畫雪夜泛舟一畫二色菊理宗題其背有興盡爲期及晚節寒香之句諸公賦詩子亦同作天津月明啼杜䳌梁園春色凝寒煙傷心莫說靖康前呉山又到繁華年繁華幾時春已換千秋萬古合歡扇銅雀香銷見墨㾗秋去秋來幾恩怨一聲白鴈更西風冠蓋散爲煙霧空百錢韈錦天留在胎禍要鍳驪山宫當時夢裏金銀闕百杯樓前無六月瓊枝秀發後庭春珠簾晴捲天門雪櫂歌一曲白雲秋不覺金人淚暗流乾坤幾度靑城月扇影無情也解愁五雲回首燕山北燕山雪花大如席雪花漫漫氷峩峩大風起兮柰爾何續十二辰詩飢鳶嚇䑕驚不起牛背高眠有如此江山虎踞千里來才辦荆州兎穴爾魚龍人海浩無涯幻境等是杯中蛇馬耳秋風去無跡羊腸蜀道早還家何必高門沐猴舞豚穽雞栖皆樂土柴門狗吠報鄰翁約買神猪謝春雨渡白溝東北天高連海嶼太行蟠蟠如怒虎一聲霜鴈界河秋感慨孤懷幾千古只知南北限長江誰割鴻溝來此處三關南下望風雲萬里長風見高舉萊公灑落近雄才一顯德千年亦英主謀臣史臣強解事枉著渠頭汚吾鼓十年鐡硯自庸奴五載兒皇安足數當時一失渝關路便覺煙雲非我土更從晩唐望沙陀自此橫流穿一縷誰知江北杜䳌來正見海東靑鳥去漁陽撾鼓鳴地中鷓鴣飛滿梁園樹黃雲白草西樓暮木葉山頭幾風雨只應漠漠黃龍府北似愁岡更愁苦天敎遺壘說向人凍雨頑雲結凄楚古稱幽燕多義烈鳴咽泉聲瀉餘怒仰天大笑東風來雲放殘陽指歸渡登鎭州龍興寺閣太行鱗甲揺晴空層樓一夕蟠白虹天光物色驚改觀少微今在青雲中𥘉疑平地立梯磴清風西北天門通又疑三山浮海至載我欲去扶桑東雯華寳樹忽當眼拍肩愛此金僊翁金僊一夢一千載騰擲變化天無功萬象繞口恣噴吐坐令四海皆盲聾千池萬沼盡明月長天一碧無遺蹤我生玄感非象識此眼此臂將安庸海嶽神光埋禹鼎人間詭態何由窮金天月窟爾郷國玉毫萬丈湏彌峯一杯徑欲呼與語爲我返駕隨西風堂堂全趙思一豁江山落落吾心胷中原左界此重鎭形勢髣髴餘兵衝歌舞遺臺土花碧旗幟西山霜葉紅乾坤割裂萬萬古鳥鳶螻蟻誰爲雄滹水悠悠自東注落日渺渺明孤鴻過易州登西樓秋色壓山山欲摧西樓正有詩人來悲歌感慨聊一發萬古抑欎今崔嵬寧山爲有瀛王臺頑癡至今如死灰幽燕勁氣老益壯北山飛翠來吾杯瘍醫劉茂之詩卷錬心如石補天缺鍊心如泥補地裂白蟇正飽丹鳯飢心能竹實亦能鐡乾坤瘡痍今幾年誰家藥籠金石堅千金此方不一試雲山注目秋風前乙亥十月往平定奔外舅郭判官䘮早發土門宿故關書所見風煙全趙平如掌失脚山城猶夢想土門一縷漢時天萬古行人爲誰仰指似勍敵談笑中爲狀羸僕忍寒強當年鼔角如可聞急著清吟和林響逺山宛欲來相迎近山留人屹相嚮或從井底忽登天倚伏已能先想像平生愛山眞惡䜟今日果爲山所網昨朝爽翠擁脩眉最恨高樓負清賞壯懷鬰鬰悶欲絶安得凌風恣吾往天敎石頂放一頭駃若驊騮脫覊鞅山靈努力出竒供只恐先生駕虚枉萬壑霜松動悲嘯極目雲煙埋莾蒼北門形勝護中原辦與姦雄增技癢太行橫絶半九州留在平原幾塵坱何人爲我起六丁嵳峩盡墮天宇朗千年再挽神禹功恍若鴻流開四象范寛雪山老寛胷次無墨汁經營慘淡寒生湏秦川名山古壯哉况復玉立千尺孤安得晨光滿東壁試看龍燭崑崙墟赤塵澒洞天爲爐一丘一壑眞吾廬眼中人物誰氷壷荆南送橘江淮草木少生意今日佳果來何竒枯苗一漑自此見入手即有甘棠詩眼中風露瀟湘姿渺我幽林千樹思只恐江聲撼吾枕相看坐對寒更遲食筍夢廻齒頰風瀟騷幽姿不許霜松高南來蒼玉不盈束已覺飲興翻雲濤詩家胷次自宜此尚嫌煙火湏烹炰想像南風吹萬竹籜龍正恐稱冤號石盆養魚心自苦仰羡鸜鵒雲間巢眼中歳旱土不膏長鑱後慮山無毛退食歸來北䆫夢山巔朱鳳聲嗷嗷送寇長卿同知岳州聞君得官岳樓去我夢巳落江湖濵天下先憂付公等江山之樂當平分荆湖一城百戰得存撫安得人人君岳陽父老宜相賀君是荆州舊幕賔廉荆州治稱第一静修先生文集卷之四
