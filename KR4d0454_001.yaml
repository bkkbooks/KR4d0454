front:
  text: 靜修先生文集卷之一
  hash: sha256:0f4e4eab4e5b4a5a9cb8f4f17d05e5da56f1f84636b40dcc0cc56abac0507791
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_001-1a}
body:
  text: 辭白雲二章白雲凝情兮佩月光白露結彩兮明幽芳衆星皎皎兮水波不揚渺予思之若遇兮耿在目而不忘音容著兮形無方肅予中立兮四無旁子無歸去兮山高水長白雲高飛兮杳不可㝷靈風長往兮聲不在乎幽林皎月東生兮忽西沉玄鶴何逝兮遺之音予思未及兮實懷我心儵萬里兮捐所歆曠同游兮啓雲襟子無歸來兮山幽水深五言古詩韓魏公祠定州古北門作鎭多英竒如何郡學傍獨有魏公碑乾坤極厚大運動物不知堂堂宋三朝斡旋公似之惟公玄黙閒泰山巳四維天宇公之祠元氣非公誰郡人一何愚而於公欲私大者且勿論緒餘猶丗師千年閱古堂誰歌鄭國詩公閱古堂富公有詩裴徊老柏前目送秋鶴飛悠悠五色雲悵望今何歸仙臺碣石來海際西南奄全燕中有學仙臺燕平欲升天燕平骨巳朽遺臺猶相傳雖復生靑松歳乆摧爲煙極目望海波不見三山巓三山巨鰲簪山人蟣蝨然使無不足論信有亦可憐大塊如洪鑪金石能乆堅天地㑹有盡何物爲神仙空山無笙鶴落日下飢鳶今古非一臺浩歎秋風前黃金臺燕山不改色易水無新聲誰知數尺臺中有萬古情區區後丗人猶愛黃金名黃金亦何物能爲賢重輕德輝照九仞鳳鳥纔一鳴伊誰腐䑕棄坐見飢鳶爭周道日東漸二老皆西行養民以致賢王業自此成黃金與山平不救兵縱横落日下荒臺山水有餘清經古城我行常山尾高城墮吾前按轡覽形勢依依見全燕易水開前襟飛狐連右肩遥想豪傑場撫已增慨然薪人過我傍一笑如相憐指城前問予攷古今幾年沉思未及答行歌入蒼煙馮瀛王吟詩臺林壑少佳色風雷有清秋爲問北山靈吟臺何乆留時危亦常事人生足良謀不有撥亂功當乘浮海舟飄飄扶摇子脫屣雲臺游毎聞一朝革尚作數日愁朝廷乃自樂山林爲誰憂視彼昻昻駒柰此汎汎鷗四維旣不張三綱遂橫流坐令蚩蚩民謂茲聖與儔蚩蚩尚可恕儒臣豈無尤不有歐馬筆孰能回萬牛太行千里來瀟灑横中州今朝此登臨孤懷漲巖幽何當剷疊嶂一洗他山羞張燕公讀書堂隂壁下寒泉陽崖隱深洞想像張幽州當年此絃誦遐情納方寸灝露警宵夢旣有眞積功豈無致時用不然起絶學猶當垂後綂濟濟唐開元儒臣相伯仲文雖數燕許名不並姚宋遂令百丗下煙霞抱餘痛㝷幽縱歩貪懷古清歌送緬思白鹿翁眼中見連棟茲山有道氣㑹遇或天縱聊以永今朝白雲不可種盤磴脫交䕃平壇得高岑高岑不可攀哀湍激幽音窮源豈不得爽氣來駸駸靈潤發山骨沮洳下崖隂爲問石上苔妙理誰曾㝷乾坤有乾溢此水無古今下有靈物棲倒影毛髮森東州旱連歳呼龍動雲林顧此百丈潭豈無三日霖爲霖此雖能鞭策由天心日暮碧雲合空山深復深名飲山亭飲人不飲酒千載誰與期頼有此山色我杯時一持西郊逺市井林亭對山暉主人知愛客釀酒無虚時佳客麟鳳然人亦難致之君亭有吾山招飲當不辭西山西山澹無姿中有羲皇前翻思太古人事業何不傳三墳亦何罪丗逺成灰煙紛紛後來人暮死爭朝妍勲名史一䇿學術文千篇古人豈不然後有無窮年惟餘方寸心天地相後先池上今朝好風日出門何所之西城得山多一水揚清漪溪翁指水言此貨天下竒不有磑百區猶當稻如坻擬從陶朱公斷取高陽池累累九洲谷隱隱千石陂食魚素無望觀水今有期所期徧區域不見貧者飢勸飲同類天地中相親理所宜前後億萬年而我生此時前子旣不及後孰能待之同時四海内徧識將無期所識旣無幾賞心又當誰政有賞心人㑹遇亦復希當其㑹遇時豈無事相違今朝好風色不飲君何辭女蘿生松枝女蘿生松枝不及松生年松枝摧爲薪豈知山石堅誰云高山雲曾見天地先人生朝露爾豈止蜉蝣然蕩蕩山海圖悠悠皇極元其間何物無何事無推遷事有古今希逹觀如寒暄君今不逺游自苦良可憐有大如天地有大如天地日夜長乾乾有小如螻蟻營營誰使然我亦形蹟中豈得獨安閑萬物相爲用錯綜盈兩閒如身百骸具少一爲不完有形無虚生豈予獨贅偏森然氣分内旣有不可鐫蝮蛇誰宥之生生亦能延安有人道尊堙滅獨不傳乾乾以爲師餘者一聽天孤雲孤雲生幾時冉冉何所適豈無崑華高路逺嗟獨力徘徊天中央明月爲顔色下有幽棲士歳晏倚青壁朝飲澗下泉暮拂松間石相對澹忘情倒影寒潭碧雜著二首集陶句人生豈不勞終古謂之然孰是都不營早起暮歸眠過足非所欽躬耕非所歎但使願無違甘以辭華軒正爾不可得在已何怨天自古有黔婁被服常不完榮叟老帶索飢寒况當年何以稱我情頼古多此賢善惡苟不應鬼神昧茫然是非茍相形行止千萬端丗路廓悠悠聊且慿化遷居常待其盡任眞無所先詩書塞座外弱子戲我前親戚共一處餘粮宿中田促席延故老斗酒散襟顔聊以永今朝百丗誰當傳晨起書事丁丑五月廿八日蒼星彗明河三月麗朱方兩月忽散落一月留中央下有五星連西近東少張仰面東北隅流星墜彩芒誰令月有癭飄摇及吾䆫湏㬰日東生有星環四旁一星當日中佇視摇晶光自北忽西旋老陽巳榆桑西北雲一絲翠暈揚清芳嫰雲生碧蘚得句聲琅琅俄見雲有魚其大丈許長火繩紛繞之昻然欲飛揚呼友與共觀此境巳茫茫靈樞夢爲病周官夢爲祥寤言札諸闥庸俟知者詳偶書開眼昭昭天無形有痛癢斯人亦安忍斵䘮甘自枉裩中蝨一嚙其死隨翻掌乃知天人間感應如影響游天城逕逺澗隨曲崖深山漸少居然翠一城四壁立如掃天設限仙凡雲生失昏曉平生萬事懶登臨即輕矯山靈知信息風煙乆傾倒顧瞻困能仰汎應習稱好端居得蕭寂逺眺礙孤峭乃知方寸間别有萬物表未湏凌絶頂胷次青巳了游源泉叢祠鬰蒼翠萬古藏清幽泠然石上足不逐蒼波流長風索我御欲舉仍遲留白雲何山來相對亦悠悠㑹飲山中鳴禽變𥘉節白雲思高山笑拊蒼然石爲謝區中縁舉盃屬何人四顧心茫然雲煙互呑吐巖壑如相先人間此幻境過眼成千年山家有酒令飲外可無言玉溪精廬居然山四頽危檻俯晴春川氣生不極翠潤流衣巾林隂起薄暮酒色生微醺歌聲忽落谷驚歸欲飛雲隱仙谷山川含太古風氣如未開中有幽棲人日暮斸蒼苔吾胷素羲皇人丗不可諧此地復何地怳若春登臺山扃掩對峙石徑迷縈回桑麻連水竹屋宇依山崖燕南避丗謡千古知我懷横渠百丗師一區竟相乖知音得元老龍門有遺齋伊川先生上文潞公求龍門庵地書畧曰勝善上方舊址荒廢爲無用之地欲得葺幽居其上爲避暑著書之所唐王龜剏書堂于西谷松齋之名傳之至今某雖不才亦能爲龍門添勝跡于後代爲門下美事賤子孤旅人念此良悠哉於丗豈有望居山亦無媒舉杯對山靈欲去仍徘徊他年要勝跡此駕當招來游雲水菴乘春奮幽濳觀化登丘山哀淙聞逺壑息駕思雲關懇石密松桂結屋深茅管生煙紛漠漠激流散潺潺山石浮壽色澗木榮歡顔覽物有眞意撫節驚循環悠然千載情儼若磐石間眷焉欲晤語古人何當還題歳寒亭西州有佳士種松秋水垠歳寒得所師銘齋豈徒云要知松柏心亦願濯南薰交枝鬰葱蒨喜與萬木群當此摇落中勁節獨排雲雖得後凋知歳寒非所欣泛舟西溪萬山倒蒼浪一葉凌嵳峩嵳峩爲飛舞翠影如婆娑輕隂散雨足淨緑生圎波人間碧海幻老眼青銅磨風雲幾千古辦此雨一蓑溪南有幽人鼔棹前山阿煙深渺無處月色浮松蘿喜雨以雨我公田分韻得雨字壬申秋大水一雨乃孤注九年錙寸積曽未辦朝露陂塘此何日還我滄洲趣夜來雲𥘉作期待一如故旣聞漸成陣尚謂行且住甫寸驚巳狂及犁歎無數平明報三尺感激淚將雨玄功亦雄哉回旋易指顧呼酒欲鯨吞哦詩有神助區區喜與憂豈爲一飽慮雪花酒分韻得如字古人重甘澤雨雪名所居何如千里白斂之寄一壷神物與造化醖釀同機樞夢中聞酒熟天花巳紛如况復吟風亭興來操百觚天地無餘春山澤豈全臞何當一灑之豐年徧寰區収藏有竒功六月天爲鑪冰壷連水鑑千載誰與俱林間有清風此酒不可無種松萬牛來丘山大厦高崔嵬當年誰苦心遺此千歳材手持百松子與之備傾頽殷勤囑造物爲護荒山隈今来見豪末喜溢蒼煙堆十年望根立百年排風雷自此千萬年再見明堂開東家十年計戢戢千頭栽豈不早有望求此良悠哉詠梅燕南舊無梅寒花爲誰芳月色隱清艶幽香竟難藏寸心警殘雪孤根待朝陽只有橫斜參萬里同昏黃白蓮水花離風塵素質更深靜灝露凝幽香皎月散清景誰並絶丗姿澹然水中影青房生苦心秋風逼凉冷安得同愛人共此良夜永玉簪堂隂秋氣集幽花獨清新臨風玉一簪含情待何人含情不自展未展情更眞徘徊明月光泛泛如相親因之欲有託風鬟渺氷輪瓊花圖淮海秀瓊枝獨立映千古遥知辦此初坤靈心亦苦平生勞夢想江煙隔南浦春風不相待回首巳焦土畫圖今見之依稀春帶雨芳心紛巳碎仙葩聚如語瑶臺舊高寒人間此何所翩翩風袂輕幽香暗相許八月十七日望前日中秋節今宵月方圎人間歡賞竟此際吾獨觀吾觀意有在高歌問青天蒼蒼非正色而况此嬋姢去我當逺近相值果正偏徑圎知幾許附麗或空懸旣疑九扇如復昧左右旋有食定何物中黒胡爲然何當凌倒景迫視如弄丸一祛萬古惑如生天地先吾觀意在此餘光何足憐白馬白馬誰家子翩翩秋隼飛袖中老蛟鳴走擊秦㑹之事去欲名留自言臣姓施二十從軍行三十始來歸矯首望八荒功業無可爲將身弭大患報效或在兹豈不知非分常恐負所期非干復讎怨不爲酬恩私偉哉八尺軀膽志丗所希惜此博浪氣不遇黃石師代天出威福國柄誰當持匹夫赫斯怒時事亦堪悲翟節婦詩并序昔金源氏之南遷也河朔土崩天理蕩然人紀爲之大擾誰復維持之者而易之西山乃有婦人曰翟氏年二十餘其夫從軍死於所事出入兵刃往復數百里晝伏夜行以其尸歸負土而葬之旣葬自以早寡無子遭時如此思以義自完乃自决於墓側隣里救而復蘇終始一節今八十餘年矣夫人心之極有丗變之所不能奪者於此亦可以見之予聞之爲作是詩俾其外孫田磐刻之石或百丗之下有望燕山而歌予詩者使翟之風節凜然如在亦庶幾乎呉人河女之章焉兵塵浩無際烈士難自全婦人無九首志欲不二天燕山翟氏女旣嫁夫防邊一朝聞死事健婦增慨然生有如此夫早寡非所憐求尸白刃中負土家山前事去哀益深義盡身可捐無兒欲何爲所依惟黃泉郷隣救引决烈日丹衷懸誰辦節孝翁重賦睢陽賢我昨過其郷山水猶清妍聞風髮如竹飄蕭動踈煙千年吟詩臺峩峩太寧巓爲招馮太師和我節婦篇太寧山有馮道吟詩臺距翟居甫數十里靜修先生文集卷之一
