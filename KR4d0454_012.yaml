front:
  text: 靜修先生文集卷之十二
  hash: sha256:56f19c45550e411b19951a865a886d92fe48ce3b009db8c93a53404965f19188
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_012-1a}
body:
  text: 七言絶句臘盡小雪初晴臘盡時無窮梅柳怨開遲人間不覺春來早只有吾家布𬒳知讀史評記録紛紛巳失眞語言輕重在詞臣若將字字論心術恐有無邊受屈人試筆二首得意好花開易落惱人芳草燒還生亂多治少君知否隂偶陽竒理自明眼花不見羲之俗口快爭言杜甫村我欲鑿山藏此筆高情千古約重論山中客夜鞍馬南州五日程豈知物外有茅亭塵埃暑困人如醉月露夜凉天亦醒抱陽南軒下瞰懸崖老木稠輕風毛髮散凉秋蒼苔白石夢𥘉覺霽月踈雲天欲流喜雨書事六首拍手兒童笑不休笑君前日爲誰憂天公自有甘霖在未管渠儂浪白頭一笑黃河一度清自縁無物盡歡情今朝乆旱雨三尺消得山人酒滿傾坐占庭蟻戰餘酣一飽無功益自慙但見人人厭粱肉野夫方覺薺苗甘雨晴物物自生春喜氣浮空似有紋吾亦乾坤物中一相看草樹共欣欣爲驗隂晴看漏星要知踈宻候簷聲夜來還却當時睡不脫蓑衣直到明前日南湖枕白雲蛙聲每厭静中聞今朝便覺笙歌上爲是多年不聽君九日九飲九首擬橫渠元日十詠體一飲君聽第一歌誰從此際見天和醉郷開物工夫宻春意空濛尚未多二飲重賡第二歌春風毛髮欲婆娑寸心又到欣然處莫怪山人語漸多三飲山人笑且歌羲皇相去巳無多舉杯爲向諸君道自此光隂柰樂何四飲湏聽第四歌山人未醉覺顔酡囑君輕摘黃花露滴向杯心生小波五飲𥘉喧四座歌黃花滿意入紅螺人間此樂知無復魚鳥聞聲亦泰和六飲相將醉境過令嚴斟淺欲如何秋香正滿黃花蕚宜與南山細拊摩七飲人驚飲量多兒童休唱接籬歌青天一㡌千年在只恐西風不奈何八飲人驚飲量過劇談不記竟云何杯中正有春風在無奈䔥䔥落葉多九飲蒼巖藉碧蓑江山揺落奈吾何乾坤閉物肧胎宻中有山人第九歌山行西崦人家竹映溪山深雨暗到來遲行窮谷口水才見流盡巖花春不知銅雀瓦硯諸侯負漢巳堪憐直筆何爲亦魏編却愛曹瞞臺上瓦至今猶屬建安年春曉要看東風氣象新登臨何處不㝷春今朝煙雨細如霧生意空濛畫得眞以杖畫雪偶成玉華銀色浩無瑕方寸居然得故家雲重風輕晴不快暮寒覺比曉來加仙人圖三首千古誰傳海上山坐令人主厭塵寰蓬萊果有神仙在應悔虚名落丗間雲海蒼茫去復還人間此日是何年平生慣見秋風客只許汾陽㑹窅然悵望皇墳寂寞中何從事跡得崆峒可憐千古稱黃老誰識當年立極功春暮病餘身丗澹無情但覺春來暖漸生送客出門花已謝問知昨日是清明講學而首章二首有樂如從天外來春風過處百花開政敎萬木夜殭立何害孤根暖獨廻人將知我亦何從天在吾家度量中此語誤人君勿信我心無愠本冲融講八佾首章二首以刀傷肌手自危割餘痛切不勝悲心同義理元無間彼此俱看未忍時生意條然不遂春根株盤曲欲輪囷向前枝葉頑然了自此乾坤屬不仁講周而不比章義理胷中好惡眞初非由己與由人混然生意流行在惟有枯荄不受春講人之生也直章朝綱一紊國風沉人道方乖鬼境侵生理本直冝細玩蓍龜千古在人心驕吝昨日深山興未闌今朝二女共高寒施施便解驕妻妾乞態當從此際看講求仁得仁章二首山下食薇老興便荆南採藥此心全乾坤月慘煙愁外留我羲皇萬古天荆棘埋香死不禁清泉芳徑愜幽㝷移花旋看新生意方識西山忍餓心一元萬古堂堂共一元欲於何處覔天根試從開閉中間看始覺乾元獨自尊閉物之後有亥開物之前有丑惟子㑹正在開閉之申其意象可玩新居二首雪擁閑門儘未除小齋人道似禪居年來日曆無多事只有求方與借書萬事休關百病身書囊藥褁最相親年來愛與漁樵話恐有無心失位人今月今月柴關幾客來擬從屐齒數莓苔求文道士花前至載酒門生雨後廻採栢圖翠袖重將栢子薰一般心苦爲思君思君不爲山中苦爲說山中有白雲採藥黃精著雨宜深斸栢子經霜可爛收莫道幽人渾懶散一年忙處是深秋堯民圖四首分得堯天一握多百年安樂邵家􅌪情知弄月吟風手不扣南山白石歌風氣初開理漸融畫圖猶見帝無功意長丗短成何事誰及乾坤再日中平生喜作許東隣百過摩挲畫本昏聞說詩人多感慨且休持送鄭監門臯夔遺像凜猶存更比凌煙意氣眞但使尊前有如此不慚只作許東隣豳風圖三首畫裏春風在眼前詩中雅意若爲傳慿誰更諎絃歌了細味周家八百年惟願將身入畫中野人何敢夢周公一區共買橫渠上儘有新詩續正風採詩千古要觀風十室誰言九室空寄語當年長樂老回頭無忘聶夷中觀梅有感東風吹落戰塵沙夢想西湖處士家只恐江南春意減此心元不爲梅花山家馬蹄踏水亂明霞醉袖迎風受落花怪見溪童出門望鵲聲先我到山家溪上坐乆蒼苔如見侵攜笻隨水就輕隂松風似厭灘聲小雲影旋移山色深偶書蜜割舊脾花又發泥生新兩燕方還一瓢有分吾自足萬物勞生誰獨閑西郊偶因訪客出西城一色寒蕪滿意平行過溪橋甞脚力招來野老問山名夏日庭户無人緑滿苔廵簷繞砌菜花開酒醒夢覺日將午蜂學逺山風雨來早秋昨朝一葉見秋生今日千巖萬壑清欲借西風蘇病骨暫來石上聽松聲春盡草閤垂簾晝掩扉客來如我出門稀鳥鳴澹與人相對花落方知春巳歸寒食道中簪花楚楚歸寧女荷鍤紛紛上塜人萬古人心生意在又隨桃李一畨春行藥有感未言先歎少知者有客每憂無可人偶到階前見芳草乾坤何物不歸春故園寒食清明酒熟老人醉拜掃歸來壯士耕此是吾家舊寒食只今惟有故郷情山家孟氏養親惟小園董生有吏索租錢留詩自愧非韓杜聊記林宗識子賢宿山寺四面雲山消百憂一方禪榻有眞游月明夢覺不知夜雨過風生渾是秋感事高天厚地古今同共在人形視息中四海堂堂皆漢土誰知流淚在金銅廢園路傍雙石立崔嵬曾見游人幾往來想得當年全盛日好山橫處盡樓臺記夢眼中天變暗星文脚底雷轟震寢門領取天公仁愛意此心存處更存存己卯九月卄八日夢過先妣墓得詩覺而忘其第三句因足成之只應老母心酸處還似孤兒淚盡時留在此身成底事回頭二十四年悲先母下丗今二十四年矣己卯元日二首西湖泣血夜將分感激無如此念眞四十頭顱今日數悠悠歳月屬何人文廟秋風黙坐時慨然千古入沉思許身尚省𥘉心在道德而今竟似誰庚辰元日二首九齡風骨渺翩翩解道沉河觸泰山還使當年見今日也應拍手笑癡頑曾記西湖酒一巵乾坤和氣入新詞六年未盡氷霜怨又到春風滿面時乙亥所作元日詞有春恩花柳消盡氷霜殘怨之句下山三首峻嶺重岡儘意登要收風景入高明下山却向山頭望始覺從前險處行翠霞騰暈紫成堆收拾雲煙酒一杯想見浮嵐在眉宇人人却道看山廻十載煙霞望我深豈期今日恣登臨此行知有詩多少還盡山靈未了心戲判游山詩卷三首不解煙霞調戲君強將詩思與山親苦吟共道西游樂林鳥巖花恐笑人心境無邊萬象新直湏泉石離風塵區區䓁爲紛華役未分膏肓是逹人登高有法莫相誣絶壑懸崖不信渠十歩回頭五歩坐䆫間眉黛笑君愚漫記七首夢覺關頭夢已空此時方識樂無窮便將富貴浮雲比恐落華歆一擲中醉知避客猶存禮死不忘骸尚有身一自坡仙生一轉浮虚十倍晉朝人坡謂劉伶豈知忘死未忘骸謂淵明醉中對客眠何害安樂名􅌪有眞賞打乖非是要安身坡仙便道學喑啞負殺園中獨樂人打乖非是要安身道大方能混世塵又云時止時行皆有命先生不是打乖人明道安樂􅌪詩也拊掌笑先生年來學喑啞東坡獨樂園詩也天幕高懸兩部蛙水光山色照黃家忘情未便眞忘得憶竹栽蘆強自誇我自無行便是藏更將何物要韜光東臯幸有牛溪在却向長安說醉鄉百錢破釡發長歎一局羸棋爲解顔擾擾自無安脚處幾人打透利名關透得利名関便是小歇処見趙顯卿手簡應物何甞累我眞禪家怖死強忘身昨朝一讀雍行録却笑當年墮甑人草亭睡起萬里乾坤一草亭澹然相對靜儀刑釀成碧酒客難得生出白雲山更青寒食出郭衣冠不似逸人高容貌初無逹士驕醉裏騎牛過山北傍人不信是漁樵即事曬罷空庭藥褁收閉門無睡却梳頭過雲幾點黃昏雨分與蟲聲半霎秋靜修先生文集卷之十二
