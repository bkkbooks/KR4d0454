front:
  text: 靜修先生文集卷之二
  hash: sha256:dddb1b1315bb8c1a42ca62a5f7bcad2327f4ab8df3f76ffb3e7cb18cdf7b910a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_002-1a}
body:
  text: 五言古詩郭翁詩翁名恩本相人少爲輪扁業亂後流寓保定年今近九十矣早與其兄相失後聞其居河南老無所依翁乃三往迎之及至奉事惟謹與同寢處翁家貧素無僕御其兄卧病翁親爲浣滌厠㡏其兄臨終甞以遺骸歸祔爲託而翁亦極力以成其志郡中諸老人與翁年相若游相好者數數爲予道翁行事如此予感歎不巳爲作是詩佳木交清隂欣然動人意况聞翁之風能不有生氣此翁少有兄干戈郷縣異哀鳴念覊孤相思勞夢寐自誓畢此生復爾歡聚遂千里三往返竟扶藍輿至夜雨一方床春風滿天地家無十歳僮百役一身寄效兒浣厠㡏代婦理中饋生忘惸獨憂死免道路棄關河隔故丘走送徇歸志大義今巳全初心始無愧翁本不識書所知惟藝事作詩美翁賢亦以警士類友善堂詩送文子周使江西我昔客鎭州東隣友善堂一別今十年主人髮如霜百年翰林銘許與聲琅琅愧昔知君淺喜今窺汪洋暫㑹復逺别江山懷豫章舉目見良朋胷中非故郷但憂兵亂餘民氣恐不揚人生貴樹立事業在此方九日登洪崖有道士居此今二十年不睡矣卑居不見秋登高自誰始清狂未免俗謹厚亦復爾山光故相迎百歩翠可倚屈指數勝游茲山居食指高絶讓龍門平敞亦專美群山渺波鱗天𨳩見洪水列嶽眞情塵遐瞰小千里却恐行路人視予旋磨蟻解衣林表坐爛摘葡萄紫甘漿來逡巡毛骨脫泥滓勝境得眞賞泉石逈如洗况有幽棲人㗳然空隱几相對巳忘言一笑雲林喜回首暮煙深高歌望吾子游龍宫翠澗如生煙石瀬欲無雪縱目失平地仰面猶清樾時節未高春生意方謀泄隨時乆閉藏與物今超越茲遊豈人力勝境殆天設拊石看棲龍髣髴仇池穴聞說如桃源自此有深絶拂衣徑欲往不見當年轍獨立馭長風哀歌山石裂獨酌青山澹無夢相憶無由來毎當西北風曠然開我懷爲從山中至對之舉吾杯主人有佳客此門容勿開寄宋生西南吾楚澤吞三江五湖眼中此尤物不可一日無有客報渾一胷次如還珠望極不可到逸興風飄𥚑家人笑挽之恐遂凌空虚寄聲游宦子歸與江山俱閉門望雲濤屋梁霜月孤西陵斷巴蜀南雲渺蒼梧徑圎一千里杯酒納有餘新詩想潇灑爽氣餘清臞明朝凾丈中坐對江陵圖三月二十二日同仲韞飲北溪分韻得却字丗紛謝巳乆怳若隔今昨惟餘北山雲可愛不可却時當持詩往報復亦不惡百年何將軍山林未寂寞北溪擅佳名春服亦成約頗聞張氏宅池館自䟽鑿不湏弔鵝池且喜餘巖壑春風覺我來佳色動叢薄煙霏效竒供乍喜復可愕顧盻不睱給遲回迷所託清泉㑹人意愛弄入杯杓觴流水故遲歌發聲仍作野蔌旋充盤舉網聞魚躍生徒展餘敬賔友雜善謔圖畫沂上翁意象窪尊酌蒼苔笑仰天微風蕩雲幕禽鳥過我鳴似語翁正樂大笑昔人愚所見未脫畧後來亦塵跡俯仰語成錯人心妙無際崑崙復磅礴一元貫萬古普遍無郛郭雅意不可言商歌滿寥廓源泉古北溪也金大行人張通古故居今爲巫覡所據弔鵝池見錢氏弔右君宅文蜀葵蜀葵落秋子巳能成小叢如何同枝花隱隱才含紅一氣有先後萬物誰窮通伊誰歎遲暮來此尊酒同寓意萬物凍欲折中有天地春一元貫萬古生意誰能屯但苦未充滿此心終難伸秋風鬢毛改卓爾顔家貧有懷朝詠小招辭暮歌白頭吟出門何所適欲語誰同心豈無平生交顔色非眞金目送西南鴻令人思子深思子不可置誰從懷好音年意惜已往進脩徴來今行家園藥畦極覽力不任近㝷情亦親勤人良可愧生物庸非仁氛雜没畦隔洗去如游塵激流不知小因風亦生鱗羊乳生氣少靈厖渺無聞牛嬭頗肥澤老馬或當神薯區才數本臘粥思及隣庭前席許地可望濟病身茫茫天宇閑此意難重陳種芋借地斸深區西隣計巳成雖無范陽種尚愛君子名糞壤豆箕爛南風緑雲平欲知子有孫當驗葉與莖飢腸日有望歳晩分杯羮朱築學圃亭先著種芋經欲持巳試驗盡令郷社行登聖泉菴緩轡指西山振䇿凌崇丘臨風一回首擾擾令人愁蒼石負崛﨑碧草藉芳幽長林泛餘霽初節成高秋端居氣始平頽然漸神游舉目欣所期叩心思欲酬爲問石上松千年爲誰留飄飄巢居子歳晩同歸休秋晚登西山十日罷琴誦超摇慕飛仙天風何許來吹我蒼崖巔誰知此絶境秋華亦芳鮮采采泛清尊山容變春妍只應城中人遥知弄雲煙若見孤鴻來可詠悠然篇沙溝二詠漱霞巖丹霞凌日觀餘津浩難收蒼凉蘇病骨醉暈浮巖幽萬象春意融頽然得歸休擾擾路傍子無勞歌逺游飛泉亭崦嵫多靈草秋空掩飛泉胷中玉芙蕖滿意清泠淵火食困煩鬰下顧心茫然何當分一杯灑落齊州煙九月攜諸生登西山九月秋服成童冠從我游萬古清沂春重結西山秋白雲歸青岑狂瀾落滄洲永嘨來長風爽籟生巖幽清商失揺落生氣浮林丘門生顧我言樂矣行歸休風𬒮尚飄然此意浩難收六華峯入山採靈芝濯足東澗濵白雲不可招丹霞有餘津長風忽絶頂悠哉凌翠氛舉手問浮丗此子今何人書堂谷晏坐上負青天壁下引碧澗滋中有晏坐石日夕忘吾歸永懷幽棲人千載誰與期人間九瀛海莾蒼天所圍黃塵重如霧舉手下欲揮白雲如可招願作雙鶴飛寓意二首愁隂翳陽景超然慕逺游天風忽吹衣命駕崑崙丘氷壷洗秋露霽月霜空流平生多故人回首生離憂丗路苦嶮巇㳺子天一方况是靑春深桃李爭芬芳相媒有百鳥巧韻無絲簧客行雖云樂歸哉非故鄉呉山夜雪圖江南無寒歳一雪今幾時呉山豈無春畫此寒巖姿壯哉萬里流下廢東南馳胷中謾長風俯仰今古非誰能小海唱爲和大江詞重游北溪分韻得暉字蒼黃澹野色草樹含清暉林居隱葱蒨晴嵐散霏微歸雲有眞意鳴禽發天機勝處必深㑹輕觴豈虚揮山泉來何從北望空依依燕歌行薊門來悲風易水生寒波雲物何改色游子唱燕歌燕歌在何處盤欎西山阿武陽燕下都歳晚獨經過青丘遥相連風雨墮嵳峩七十齊郡邑百二秦山河學術有管樂道義無丘軻蚩蚩魚肉民誰與休干戈往事已如此後來復如何割地更石郎曲終哀思多月下獨酌佳月靜可飲一天明水寒餘光泛不極徘徊尊俎間但覺凉露下不知清夜闌醉眠吾有興君當下西山代來使答淵明何時發天目山中雲出時出山山更佳草木非所知公田幸有秫何問菊與薇一笑領此意翁豈爲酒歸四皓二首智脫暴秦網義動英主顔湏眉不得見猶思見南山毎當西去鴻目極天際還馬遷歌采薇託名夷齊間孰謂紫芝曲能形此心閑圖哉山林槁搏也或可班安得六黃鵠五老相追攀一笑三千古浩蕩觀人寰留侯在漢廷四老在南山不知高祖意但欲太子安一讀鴻鵠歌令人心膽寒高飛橫四海牝雞生羽翰孺子誠可敎從容濟時艱平生無遺策此舉良可歎出處今誤我惜哉不早還何必赤松子商洛非人間嚴光文叔雖天子因陵位愈尊爲陵成高節此亦天子恩兩星映千古精爽如尚存有此謹厚者可贈狂奴眞巢由本不經怪妄徒擬倫中庸乆蕪没矯激非天民惟餘仁義語至今凜若新想像富春石崔嵬猶起人答樂天問三首二氣日交感變態何紛紜清濁與厚薄賦予定難均丗運如四時類聚仍群分升沉予奪間今古亦難倫天道自悠逺百年寓此身未來不可見旣往有未聞愚者或貴壽賢者或賤屯龍亢豈無悔蠖屈豈不伸君自不知此何云詰羲文邈哉開闢初造化惟隂陽錯然入形化一受不可忘稻粱固爲愛豺狼非故殃物理本對待生氣常相將孔聖豈無後暴秦不可長鬼神禍福機昭昭亦可量桃嚙李樹死城焚池魚傷外來非我取生意自洋洋君何不思此徒欲問穹蒼樂天種香草有艾同根株鋤漑兩相妨題詩問何如恨君計巳晩草草種樹初根荄不早辨使與莖葉俱鋤根固相傷莖葉猶可除臭葉日以除香莖日以蘇區區彼微根僅有知無餘雖霑灌漑恩生意巳漸踈君今尚未决歳晚益難圖李伯堅宣慰荆南并序李公伯堅㓜以丗家子入事北安王來典保定蓋爲王守分地也安靜樂易屈巳下士郡甞被水災力請於朝多所蠲復郡人頼之爲郡五年王朝京師有司被王敎宜奏公宣慰一道至元二十七年二月十五日詔下當往荆湖保府諸公賦詩爲贈郡人劉因爲之序荆南壯哉郡作鎭多英竒三年廉相國千古甘棠詩聞公相國客荆人恐來遲公來何所望望如相國慈有子父乃顯觀臣王可知榮親與報主勉力在此時幽禽幽禽初出谷其聲何熈熈但知春可鳴渾忘蟄凍時天生復天殺恩怨敢自私寥寥古人心丗逺今誰知送劉校書回祁陽堯故國淳朴餘山川每見祁陽人心如對堯年而况賢宗盟乆矣相周旋今年護我歸青山照華顚處我旣以禮贈君可無言言動戒在戲當誦東銘篇李從事北上在昔爲趙客君方掾鎭州前年從事保狀爲郷人留今聞當上計適值將南游區區四五年足跡無少休窮逹雖云異飄泊同覊愁送郝仲常游北嶽太茂玄都閟他山拱萬靈風霆凛神化河海盡襟形昴畢空留影幽并未了青追封王制變僣祀丗塵腥禮樂心雖切煙霞骨有銘長懷七十戸爲我謝仙扃植榴植榴將食實三年不見花日夕灌漑勞物情自可嗟今朝兩相忘靜緑清且佳三歎詠此意不覺芳隂斜學東坡小圃五詠枸杞仙苗𬒳城郭聞之𣏌國人始疑制名𥘉義與荆楊鈞逺慙勾漏令空望黃河濱常山古靈潤煙霞流餘津青荑發丹乳厚餉謝我神丗人厭肥膩思與雅澹親客來薦𬞞茗用以華吾貧方書自有本疑信未敢眞偶思青城山山人壽且淳手持羲皇書念此區中民地黃山行多上藥地賤名亦辱村民誇善染功能竟誰録仙翁種藝法隱處未成卜旅居容小試膏土課深斸頃筐如有秋靈液光潤屋俯鑑盆影中華髮巳思緑九醖謝清泉鄰墻挹餘馥朝陽發蒼凉與丗解酲毒元氣乆瀟索内熱紛相逐黃鶴慿寄聲山中酒方熟甘菊金行發黃素風露饒甘馨政使非上藥猶當充前庭對花論陶詩持詩問淵明帝郷不可期安用制頽齡忍飢啖松柏直以奴僕輕東坡豈忘此空腹嚼落英采采還自笑君今何所營無病不服薬邵子有深情壽夭付天公歐陽差失平吾心在蠲疾持此報兩生薯蕷玉延事韜養朽壤深以密短楥受柔條葱欎護風日貧居之肉味勞生苦羸疾松聲汎緑畦夢聞石鼎溢初疑湯餅滑乍見晴雲出和飲宜杏酪煎糜縷崖蜜餉隣報炊芋留客代煨栗入薬疑自擐留種戒勿失竒人分常薄計用今六七靈物聞善化愼勿輕呵叱黃精黃精晚得名丹家貴失草籍藉仙經中參木避華藻名高有物忌榛莾幾摧倒春風入溝畹英翹忽已好感子灌漑恩糜身錫難老豈無難老願所願在探討丗變閱無窮乾端見更造此志理難遂斂之寄襟抱釋爾任重憂歲晩共一飽靜修先生文集卷之二
