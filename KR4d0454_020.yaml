front:
  text: 靜修先生文集卷之二十
  hash: sha256:edc512e26f4a64f5e6a7077c8f73e69ab6ffa236f7bade21bcc6f324bd4f8687
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_020-1a}
body:
  text: 説唯諾説唯恭於諾何也曰各有所施也呼之則其音必內故唯以趨赴之若取物而奉之也命之則其聲必外故諾以承受之若與物而受之也失其所施則文理從而亂矣豈但是乎凡物無無對者無無隂陽者而聲亦然其意象之清濁闔闢亦莫不合也姑以進退存亡吉凶消長體之則可見矣此天機之所發而禮樂之所由生雖天地亦不知其所以然者豈但人乎物之聲亦然豈但聲乎凡形色氣味皆然也而况古今之時變事物之倫理聖人何嘗加損於其間哉雖然妙此理而宰此事者心焉而巳矣必盡夫心也然後聲為律而身為度苟為不然幾何其不為無適非道之道作用是性之性也唯諾後説天之聲清而上地之聲濁而下形感而聲出焉理於是乎在來之聲必來去之聲必去事感而聲出焉理亦於是乎在初無心曰天地去來也至於一草一木其聲亦必象其形曰樹有植立之象焉曰枝有散殊之象焉至於曰鵝曰鴨曰雞曰雀曰鴉之類則又因其聲而聲焉者也鶂鶂所以協鵝也喈喈所以協雞也言語生於有聲之後而其理具於有聲之前有聲之後則古今方域日益不同人惟見其不同而不知其同也知其同則知吾之所以説唯諾者不但説唯諾也授坐而立授立而跪齟齬於其形也當唯而諾當諾而唯齟齬於其聲也聖人之所以制禮者非誠有制也特知之焉爾張濳名説張氏子從豫學既長而更幼名豫命之以濳曰濳乎吾語汝濳夫人之家或未振而有振之者必卓越非常之人也人而未自振思所以振之非挺拔特立蹇蹇自負者不能也尓之家卑而未顯尓之質柔而願豫又濳尓也又欲尓之濳也惑矣雖然尓獨不見夫天地之凜然者乎此潛之象也剛健之𥘉君子自強之始也躍也飛也自潛而來也以儒新而家以道立而身汝之濳也不然渾渾淪淪混于常人以終其身顧尓自能之豫又何教焉仰又有一説我將終教之大矣而後小之潛也明矣而後晦之潛也不大而小不明而晦固冝也亦曰豫潛自欺也濳乎無負尓名憃齋説近丗士大夫多以頑鈍推魯人所不足之稱以自號彼其人未必真有是也亦非故為是謙託而然也蓋必有所取焉耳然其所取之義有二焉蓋或病夫便儇皎厲之去道甚速也思欲自矯以近本實於是不得巳而取之而其意若曰與其失於彼也寧失於是此其設心於義為無所失也或為老莊氏之説者則不然以為天下古今必如是而後可以無營而近道保嗇而自全也此則擇而取之非不得巳也而其意則將以自利而巳使前之説行亦不過人人尚質而於丗固不為無益也若不幸而此説一熾則天下之人皆將苟簡避事而其為害庸有既乎嗚呼一事之間心術之微其義利之分有如此者不可不之察也安肅劉仲祥明敏博物專門禮學以憃名其齋蓋將以自矯而非以自利也故豫既為題其扁復以是説列其左劉某書遂初亭説君子立心之初曰為善而不為惡曰為君子而不為小人如是而巳苟為善也為君子也則其初心遂矣夫道無時而不有無處而不在也故欲為善為君子蓋無時無處而不可而吾之初心亦無時無處而不得其遂也若曰吾之初心將出以及物也苟時命不吾與焉則終身不得其遂矣如是則是道偏在乎出而處也無所可為者矣若曰吾之初心欲處而適已也苟時命不吾釋焉則亦終身不得其遂矣如是則是道偏在乎處而出也無所可為者矣道果如是乎哉詹事張公子有豫知其心為最深蓋樂為善而惟恐其不為君子者也今築亭名以遂初而其心乃在乎間適而諸公為詩文以題詠之者以子有朝望甚重才業甚備又皆責其心當在乎匡濟皆不可也夫義當間適時在匡濟皆吾所當必為者然其立心則不可謂必得是也而後為遂苟其心如此則是心境本無外而自拘於一隅道體本周遍而自滯於一偏其為纍也甚矣子有其以吾言思之久之必有得也至元壬辰重九日劉某書道貴堂説邵康節詩雖無官自高豈無道自貴非以道對官而言也但言道不以此為有無爾若以為對則其淺狹急迫非惟不知道之所以為道而慕外之私亦必有不可勝言者矣河間李生托邵氏詩名堂曰道貴求其説於豫故云皇甫巽字説朱子謂周子之所謂剛柔即易之兩儀而各加以善惡則易之四象也以隂陽之大分言之陽為剛為君子隂為柔為小人剛宜善於柔也以剛而善則固善矣以剛而惡則不若柔善之為愈也是君子小人之分不係乎剛柔而係乎剛柔之善惡而巳矣剛之善陽之陽也柔之善隂之陽也然剛柔雖各有善惡而其所謂善者皆陽所謂惡者皆隂是剛柔之善惡又不係乎剛柔而係乎隂陽而巳矣蓋猛也隘也強梁也隂之慘屬焉慈也順也巽也陽之舒屬焉為隂之屬在陽亦為惡為陽之屬在隂亦為善此聖人之所以拳拳於陽而扶之人之所以尊夫陽而貴之者也皇甫安國名其子曰巽蓋亦就其氣稟之偏於剛者而救之也既長誤以豫為鄉先生以巽執贄來見而欲豫有以字而教之豫字之以伯陽曰巽乎汝剛也亦思夫所謂陽焉汝柔也亦思夫所謂陽焉剛柔惟汝之所適也陽之是趨則豫之所望焉王景勉名字説故人王利夫請制其子名王氏居丗與豫外家鄰豫外祖楊公字勉之實王氏之鄉先生也以之名其子孰云不可遂名之曰景勉勉者將以力行也可字之以履而以文配稱焉曰文履至元已卯二月癸未容城劉某書少中李公名字説公之先契丹氏之族也其氏李則逺有端緒而碑志存焉名則國語譯云鐡也公見國朝諸貴族多因官若名以氏又有從而字之者自以氏李則既有所承而名字尚未稱其心若有闕焉遂以為請豫名以􅣱而字之伯堅蓋存其初名又本其所自出而就以為勸焉耳至元庚寅二月吉日容城劉某書嘉氏子字説名人所稱者故多示謙字因名而生義人所稱者故多致尊美之意焉若曰子曰彥曰卿之類固無自稱之理也後丗不之察每每錯亂故有於稱呼之間或不順者今嘉氏子名淳可字士真蓋因名而生以致尊美之意也至元已丑冬至日牧溪翁書銘王孝女旌門銘併序女家容城西以母喪感念遂不嫁終身州上其行御史按實禮部令旌表之內翰盧公署其門曰孝女王氏縣人劉某銘曰孰不娶終身曰魯山之元道州之陽史名卓行何謂非平常二子且然於一女子復奚責望盧公表之何用以戒荒友松軒銘併序總帥史侯子明種松私第因以友松名其堂之軒友人涿郡盧處道為請銘銘曰孰賦逺遊泰𥘉為鄰孰廣絶交麋鹿為群彼其薄丗棲心物外丗固未薄汝薄巳大矧侯貴遊於侯何負乃今翻然亦松與友植物之英象斯人賢象則與之而况其真寬裕樂易孰求此心我將持松責侯來今凜乎風霜巍乎明堂彼實有之豫靈敢忘贊神農畫像贊天初生民粒食已成如人育子湩與俱生於赫炎皇繼天而已聖德神功止於如此王允中真贊齒未老鬢胡為而白邪隱然含四海之憂鬢巳衰顔胡為而壯邪凜然橫千仭之秋竹實丹心砥柱中流百折而必東寸折而不柔其履危犯分幾禍一身固可為戒然視循默苟容貽害當丗者寧不優邪退翁真贊廊廟之姿山林之思惟所謂天下之士故能為學者所師奚藏諸用而昌於辭有德有言寧卒不施迫而視之非吾退翁而誰郭安道真贊衣冠自同於鄉人而文章名天下言論若無所臧否而風鑒析秋毫安處下僚而人不見其屈力辭兩命而人不忌其高我相英華得其根苗蓋於此眉睫之間又見其所以肖夫先君子之捐金購書揮觴結客以倜儻起家為幽并之豪者也書畫像自警所以承先丗之統者如是其孤所以當衆人之望者如是其虛嗚呼危乎不有以持之其何以居祝文已卯春釋菜先聖文聖代天言明告萬丗寥寥方册孰傳聖言天啓聖心程朱將命堙晦浚闢聾聰瞽明謂當後人承此遺澤孰云剽盜資我而文肆然多歧孰會其一徒為瞻仰有惻此心因早躁狂若將有志中實脆屈未立巳頽揆厥無成實由貪懦時馳意去凜不自容顧念初心恍焉如失今此闢館惟我之求講學有徒進修有地研窮參訂亦復有書於古遺言於今學者尚有禆益少慰此心但懼悠悠復循前軌惟神啓迪實有臨之告峨山龍湫文嗚呼一邦之望有峩惟山山之精深聚而淵泉山川惟形有神棲之雲雷雨露神實司之今是邦之凶旱極矣豈神之靈坐視而不恤哉蓋雨暘之數出于天非神之所得而專也雨暘之咎由於人非神之所得而釋也是以使神涵蓄靈潤雖欲發之而不得也雖然山川之神受命于天而主佑下民者也今欲佑之而不得矣則當為之請命于天昭昭在上安有不從由是言之神雖欲無責烏得而無責也且小民至愚窮且極矣而無所歸誠則惟淫昏之鬼是求夫淫昏之鬼乃神之所當屏黜而下民之衷亦神之所當誘相也今氣運巳窮矣窮則必通或天降之雨則小民必歸功於淫昏之鬼而惑信愈篤孰能禁之今是邦之大夫致禱于神則是禱其所當禱矣既禱其所當禱而當禱之神能隨其禱而應之以雨使既足而又周浹焉庶小民之愚知天地之間自有名山大川之正神實能闔闢隂陽而神妙造化而境內吏民之所當敬修其壇壝潔其牲幣而事之而向之所謂淫昏之鬼者真不足信矣如是則人情丗教或自此而變之則神之惠又不但一雨而已矣如其不然則是雲雷之澤神其不司之旱乾之虐神實不恤之天命之職可怠而曠之惑邪之俗可助而成之又何望焉又何望焉敢告祭文祭楊待制文名恕字誠之堂堂文獻金之儒宗得見嗣子如及音容况我先人出文獻門既丗有契義當公親總角拜公雞泉之濵期與莫當凜乎此身後公重來我方南還德孤道否煢煢在艱拜書于公義重公顔别五六年移居西湖吾道日窮交道日踈問疾憂貧兩辱公書愛我如斯死别終天不及執紼猶當漬綿矯首東望奈此臞然緘辭寓哀公其鑒焉祭參知政事王彥才文維至元二十一年歲次甲申十一月乙亥朔越二十日甲午容城劉某謹以茶果之奠致告于故參知政事王公之靈在公晚年嗣續維重方將慶公公巳告病問疾之舉旦夕治裝公謝勿來公巳云亡孰知此行施行公喪昔公之西豫寓易城百里送公為公逺行今公此去終天永訣敢不扶疾送公于穴恩禮未酬音容窈然謹此區區公其鑒焉嗚呼哀哉尚饗祭張御史文維至元二十八年歲次辛卯八月乙丑朔承德郎右贊善大夫容城劉某謹以清酌之奠致祭于亡友故監察御史張君仲實之靈嗚呼精勤之志俊逸之才博洽之學清謹之節巳矣巳矣哀哉哀哉尚饗祭鄉丈王利夫文維云云謹以清酌之奠致祭于鄉丈王公利夫之靈鄉中親舊所存惟公謂當百年今復已矣孤子之際憂患之餘所遇皆傷矧兹永訣嗚呼哀哉哀辭玉田楊先生哀辭併序豫平生所與往還通問訊者皆有日録而以時考之庶其有自警者焉昔者有自京師至者曰玉田楊先生嘗問子動靜於我又曰嘗問子言貌於我或又曰先生謂豫過此必識子是以來若是者無虛歲至有素疾豫如仇讎而擠毀百至一及先生之門則必幡然親愛豫亦不知何以得此于先生也後得先生手疏訪故人遺文行實而先人與焉豫始疑先生之所以拳拳于豫者或以先人故思欲一見以其報知而先生殁矣後五年至元丙子其子遇始與豫會其雅相敬愛猶先生又二年遇謂豫曰先人愛子者子為辭以哀先人莫子宜豫固幸其得以遂豫哀故不辭先生諱時煦字春卿仙翁雍伯之後嘗為興文署丞幼頴悟質厚制行不為崖岸性喜客家雖貧而延致接納無虛日隱居教授餘二十年名公貴人往往出其門者築一室環種以竹名之曰庸齋或為圖其象為野服蕭然先生顧而樂之名以庸齋自適先生之病革也訣其門人李生曰豫平生無愧於丗言竟怡然而逝其所學與其所行蓋可見矣而丗特以好客稱之非知先生者遇今為史院編修官孫肯堂亦好學其辭曰􅿺漓澆兮孰可淳賦敦厖兮公其人揚尓波兮一我存矯獨立兮與物春物來納兮吾渾淪氣𬒳物兮吾氤氲彼巖巖兮駭絶倫嗟離物兮危尓身彼悠悠兮逐丗紛孰有渭兮不涇渾庸可常兮德有鄰微先生兮吾誰與親靜修先生文集卷之二十
