front:
  text: 靜修先生文集卷之十
  hash: sha256:837782ed5c021927a25c3e31d889fda1d061fa14a01baeb375aac6f2d1880b25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_010-1a}
body:
  text: 七言律詩定興文廟枯杏復花其尹求詩縣君奉議府君故治手澤天教􅝸蘖存窮鄉枯朽亦霑恩敢將吾道論榮悴且喜甘棠見子孫但使儒林有根柢㑹看寒谷變春溫題詩當作諸公唱百里東州又故園訾相士詩卷形聲感物即天成善惡因心有相生人事百年隨反覆天容一日幾隂晴僕夫茗捥何妨共厮役王門未可輕不向訾家洲上醉胸中風鍳恐難平寄彥通青芻白飯思依然燈火山亭暮雨前不意相思渾百里直教一别動經年久甘分席樵夫下敢望過門長者先自是煙霞愛招客可無佳句助清妍癸酉大雨次人韻黑風吹海入天瓢誰信銀河直下潮渾沌只疑還太古規模應欲復唐堯衣冠半夜方孤坐塵溷千年共一漂且喜開簾見白日不須隴畒問秋苗次韻答河間趙君玉見寄出門紛擾互相侵常使幽人懶病深前月借書來水北去年採藥到城隂黃精巳倩徐生斸蒼术新教石老尋只有煙霞肯賖借無人曾送買山金次韻答王之才見寄瀟瀟霜葉打窗踈耿耿寒燈伴獨居鄉議謾評康節僻後賢方識子雲書詩成已破三緘戒臂穩因思九折初明日相望在何處青山佳處即吾廬付阿山誦十畒荒田不自耕半空樓觀幾時成人因遇困方言命我為求竒反喪名此去要知燈是火向來空指鴈為羮新詩銘在山童口百過高歌告乃兄水北道館㑹從氣朗看春朝始信蘭亭水石遙物外壷公能避丗山中巢父不知堯波間明月隨吾取松上白雲如見招曉䇿重來有成約無妨談易對漁樵與客㑹飲野亭遙岑一碧淡相依野態行雲意共遲多病留侯寧復偉長身諸葛但如癡相思千里尊酒盡永嘯一聲山鳥悲風䄂翩翩此何處青林西北雨來時晨坐共笑龕中坐巳癡環堂燈火誦聲遲人才興替丗所係瓶水溫凉天可知荖健每因多病後一寒偏怯欲明時三年馬隊成何事采菊南山舊有期野興得意江山入酒樽乾坤英氣未沉淪莫思丗事兼身事不薄今人愛古人明月清風無盡藏野花啼鳥一般春客來惟說煙霞好只恐先生醉後嗔郭太守提舉松江蔡公聲望動江東應識頭顱肖外翁陵谷初經新化日蓴鱸不似舊秋風看雲正要忘憂計避瘴無如寡欲功萬里吳松慿寄語并刀明日試胸中新秋俗物何嘗擾病懷憐渠孤憤若為開人生如此亦安用野鶴翩然去不回萬古青天留月在幾聲白鴈送秋來西城無限峯巒好擬對一峯傾一杯放歌莫道人生能幾何金銀宫闕亦無多垂楊流水輕風裏碧落銀河暮雨過天地此身真逆旅雲山到處是行􅌪九原喚起堯夫老我舉一杯君試歌雙清堂遺址心逺由來地自偏若分心跡巳非賢結廬人境元無害跨鶴楊州更兩全石頂經龕有隨處山中學館竟何年馬頭果要為初祖擬問西嵓借一廛反垂柳短吟偃蹇高松雪漫飛最憐憔悴緑楊枝青絲曾識鶯聲軟黃葉俄驚馬足遲有分只偷春色早無心要結歲寒知不應再得東風力更與行人管别離玉簪花中氷雪避秋陽月底隂隂鎖暗香玉瘦每憂和露滴心清惟恨有絲長且留宛轉圍沉水莫遣聮翩入粉囊只許幽人太相似蒼苔踈雨北窗凉爆栗山家愛客夜留連奮發驚聞一栗先鑿竅誰言無渾沌弄九今喜得天全香甘合用金甌選冷淡那容玉版禪回首燕秦幾陵谷眠中繁富竟何年示有寄南鄰新膾北鄰醅莫忘蓮湖舊釣臺根柢自宜留故土熖中真見有寒灰短長無就相形看消息當從既往推遙想西城共登眺水光山色亦悠哉宿鄉僧致公房倦客歸來借夕眠偶因相敬識君賢常勤有酒沽陶令每愧無衣謝大顚謂暢墨名聊泛應論周隂助豈誠然平生親切冠巾語欲發還休亦可憐哭申也悲來思汝不可置揮淚問豫何所悲青欲出藍今遽爾白能受采復誰期粥杯屢進知君篤藥褁親嘗豈我欺從此陳編只獨理不堪燈火夜凉時秋霖春旱泥倉恐謾傳誰從積雨得豐年麻衣有垢供秋蘚土銼無文換曉煙果為松薪禁明月真教斥鹵變桑田胸中幾許晴霓在四海霖䨙獨慨然贈韓道人積學輸翁氣稟真胸中鵬賦自凌雲靈砂換骨知何物道籙降心亦謾云銅泣露盤經幾見鶴言華表竟誰聞風流大父承平事賴有當年李少君韓及識豫先大父今百三歲矣海南鳥越鳥羣飛朔漠濵氣機千古見真純紇干風景今如此故國園林亦暮春精衛有情銜太華杜䳌無血到天津聲聲解墮金銅淚未信吳兒是木人贈司馬道士仙界清凉亦陸沉風流儒素渺難尋白雲自解留佳客青帔端能爍壯心知已未論鵬鳥賦移人先聽水仙琴野人近有南來興乞我菴前十畒隂司馬氏陵川名家陵川或謂清涼境界春日游山川氣迎晴淡作春泉聲招客浩如神隨時俯仰有魚鳥乘興往來無主賔碧水白鷗心共往浮雲蒼狗態誰真平生經濟程夫子年少看山意巳親不是吾儒本經濟等間爭肯出山來明道少作㑹飲北山相逢相飲莫相違往事紛紛何足悲别後幾經滄海淺歸來豈止昔人非此山變滅終如我後㑹登臨知與誰今古區區等如此不須辛苦嘆斜暉次韻答趙君玉萬古西山翠不收一菴今在白雲頭開軒招月淡相對倚杖聽泉清可收巳喜凌空有高興豈知卧病阻同游南湖燈火十年夢舊好何時得重修來詩有千嵓萬壑春風動安得凌空訪靜修之句故及之登中山北城黃金一夕冷如􅣱劉項蕭然恐未真丗事惡盈應有數天心撥亂豈無人陵遷谷變橫流地卵復巢傾死節臣毛髮諸孫生氣在九原精爽禀猶新豫曽伯祖奉議府君貞祐𥘉死節中山而降沒焉題贈㕁道人詩卷開卷煙霞著莫人紫芝瑶草一方樽法筵古禮存三代野服遺風見一㾗唐水堯山猶樂國葛洪張果有仙村何時輦母東鄰了老婦烹茶自應門暮春山游萬山傍繞翠爭新兩澗平分月有鄰木抄柴關如看畫松隂苔徑欲凝塵浮雲柳絮人間丗流水桃花物外春杯酒狂歌極浩蕩野煙晴樹望中勻新曆山家曆日年年有林鳥園花報四時建戊預求尋藥月逢辰要及種瓜期胸中堯典二三䇿夢裏豳風第一詩餘韻千年宛如在晴窗捲卷不勝悲千户喬侯挽卷拱木秋聲尚凜然平生鄉國愧幽燕千家聚落郎山寨四海牢籠敕勤天龍虎風雲空一夢關河形勢記當年重侯纍將應須念創立艱難亦可憐宿華陽臺石徑盤盤擁亂霞雲間雞犬是誰家空山月出人境失髙樹露凉秋氣加蜀道青天休種杞武陵流水謾尋花太行東北三千里尽借晴嵐染鬢華飲聞雞臺出門人事厭紛紛春色三分巳二分十步離山九回顧一杯到手百無聞蒼茫天地有如此磊落古今何獨君欲向荒臺問遺跡水明沙浦只行雲留題山房靈風縹眇竹花飛怪石參荖樹影齊壷裏有天藏日月杯中無海飲虹霓松生天古鶴應識路入白雲山盡低萬里黃塵一回首微茫煙水意悽迷西山雅㑹山色舊無今日濃雅期新得與君同胸懷霽月千年後樽俎春風一月中靜裏乾坤無彼此眼前花柳各青紅高情久已忘琴了誰管殘陽送去鴻次韻閔雨已酉凶豐不偶然今年千里土生煙夢游樂國每嫌覺望見仙雲猶酷憐必竟蛟龍思得雨何勞蟣蝨謾呼天山人萬慮消磨盡惟有憂農阻靜便宿趙山人房有懷書劎南游氣吐霓歸來華髮首難低江山應識千年鶴豪傑空慙半夜雞物外有天藏太古人間何地種丹荑相思日暮一杯酒望斷碧雲何處棲有懷百年身丗付秋毫萬里雲霄有羽毛樓上詩成山欲動眼中人去氣誰豪崔嵬自可兄呼石憔悴直須僕命騷樽酒論文復何日西風迢遞暮鴻高樓上樓觀參荖接大荒五雲分我白雲鄉卧之地上太行小來自帝傍春夢長灝露明河氣蕭瑟黃塵落日煙蒼茫清風簾外問何容玄鶴飛鳴天一方白溝寶符藏山自可攻兒孫誰是出羣雄幽燕不照中天月豐沛空歌海內風趙晉元無四方志澶淵堪笑百年功白溝移向江淮去止罪宣和恐未平何太夫人生日夜夜東鄰有香火高門因得百年心蟠桃結實丗誰見隆棟駭人根自深經卷病餘猶早起絲車老去亦親臨久知吾友間居意惟願慈顔事不侵次韻劉尚書尊號禮成萬姓瞻天仰泰階老人星見五雲開混同直擬千年論積纍元從百丗來含哺豈能逃帝力有根無不待春雷舉頭日近長安逺葵藿傾心即壽杯貧士貧士出門多掣肘聞君幾次謾徘徊不思學館三年舊肯為山翁百里來久倚通家略賔主新知不飲罷尊罍殷勤莫厭通宵話聽說天明即欲回故人見訪山中客子畏人常簡出病來庭户益荒蕪多時略闕通書問逺路遙慙送藥須掃地預占燈燼喜敲門遙認草亭孤故人知我無供給故著看山慰野夫淶陽李丈九十壽九十餘年何限事向人惟指鬢毛霜偶因飲酒驚遲醉不信看書託健忘還拜嗔扶緣敬客近游多步為居鄉自慚犢子顚狂在丗故艱難未備嘗登高有感踈煙晴曉散輕寒秋色滿林霜氣間今古消沉幾白日乾坤灑落一青山半生心苦頭先老兩姊墳荒淚未還瞬息西風解千里慿高聊為送餘潸送人官吳中天徹藩籬要混通古來佳麗數吳中送君如對秋風起恨我不隨江水東五瘴可防鄉土異孤雲須念母心同畫圖留取風煙看莫趂并刀一剪空孫沁州哀挽驚看哀誄為君傷一面十年不易忘秦府舊稱天下選燕人元有北方強平生豪氣餘丘土寤寐神交只月梁聞說條陳有遺草承家洗眼看髯郎靜修先生文集卷之十
