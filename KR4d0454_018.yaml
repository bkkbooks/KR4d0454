body:
  text: 記馴鼠記心之機一動而氣亦隨之迫火而汗近氷而栗物之氣能動人也惟物之遇夫人之氣也亦然鼠善畏人者也一日靜坐有鼠焉出入懷中若不知豫之為人者熟視之而亦不見其為善畏人者豫因思先君子嘗與客㑹飲於易水上而群蜂近人凡撲而却之者皆受螫而先君子獨不動而蜂亦不迫焉蓋人之氣不暴於外則物之來不激之而去其來也如相忘物之去不激之而來其去也亦如相忘蓋安靜慈祥之氣與物無競而物亦莫之攖也平吾之心也易吾之氣也萬物之來不但一蜂鼠而巳也雖然持是說以往而不知所以致謹焉則不流於莊周列禦冦之不恭而不巳也至元七年十一月三日記櫝蓍記蓍之在櫝也寂然不動道之體立所謂易有太極者也及受命而出也感而遂通神之用行所謂是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業者也猶之圖也不用五與十不用云者無極也而五與十則太極也猶之易也潔靜精微潔靜云者無極也而精微則太極也知此則知夫櫝中之蓍以一而具五十無用而無所不用謂之無則有謂之實則虛也而其數之流行於天地萬物之間者則亦隂陽竒偶而巳矣故自掛扐之竒而十二之則陽竒而進之不及夫偶者為少隂隂偶而退之不及夫竒者為少陽而四之則三四五六合夫畫竒全偶半合夫數而畫亦於是焉合其多少則合其位之陽少而隂多故有自一進一而為偶自偶退一而為竒之象也自過揲之䇿而十二之陽竒而退之不及夫偶者為少隂隂偶而進之不及夫竒者為少陽而四之則六七八九合夫數竒三偶二合夫畫而數亦於是焉合其多少則合其數之陽實而隂虛故有自一虛中而為偶自二實中而為竒之象也蓋掛扐之竒徑一而過揲之竒圍三而掛扐過揲之偶鈞用半也故分掛扐過揲而橫觀之則以隂為基而消長有漸分四象而縱觀之則亦以隂為平而低昻有漸其十二之則自右一而二自左二而三其四之則自右三而六自左六而九如水之流行觸東而復西其消長則其自然之淪漪其判合則其盈科而後進者也此皆自夫一行邵子之說而得之知此則知夫誤推一行三變八卦之象謂隂陽老少不在乎過揲者為昧乎體用之相因而誤推邵子去三用九之文謂七八九六不在乎掛扐者又昧乎源委之分也由此而極其竒偶之變以位則陽一而隂二也以數則天三而地兩也𥘉變之徑一而圍三以為竒者三而得之是以老陽少隂之數多也後二變之圍四用半以為偶者二而得之是以少陽老隂之數少也分隂分陽則𥘉一變皆竒而後二變皆偶也迭隂迭陽則去掛一𥘉一變皆偶而後二變皆竒又如畢中和天地人之說也其變也自一生二二生四而又四之四生八八生十六而言則畫卦之象也自四乘而十六十六乘而六十四則重卦之數也故𥘉變而得兩儀之象者二畫卦之數也再變而得四象之象者四畫卦之數也三變而得八卦之象者六畫卦之數也自兩儀之隂陽而言其用數則乾兊離震皆十二而巽坎艮坤皆四也自八卦之隂陽而合其體數則乾坎艮震三十二而巽離坤兊三十二也自二老二少之隂陽而言其饒乏之數則又如四象之七八九六也六變而得四象之畫則每位之靜變往來得十畫卦之數也又二畫則總其數矣其數也皆靜者為多變者為少而一爻變者居中其靜與變皆老隂為多老陽為少而二少居中積畫成卦則每卦之靜變往來得十五畫卦之數也又三畫則總其數矣其數也亦皆靜極者為至多而變極者為至少而又一爻二爻進退於其間其靜與變則皆坤為至多乾為至少而三男三女進退於其間因而重之則每卦之靜變往來得三十畫卦之數也又六畫則總其數矣其進退多少皆與八卦之例同也此皆自歐陽子七八常多九六常少之一言而推之與夫後二變不掛不知其為隂而使二老之數與成卦同二少之數與二老同而參差益甚其初一變必鈞不知其為陽而於乾坤六子之率勉強求合乃若四十九蓍而虛一與五十蓍虛一而掛二者固有間矣此以蓍求卦者也若夫以卦而求變也則自夫交易巳成之體為變易應時之用由兩儀而上自紓而促八卦循環而其序不亂以逺御近以下統上而皆有文之可尋也以變而求占也則自靜極而左之一二三四五自動極而右之一二三四五極自用其極而一則專其一居兩端而分屬焉二則分其爻居次兩端而分屬焉動則上爻重而靜則下爻重也三則分其卦居中自為兩端而分屬焉前則本卦重而後則之卦重也動中用靜靜中用動靜多主貞動多主悔而皆有例之可推也然自此而極言之則以六甲納之其卦之序不亂也以互取之其序有漸而亦不亂也以伏求之其序亦有漸而不亂也以丗位反圖而推之則一而二二而四四而八八而十六進退有序逆順以類而不亂也以䇿數即圖而考之則在兩儀而一消長在四象而二消長在八卦而四消長在十六而八消長在三十二而十六消長故長中八消消中八長皆震為巽之消而坤為乾之消巽為坤之長而乾為震之長而不亂也以揲變之數應圖而推之則其多少又合乎一一為乾八八為坤以少為息以多為消而亦不亂也是則按圖畫卦揲蓍求卦莫不吻合矣然而朱子猶以大衍為不自然於河圖而變揲之左可以形右卦畫之下可以形上者又以為短於龜也其三索之說則一行有成說既取之於本義後復以為不必然而卦之隂陽之竒耦畫與位合則大傳有明文既著之筮說而不明言於啓蒙是又恐後人求之過巧而每遺恨不能致古人之詳者也若以竒䇿之數合之圎圖之畫則四十八一卦之畫也其竒之十二即乾之隂而策之三十六即其陽也三十六自九進而得之也九陽也三十六亦陽也全陽也其竒之二十即兊離之隂也而䇿之二十八即其陽也二十八自七進而得之也七陽也二十八隂也陽合於隂也其竒之二十四則坤所去之半也而策則所用之二十四隂也二十四自六進而得之也六隂也二十四亦隂也全隂也其竒之十六即艮坎自上所去之十六也而策之三十二即其所用之半并上所餘之八隂也三十二自八進而得之也八隂也三十二陽也隂合于陽也其震巽之不用則猶乾之不用隂坤之不用陽也其竒䇿之八方數之變也掛扐之六圎數之變也此邵子之說也然前之竒䇿之所當隂不若陽之齊後之六八之所應圎不若方之備是必有深意也第未能考而知之又不知朱子之意以為如何此因櫝蓍而記之至元十年春二月吉日櫝成記麟齊記編修王之才治春秋而專門左氏者也嘗有取於獲麟之義名其所居之室曰麟齊而請豫記之夫獲麟仲尼作春秋所書之一事爾而春秋之義非居所係於此者歐陽氏固已言之於前矣然春秋之時仲尼實天理元氣之所在而與濁亂之氣數相為消長於當時如麟者則我之氣類也其來也固非偶然而來也然而斯氣之在當丗者蓋無幾焉在彼之氣足以害之在此之氣不足以養之由麟可以卜我之盛衰由我可以卜丗運之盛衰而聖人固不能恝然於其獲也謂之致麟可也謂之感麟亦可也皆理之所不無者雖然聖人之作春秋因天道人事自成之文從而文之其義皆因事而寓焉安可曲為一定之說也雖然子既有取於麟則吾不得默默於麟矣夫麟之所以為麟者乃天地之所以生而人之所以能為天地之心者也在春秋則聖人所賞之善也在易則聖人所指之陽也而人之所未嘗一日無者也苟自吾身之麟而致之則凡害人者如長蛇如封豕如叨餮如檮杌莫不消鑠蕩滌於魑魅之域而天下振振皆吾氣湛行之地矣今聖人雖不得盡其所致於當時然其所以扶此抑彼者而斯麟固已麟於萬丗矣子之讀春秋者豫知子將思有以麟夫一齊而已也雖然豫於聖人剝廬閉關之戒見聖人之拳拳於此乃歎鳯鳥之不至傷魯麟之致獲之心也嗚呼麟乎又當以聖人之心為心而自麟其麟也夫年月日記輞川圖記是圖唐宋金源諸畫譜皆有評識者謂惟李伯時山莊可以比之蓋維平生得意畫也癸酉之春豫得觀之唐史暨維集之所謂竹館柳浪等皆可考其一人與之對談或泛舟者疑裴迪也江山雄勝草木潤秀使人裴回撫卷而忘掩浩然有結廬終焉之想而不知秦之非吾土也物之移人觀者如是而彼方以是自嬉者固宜疲精極思而不知其勞也嗚呼古人於藝也適意玩情而巳矣若畫則非如書計樂舞之可為修已治人之資則又所不暇而不屑為者魏晉以來雖或為之然而如閻立本者已知所以自恥矣維以清才位通顯而天下復以高人目之彼方偃然以前身畫師自居其人品已不足道然使其移繪一水一石一草一木之精緻而思所以文其身則亦不至於陷賊而不死苟免而不恥其紊亂錯逆如是之甚也豈其自負者固止於此而不知丗有大節將處已於名臣乎斯亦不足議者子特以當時朝廷之所以享盛名而豪貴之所以虛左而迎親王之所以師友而待者則能詩能畫背主事賊之維輩也如顔太師之守孤城倡大義忠誠蓋一丗遺烈振萬古則不知其作何狀其時事可知矣後丗論者喜言文章以氣為主又喜言境因人勝故朱子謂維詩雖清雅亦萎弱少氣骨程子謂緑野堂宜為後人所存若王維莊雖取而有之可也嗚呼人之大節一虧百事塗地凡可以為百丗之甘棠者而人皆得以芻狗之彼將以文藝高逸自名者亦當以此自反也豫以他日之經行或有可以按之以考夫俯仰間巳有古今之異者欲如韓文公畫記以譜其次第之大槩而未暇姑書此於後庶幾士大夫不以此自負而亦不復重此而向之所謂豪貴王公或亦有所感而知所趨向焉三月望日記退齊記老氏其知道之體乎道之體本靜出物而不出於物制物而不為物所制以一制萬變而不變者也以理之相對勢之相尋數之相為流易者而觀之則凡事物之肖夫道之體者皆灑然而無所纍變通而不可窮也彼老氏則實見夫此者吾亦有取於老氏之見夫此也雖然惟其竊是以濟其術而自利則有以害夫吾之義也下將以上也後將以先也止將以富也儉將以廣也哀將以勝也慈將以勇也不足將以無損也不敢將以求活也無私將以成其私也不大將以全其大也柔弱將以不為物所勝也不自貴將以貴也無以生將以生也知窪必盈於是乎窪知弊必新於是乎弊知少必得於是乎少知朴素之可以文於是乎為朴素知溪谷之可以受於是乎為溪谷知皎之勢必汚盈之勢必溢鋭之勢必折於是乎為嬰兒為處子為昏悶晦寂曰忿曰武曰爭曰伐曰矜凡物得以病之者皆閹焉而不出知而示之愚辨而示之訥巧而示之拙雄而示之雌榮而示之辱雖出一言而不令盡其言事則未極而先止也故開物之所始成物之所終皆捭焉而不與而置巳於可以先可以後可以上可以下可以進退可以左右之地方始而逆其終未入而圖其出據㑹而要其歸閲釁而收其利而又使人不見其跡焉雖天地之相蕩相生相使相形相倚相伏之不可測者亦莫不在其術中而况於人乎故欲親而不得親欲踈而不得踈欲貴而不得貴欲賤而不得賤欲利而不得利欲害而不得害其關鍵槖籥不可窺而知其機紐本根不可索而得其恍惚杳冥不可以形象而搏執也嗚呼挾是術以往則莫不以一身之利害而節量天下之休戚其終必至於誤國而害民然而特立於萬物之表而不受其責焉而彼方以孔孟之時義程朱之名理自居不疑而人亦莫知奪之也中山滕君仲禮早以學行知名而為人則慷慨有才節者也以退名其所居之室既以寧失於有所不為戒在於無妄之往自銘矣而又請豫文以記之豫固知仲禮之不為老氏之退者然亦豈真失於有所不為者也夫有所不為者蔽焉而不知舉變焉而不知通固滯焉而不知所以化而其終亦至於誤國而害民然要之則知不足而巳矣而人亦得而責之而彼亦無所逃其責焉非如為老氏者之以術欺丗而以術自免也豫喜仲禮之退而又欲其愼其所以退也故極言二者之失至元丙子八月既望容城劉某記叨餮古器記金臺田景延蓄一銅器若古尊彞其象拱泉而垂腹裸其面而坐則人焉河東元裕之為之考定其為古器無疑而謂其象則叨餮也景延遂以劉敞吕大臨例而圖之欲以張博古之本焉而且請豫記之嗚呼人之於古器物也强其所不可知而欲知之則為博物之增惑也舍其所不可知而特慕其古焉則為玩物之喪志也為增惑為喪志皆非知好古者也舍其所不可知者而求其所可知者則古人之所以為戒者在我矣因其所可慕者而思其大可慕者則古人之所以為古人者自此而得矣求知是知也求慕是慕也則人之於古器物也固有可為致知之一明德之端者矣夫如是則吾惟恐景延之不好古器然亦恐景延終將不好也至元丁丑十月朔容城劉某記何氏二鶴記户部尚書何仲韞鎮姑孰時所畜鶴有雌雄不雜處者兩凡鶴之𬒳畜者多不卵而其雌卵二他雖卵而不生而二卵皆生他雖或生亦不長息而死今卵而生者巳翩然二鶴矣南州士大夫名以瑞鶴而請其說於子天人天地之心也心固可以帥夫氣而物則氣之所為也故物有自我而變者而鶴何瑞之有焉苟我之積於中而發於外者莫不藹然慈祥則彼物之浮沉於吾氣之中者雖萬物失所而獨全其生雖氣類暴悍而獨順其性故猫有相乳者雞有哺狗者夫物固不得而自知之也今何氏之鶴能有别復卵而育也在仲韞必有以使之然者雖然自物而推之人自家而推之國吾之志所得而帥吾之氣所得而育者二鶴而巳乎至元十六年九月朔容城劉某記歸雲菴記易有鄉曰凌雲鄉有道菴曰歸雲鄉民劉用之所作也用家有田千餘畒水磑二區白金二千兩性薄於自奉而喜施豫乃並其居築老子祠祠側為環堵十餘客有學老氏之靜者延而居之凡衣食皆給焉使得一意於學而無事相往來如是者二十年其田財費以盡而用亡矣客亦散矣今但有奉祠者數人而巳嗚呼用亦勤矣哉蓋聞燕山竇氏之風而興起者惜其智力止及於此而巳也昔豫游西山過其鄉而裴徊者久焉見其山水雄勝雲煙竒麗慨想一時賔主之樂不覺有飄然遺丗泠然長往之志也至元丙戌用之女夫鄧淵拜豫請紀石以旌其事子問用他所行曰嘗收癃老十餘人養之家終身焉又通瘍醫以藥授病者不責償問用時環堵客曰往往以道術知名亦有𬒳徴車賜真人文師號者問今奉祠誰曰丈人時客崔徴士之徒也問築祠始末曰今五十年矣問祠所里名曰沈也余於是念疇昔之經行傷有志之不就取老氏之旨為歸雲之章授今奉祠者俾歌之以為步虛之變焉惟靈居兮大無鄰旋一氣兮凝雲忽乘之兮下覽思明示兮德之門相彼髦士兮尚不稱老况乾之尊兮有嚴其昊孰守虛柔兮恆處子道眷兹人兮與俱命白雲兮前驅渺何方兮故域雲遙遙兮踟蹰是年三月望日容城劉某記高林重修孔子廟記安肅高林里距吾居五十里聞有孔子廟枉道而拜焉詢其創始復興之由里之耆老劉禎等言廟起于五代之際久乃廢毀金大定間鄉先生孫直卿率里中豪族盧劉田三氏始修葺之迄今至元庚辰圯壞幾盡禎劉氏孫也復率盧氏子孫共繼先志經營於其年之春逮明年秋廟貌既尊乃興祭器以祀事告成且為鄉約春秋釋奠之禮俾可以繼里人自以非學者而祀先聖恐踰禮制請就質焉豫按禮釋奠於先聖先師謂學詩書禮樂者各以所習業而祭其先師也孔子豈詩書禮樂專門之師邪既非詩書禮樂專門之師豈學官所得而私者邪詩書禮樂之官且不得而私又豈後丗俗儒記誦詞章者之所得而私也禮飲食必祭祭先造飲食者也蓋以吾之所以享此者斯人之力也孔子立人道者也今吾之所以為人君君臣臣父父子子而不淪胥於禽獸之域者其誰之力歟於一飲食而知報其力於此而不知所以報焉惑矣諸君其勉行事無懈禎等曰諾且請書其辭於石併記歲月之始末云又明年秋九月晦日容城劉某記遊高氏園記園依保城東北隅周垣東就城隱映靜深分布穠秀保舊多名園近皆廢毀今為郡人所觀賞者惟是豫暇日游焉甚樂園之堂其最高敞者尚書張夢符題為翠錦或者指之謂豫曰此貴家某氏之樓也今甫四五十年耳巳撤而為是矣嘻人其愚哉非不見之復為是也奚益豫聞之大以為不然夫天地之理生生不息而巳矣凡所有生雖天地亦不能使之久存也若天地之心見其不能使之久存也而遂不復生焉則生理從而息矣成毀也代謝也理勢相因而然也人非不知其然也而為之不巳者氣機使之焉耳若前人慮其不能久存也而遂不為之後人創前人之不能久有也而亦不復為之如是則天地之間化為草莾灰燼之區也久矣若與我安得兹游之樂乎天地之間凡人力之所為皆氣機之所使既成而毀毀而復新亦生生不息之理耳安用歎邪豫既曉或者復私記其說至元辛卯四月望日記種德亭記趙郡王允中其先太夫人所居之堂而鄖城先生名以善慶且為之記允中别築亭為游息之所而寓軒先生題為種德求豫記之豫聞或有疑夫善慶種德之意若重出者蓋不知二公命名之意其脉絡所屬有賔主之分焉堂之名自我泝而上之也而我為承其慶者也亭之名自我沿而下之也而我為有所種者也就夫種以譬之如去歲之所種所以給夫今歲之用也而來歲之用所以仰夫今歲之種也一不種焉則其用也從而窮矣今允中之所以承其慶者既有所自而其實亦見於堂之記矣其後人之所以承於我者必將自允中而出之豫嘗因是而求允中之心三為廉使未嘗不以賑恤罷民平反冤獄為事使河南時奏罷鎮南郎將為民害者一人力出良家誤為豪右所臧獲者百餘口此雖皆人所不敢為者然未足以知允中也至於陳請省臺嚴江浙鬻子之禁上書天子論國家儲副之重使河南而哀江浙守一官而憂天下此可以見其心之忠誠惻怛之至也由是而觀之允中固不愧斯序之名而斯亭也其將復為子孫善慶之堂矣二名相因當反復無窮又何患其意之重出也邪至元壬辰八月望日容城劉某記鶴菴記或贄大經鶴二畜庭中遂名其菴鶴一日問豫曰子知我鶴名菴也何哉豫曰此在我而不在鶴夫樂水者吾見其知之周流同於水也樂山者吾見其仁之重厚同於山也大經之機警高亮游心間逺發為文章清雄婉麗可以鳴一時而傳後丗此非同於鶴者乎故聞其聲見其形欣然而恱非鶴可恱也我之同於鶴者使之然也大經曰豫之於鶴非但恱之而巳也子其為我更思之豫乃顧鶴而歎曰謂大經為厭丗俗之卑隘不可與處思欲高舉逺覽而與此游邪則其心狹矣謂大經為以巳之軒昻超卓勢利不可得而羈縻之姑引此以自况邪則其心矜矣狹與矜大經不僞也然則名菴之意果安出邪豫觀古人之教凡接於耳目心思之間者莫不因觀感以比德託興喻以示戒是以能收萬物而涵其理以獨靈如黃鳥之章孰不賦之而聖人則曰於止知其所止夫斯鶴之呼之不來長鳴下趨亦常事耳而子瞻乃嘆其為難進易退蓋亦黃鳥之遺意也由此而推之其遊於隂知養也感夜半識時也鳴則聞于天飛則一舉千里有本也其動也節其鳴也律用和也月白風清徘徊佇立玩此數者於縞衣玄裳之外寧無起豫者乎名菴之意或出於此大經曰得之矣至元壬辰冬十月望日劉某記靜修先生文集卷之十八
