front:
  text: 靜修先生文集卷之九
  hash: sha256:995381fbeee81a4bb1feb511de2b66da0b119be211f2cc4377e28872516b8b7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_009-1a}
body:
  text: 七言律詩有客門前有客通名姓一别十年記憶無鬢髮俱驚各衰白行藏巳涉幾榮枯急呼滿酌辭醅軟聊用親嘗輔飯粗深感故來兼久候送歸雖病不須扶雨夜夢覺呼童問幾更未譍先作不平鳴山深六月有秋意夜靜滿城惟雨聲四海虛名此身愧百年浮丗寸心驚誰教簷溜如愁思欲斷還連直到明現前萬事除無取現前此身隨處可周旋居南懷北豈安土巳夏願春非樂天誰謂包涵心有外我知彌滿道無偏洞觀今古平平在賸盡區區智與權上冢鄉鄰見戲説兒童日日相邀社酒紅故國無家仍是客病軀未老錯呼翁里胥驗帖徴遊户縣長聞名謁下風欲向溪南訪喬木不禁煙雨正空𪷟桃花菊東籬元不是天台誰挽春風到酒杯丹藥有靈能換種黃花從此不須開已經晚節霜才識不是寒香蝶亦猜老眼淵明不今古幾回春去復秋來夏日幽居二首隱几青山意獨長回看人丗易炎涼栽培得力江陵橘薄惡傷心陸氏莊莫就一時論絳灌要從千載到羲黃人間何處莵裘好擬問希夷買睡鄉閉門終歲淡無求雲雨人情亦可憂斗酒難酬滿車望杯羮直結殺身讎平生幾緉謾多苦一日百錢姑少休山鳥不鳴林影靜卧看蛛網罥蜉蝣夏日飲山亭借住郊園舊有緣緑隂清晝靜中便空鈎意釣魚亦樂高枕卧遊山自前露引松香來酒盞雨催花氣潤吟箋人來每問農桑事考證床頭種樹篇午睡間中何事不清妍鳥戀花隂伴晝眠窗外雨晴山有暈枕邊風息樹無絃面前多放寬平地方寸嚴臨咫尺天萬古羲皇有餘意不妨分我百來年新晴小雨新晴草色蘇家園生理未全踈埋盆欲學魚千里試地先栽芋一區時與老農談稼穡不因間客罷琴書乾坤妙處無人會卧看墻隂雀哺雛醉梨白雪春香洗未殘玄霜誰遺凍成團漆封圎顆盤增滑蜜和濃漿齒避寒緑蟻從今忘病渴金花無地著餘酸快人風味依然在莫作尋常軟熟看送人官浙西江海十年幾戰酣劫灰飛盡到耕𧖟亂離文物想猶在凋弊徴科恐未堪眼底興亡即今古胸中形勝欠東南因君漸有扁舟興佇待清風洗瘴嵐九日客至有人車馬訪柴桑怪見寒花滿意黃莫對青山談丗事試將華髮照滄浪淵明不與白蓮社程子猶憐緑野堂他日燕南話耆舊此回風味亦難忘贈趙丈八十詩併序趙丈字澤民金義宗初年應律科中天下第一授商州知法尋除左部檢法遷新息令北渡客順天中統初擢為左三部司正致仕景州判官為人樂易寡默嘗與先人同應真定宣撫司辟召故豫以父執事之今年八十餘里人好事者榮其壽諸公為賦詩而求豫倡焉律學專門自可疑更從報施論心期干戈留在三章法松菊歸來兩鬢絲再拜通家惟此老百年涉丗亦吾師平生辦作耆英序慚愧胸中壽域碑九月晦日過鎮州宿趙徴士黃極道菴慘酷姦訛禍丗親翕張無復見真淳藏來龜六終留殼調中狙三巳自塵符藥真能度衰俗漁樵却恐有幽人摩挲石刻皆名筆庭下寒花不似春菴取象藏六寄張之傑便擬庭闈捧檄過直須隨俗苦揚波一瓢有樂誰云細三釡無歡亦謾多戰國遺風餘管樂南朝清議尚王何見人時樣知吾拙獨誦滄浪太古歌黃精地黃合釀名以地仙酒仙家名品對嵳峩誰信幽人用物多酒面白雲招我在杯中華髮奈君何西山秀氣斸欲盡易水寒聲釀亦和未望天行望千歲舉觴當和紫陽歌雲卧天行非豫敢議守一處和千二百歲晦翁調息針也席上分賦二杯二首隴鳥回頭意若何刳腸欲我鑑紅螺微茫山色詩䀶在灔澦灘聲飲興多聖處巳分糟與蟹醉來惟見酒成波千年醒殺江魚腹應恨生身向汨羅右螺希夷尊俎永相忘混沌鑿開見此觴金橘有天容逸老青田無地避餘香雲中招飲留仙掌物外尋真得醉鄉試向峨眉問啼鳥人間紅雨幾斜陽後蜀紀劉光祚進桃核杯云得于華山陳摶邵康節謝人惠希夷尊詩有仙掌峯巒峭不收希夷去後遂無儔能斟時事高擡手善酌人情略撥頭之句右桃張氏西園水府生煙晚更蒼翠隂含雨暗生涼人間豈有赤松子天上應無緑野堂一日平原驚客散千年郭隗又臺荒誰教老樹夕陽在留與慿欄遣興長示彩鱗相思擬話百年情燈火直須幾徹明繼志未論班氏史隆師何用鄭公名人門忠孝寧無責學術淵源先有盟欲寄君詩仍感泣野夫能有幾門生除夕莫道春風室罄懸試看孤影伴頽然浮雲往事空千變清鏡明朝又一年頭上無繩繫白日胸中有石補青天幾時能了西山約六角黃牛二頃田秋郊行過青林徑欲還誰家茅屋在林間雲初湧出半含雨風漸吹開微露山丗味嘗來知懶貴物華老盡覺秋間天教勝境為詩敵未許幽人穩閉關薔薇酒顔色酴醾茉莉香琉璃到手會須嘗一杯滄海泡成幻萬古花菴醉有鄉涼冷併收天水碧輕醇猶帶女真黃錦囊盡貯春風在别是仙家不老方服食家有餌薔薇法送董巨濟尋親花繞東鄰竹馬鞭春隨西舍板輿肩白雲尚在棲遲地彩服俄驚喜懼年樵爨定知生處樂兒孫多向老來憐阿翁别後還家夢比擬思親恐未偏賈氏溪堂淡淡春波逺更宜丘山華屋總成非來今往古年華在厚地高天人力微丗上紅塵無此客杯中明月有清暉燕南盛事君須記曾為東湖盡醉歸望易京亂山西下鬱岧嶤還我燕南避丗謡天作高秋何索寞雲生故壘自飄蕭誰教神器歸羣盜只見金人泣本朝莫怪風雷有餘怒田疇英烈未全消七月九日往雄州秋聲浩簜動晴雲感慨悲歌氣尚存灑落規模餘顯德承平文物記金源生存華屋今焦土忠孝遺風自一門白髮相逢幾人在蒼煙喬木易黃昏水門菴池煙林影淡無姿物外高寒兩石磯雲水流行寧有迹乾坤俯仰自相依波涵晴景動猶靜鳥戀幽人去復歸回首塵緣吾未了靈風且莫故吹衣答或者以所注孫子見示二首學術兵農豈盡無規模如此亦區區權書不免增多口霸論誰教混一途親手申韓如果有許身管樂未全誣千秋萬古中庸在留與橫渠作後圖邵公武讀書志有橫渠少年注尉繚子一卷誰遣歐陽筆有神微詞端不赦堯臣樵夫見笑寧無愧童子羞稱亦可人但得躬耕全性命猶勝偏霸在風塵芻蕘一語宜深聽樓上元龍且莫嗔溪光亭看雨萬山齊擁白煙來木杪先聲失怒雷海嶽奔崩换毛骨乾坤收斂入胚胎龍公所藴有如此塵丗一清何壯哉坐看神功空束手夕陽華髮對蒼苔避暑玉溪山風露撩人儘力清也應知我到禪扃秋聲滿谷有生氣山意帶煙成逺形皎月欲升天失色白雲𥘉出樹留青他年若訪經行處合有先生避暑亭飲江漢白高亭飲興動江山為捲灘聲入坐間糟麴真能釀滄海魚龍直恐盡神姦襄流謾説葡萄暖仙國曾分玉液慳聞道兵塵埋楚甸一杯誰與洗愁顔鄉先生漢韓太傅嬰墓章句區區老益堅百年軻死巳無傳四詩今併毛公廢三䇿聊存董相賢祀典曾聞鄉社在荒墳重為里人憐絃歌燕趙今誰見高詠周南獨慨然玉柱雙清香二氣元從太極分浮雲起滅見來真白虹貫日豪華散砥柱中流意象新方寸有靈涵大塊頭顱無物隔蒼旻藍田萬里煙生玉禾辦晴窗半穗春心無外躰無間吾薰爐銘也對菊迂踈不辦一身謀鬢髮空添四海憂畫本流民今復見詩家逃屋為誰留黃茅安得千間厦白布空歌萬里裘政有南風曲中意可能獨醉菊花秋西湖水竇深藏十畒煙賣書直欲買魚船數椽破屋巳自足四海虛名良可憐醉後不知清露下興來擬共白鷗眠濂溪謾有當年志老去而今只愛蓮玉乳峯亂山如擁欲爭先惟許孤峯入馬鞭舊見劒光曽犯斗誰教箭筈亦通天只應絶頂千年石中有齊州九點煙安得凌風乘此去東遊滄海看桑田積雨萬象何為入杳冥懸知物外自高明前年憂旱有今歲半月閉門如一生捧日謾勞中夜夢補天誰識寸心誠隂雲政使高千丈坐受魚頭恐未平溪光亭小憩尋涼隨水到溪亭十里緑隂慙鳥聲自惜筋骸恆丗故豈知風露巳秋清白雲似與山爭秀落日放教川盡平六月農家猶赤地登臨舒嘯若為情都山劉丈九十詩卷感事還悲負米身此生無復九齡親干戈誰共知年喜天地獨全愛日真只擬商顔亦秦土豈期唐水尚堯民胸中壽域平生在開卷題詩覺有神秋夜巳喜山深稱野情每慙無物慰諸生書貪日課不時睡雞為誦聲長早鳴病後端居信張詠靜中未發有延平誰知今日絶絃意却恐人間知此聲憫旱農父看雲淚亦乾靈湫誰信欲生煙萬金良藥汗猶出一寸丹心天可旋未便無食思樂土不禁憂國願豐年為占河漢中宵起獨對殘燈理斷編過徐橋老岸石欄曙色分只疑身是入山雲十年往事不回顧百里清泉如可聞人丗誰教有長路坤靈終亦化塵氛興亡更遣陂塘在幾欲悲歌酒未醺宿龍宫擬欲題詩贈白雲且傾濁酒洗塵氛間將談笑論當丗却喜稱呼是隱君天柱舊曾分户帖神林今又有移文夜深長鋏悲歌罷此曲山靈恐未聞過東安趙宋先塋五李風煙慘晝霾渠兒有志亦雄哉纍朝禪䇿皆虛器千古黃袍又厲階文物漢唐今巳盡史編南北更堪哀荒墳一品知何處猶遣石麟草半埋秋夜坐困沉思強起行虛庭涼露下無聲為爾寂寂人莫笑不肯碌碌君何成萬古興亡天亦老百年身丗夜難明情知不為學仙去也欲蓬瀛寄此生洪元宫明日擬到天城樹邊平野接晴霞腳底清江走白沙方外道人留客住門前塵丗倩山遮自慚爛賞無多暇更有行􅌪第二家煙雨兩陂皆古木興來便作上天槎哭王之才編修草草離觴記去年誰知此别是終天傳雖成癖今安用史未為榮應自憐四坐高談宛猶在一經白髮竟無傳交朋日與來書少不過西州亦泫然張仲賢宣慰淮東過子山中臨别贈詩庸見定交之意云昨夜相逢終夕話今朝送别百年情丗緣盡付禪心在官况併隨詩境清此日救焚猶有望他年勇退豈無盟知君苦愛希夷老莫厭山深不寄聲白海青扶餘玉爪舊曾聞青鳥猶霑海氣昏掌上風標有如此眼中神駿更憐君平蕪未灑頭鵝血春水誰開獵騎門過應昏鴉莫回首霜拳高興在空雲城樓待雨雨入江樓勢欲吞雷轟何止語難聞未憂彼岸將為壑只恐吾山盡化雲風伯為誰能却敵物華依舊歎如焚百年人事今如此猛拍欄干怨夕曛憩謁山寺石田霜落晚簫騷一徑禪扃亦自高九萬里風安稅駕三千丗界等秋毫山哀似苦天相罩秋老不禁詩大豪西望雙龍有高隱結菴終擬近林臯唐張忠孝山亭故墓斷碑藩鎮記當時杯酒談兵少牧之山色何曾間今昔人才初不限華夷水波風起心猶壯木杪秋生鬢已知莫更候雲臺上望武陽禾黍亦離離武陽故臺仁義徒令此舌存轍環初不救紛紛天公欲為秦漢計野色更無燕趙分滿眼兵塵餘故壘一聲樵唱入秋雲擬乘碣石觀滄海易水東流去不聞次韻答范陽郭生默坐誰窺樂境深無絃初不用知音曲肱睡起亦何事弄月歸來徒自吟多愧寄書勤訪道未嫌傾蓋即論心西山百里平如案欲認東州煙雨侵登武遂北城神州英氣鬱高寒臂斷爭教不再連千古傷心有開運幾人臨死問幽燕平生卧榻今如此百萬私錢亦可憐咫尺白溝已南北區區銅馬為誰堅靜修先生文集卷之九
