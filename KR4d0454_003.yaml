front:
  text: 靜修先生文集卷之三
  hash: sha256:75fab16e82c516902ede811b9f25723646e4f1d9930ae12e6f41154009dddfe1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_003-1a}
body:
  text: 和陶集和九日間居深居忘晦朔好事惟侯生偶因菊酒至喜聞佳節名香醪泛寥廓醉境還空明青天凛危帽浩空秋秋聲緬懷長沙孫生氣流千齡乾坤一東籬南山久巳傾回看聲利徒僅比秋花榮撫時感遺事可見萬古情興詩此三復淹留豈無成和歸田園居五首少小不解事談笑論居山為問五柳陶栽培幾何年安得十畒宅背山復臨淵東鄰漢隂圃西家鹿門田前通仇池路後接桃源間熙熙小國樂夢想羲皇前石上無禾生燦爛空白煙營營區中民擾擾風中顚未論無田歸歸田誰獨間迂哉仲長統論說徒紛然商顔高在秦天馬脫羈鞅東陵高在漢雲鴻渺遐想超然秦漢外當年誰長往每讀淵明詩最愛桃源長北望徐無山幽棲亦深廣空和歸田吟商聲振林莾塊坐生理薄出門交友稀田翁偶招飲意愜淡忘歸游秦驚避竈過宋須微衣永謝門外屨從翁不相違魯甸五十畒簞瓢足自娛顔生未全貧貧在首陽墟商顔遇狂秦䔥然真隱居箕山彼何為結巢松一株富貴豈不好有時貧不如在卷非不足當舒豈有餘誰持三徑資笑我囊空虛傭書易斗米吾田亦非無吾宗古清白耕牧巨河曲雖非公卿門紆朱相接足陵谷變浮雲家丗如殘局舉目遺安齊先考嘗題所居齊日遺安先訓炳如燭區區寸章心依然抱朝旭和乞食好廉中無實觸事或發之萬鐘忘義理一簞形色辭吾貧久自信笑聽溝壑來偶聞啼飢子低眉問殘杯兒啼尚云可最愧南陔詩豈無乞貸念慚非動時才人理諒多闕清規亦徒貽和連雨獨飲吾心物無競未醉巳頽然乾坤萬萬古坐我春風間弱女亦何知挽衣呼我仙窺人簷鳥喜共舞風雩天舉觴屬羲皇身在太古先忽遇弄丸翁見責久不還一笑了無間今夕是何年遙遙望白雲欲辨巳忘言和移居二首十年寓茲邑渾家如泛宅言念息吾廬頽然在斯夕床頭四子書補間薪水役寒𬞞挂庭柯風葉滿粗席藩垣護清貧簞瓢閲今昔珍重顔樂功先賢重剖析躬耕力不任閉户傳書詩資生豈師道舍此無所之今年榖翔貴自笑還自思安居逢歲歉乘除動天時強顔慰妻孥一飽在來茲雪好炊餅大占年不吾欺和還舊居巨河西北來浩浩東溟歸河邊兩榆柳游子無窮悲樹老我何堪物是人巳非鄰翁醉相勞自云鬼録遺早晚見先公問爾今何依豈無磊磊功使下地下推吞聲謝鄰翁讀書志未衰持此報吾親餘事手一揮和九月九日九月閉物初孤陽困無交園木眩霜紅豈解憂風凋物外風雩春氣橫湖海高舉手謝浮丗凝睇思層霄揮觴送秋節哀此造物勞傾河瀉萬象隨手如沃焦崇高笑山斗未能出鈞陶况復草間蟲區區寒露朝和飲酒二十首尊罍上玄酒此意誰得之人道何所本乃在羲皇時頗愛陶淵明寓情常在茲子倡我為和樂矣夫何疑有問所樂何欲贈不可持醉翁意自樂非酒亦非山頽然氣坤適酒功差可言謂此不在酒得飽忘豐年君知太和味方得酒中傳阮生本嗜狂欺丗仍不情酒中苟有道當與丗同名何為戒兒子不作大先生良心於此發慨想令人驚士生道喪後美才多無成草木望子成豈憂霜露飛禽鳥忘身勞但恐飢雛悲生意塞兩間乾坤果何依我既生其中此理須同歸喜見兒女長不慮歲月衰雖為曠士羞理在庶無違山人有靜癖苦厭一瓢喧奈何衆竅號萬木隨風偏我常涉千里險易由關山今古一長途遇險焉得還哀歌歎安歸夷皓無此言我安適歸謂伯夷歌吾將何歸謂四皓歌此司馬遷皇甫謐所作非知夷皓之心者茫茫開闢初我祖竟誰是於今萬萬古家居幾成毀往者既巳然未來亦必爾何以寫我心哀泉鳴緑綺生備萬人氣乃號人中英以此推衆類可見美惡情隂偶小故多陽竒屹無傾誰將春雷具散作秋蟲鳴既知治常少莫歎才虛生凝氷得火力鬱鬱陽春姿寧滅不肯寒陽火如松枝詩家有醇醪釀此松中竒一飲盡千山枯株彼何為所以東坡翁偃蹇不可羈黃河萬古濁猛勢三峯開客持一寸膠澄清動高懷飛駕探崑崙尚恐志易乖囑我乘浮槎徑往天地棲就引明河清為洗崑崙泥相看淚如雨千年苦難諧何當御元化擺落人丗迷下覽濁與清瞬息千百回十年小學師一屋荒城隅飢寒吾自可畜養無一途亦愧縣吏勞催徴費馳驅平生禦窮氣沮喪恐無餘長歌以自振貧賤固易居貧賤固易居貴盛難為工嵇叔夜詩士窮失常業治生誰有道身間心自勞齒壯髮先老客從東方來溫言慰枯槁生事仰小園分我瓜菜好指授種藝方如獲連城寶他年買溪田共住青林表此身與丗味恍若不同時惟餘雲山供有來不徑辭時當持詩往報復禮在茲有客向我言於道未無疑不為物所役乃受煙霞欺聞此忽自失一笑姑置之執價韓伯休混跡在人境百錢嚴君平閲丗心獨醒我無騰化術凌虛振衣領又無辟榖方終年酌清潁㑹須學嚴韓遺風相煥炳吾宗幾中表訪我時一至自吾居此菴才得同兩醉逆數百年間相㑹能幾次每㑹不盡歡親情安足貴所歡在親情杯水亦多味器飲代窪尊巢居化安宅凡今佚樂恩孰非聖神迹况彼耕戰徒勤力有千百乞我一身間坐看山雲白內省吾何功停觴時自惜四時有代謝寒暑皆常經二氣有交感美惡皆天成天既使之然人力難變更區區扶陽心伐鼓逹天庭乾坤固未壞杞人巳哀嗚雖知無所濟安敢遂忘情諸生聚觀史掩卷慕高風兀如逺游仙獨居無事中盛衰閲無常倚伏誰能通天方卵高鳥地巳産良弓人生皆樂事憂患誰當得人皆生盛時衰丗將盡惑水性但知下安能擇通塞不見紇千雀貪生如樂國古今同此天相看無顯默人生喪亂丗無君欲誰仕滄海一橫流飄蕩豈由己弱肉強之食敢以凌暴恥優游今安居歡然接鄰里曲直有官刑高下有人紀貧羸誰我欺田廬安所止舉酒賀生民帝力真可恃人君天下師垂衣貴清真羲皇立民極坐見風俗淳有德豈無位萬古湯盤新師道嗟獨行此風自周秦獨行尚云可誰以儒自塵有名即有對况乃一行勤聖人人道爾豈止儒當親儒雖百行一致逺非迷津矧伊末丗下空有儒冠巾何當正斯名遙酹千載人和有㑹而作併序今歲旱米貴而棗價獨賤貧者少濟以黍食之其費可減粒食之半且人之與物貴賤亦適相當蓋亦分焉而已因有所感而和此詩農家多委積淵明猶苦飢况我營日夕凶歲安得肥衾裯一飽計何暇謀寒衣經過米麥市自顧還自悲彼求與此有相直成一非尚賴棗價廉殆若天所遺惟人有貴賤物各以類歸小兒法取小淺語真吾師和擬古九首欎欎歲寒松濯濯春風柳與君定交心金石不堅久君衰我不改重是平生友相期久自醉中情有醇酒義在同一家何地分勝負彼此無百年幾許相愛厚持刀斷流水纎瑕固無有客從關洛來高論聽未終連稱古英傑秉國或從戎建立天地極蔚為蓋丗雄功成脫弊屣飄然籋遺風生丗此不惡君何守賤窮急呼酌醇酒延客無何中同游非所思所思天一隅有問所思誰意盡言不舒古今猶旦暮四海同一廬恍忽精靈通似見與我居攬衣欲從之寒月照平蕪茫然不知處歎息將焉如朝游易水側步上燕臺荒燕王好神仙不見金銀堂江山古神器海色圍蒼茫哀哉王風頽日化爭奪埸救丗豈無人賫志歸北邙撫此重長歎青山忽軒昻呼酒樂今朝往事置一方遙知蓋棺後亦起千載傷依依月光缺熒魄恆獨完清光如素絲長懷綴君冠形雖隔萬里咫尺皆君顔望君君不來十年不開關豈無黃金贈藉以青錦端愛惜明月珠肯為黃雀彈庭前秋柏實月夜棲孤鸞君嘗寸心苦中有千歲寒河流高拍天沇水洑在兹自傷困無力乘彼朝宗時顔色變涇渭風味存澠淄願君深識察期君不相疑此情良可憐感慨贈以辭辭云丹山鳥千載多苦思身游九霄上不受塵丗欺忍飢待竹實浩蕩今何之歌為靈鳳謡亂以猛虎詩西山有佳氣草木含清和道逢方瞳翁援琴為我歌音聲一何希一唱三嘆多問翁和此誰指我蟠桃華所望在千年君今將奈何翩翩誰家子慷慨歌逺游忽記少年日猛志隘九州何物能動人有此歲月流君心海無底亦使成高丘贈君一卷書其傳自衰周讀此當自悟擾擾將焉求巖巖牛山木久矣困樵採望望深澗芝無人香不改一葉振江潭輕波欲逹海幽明理一貫影響不相待願天誘臣衷所求惟寡悔和雜詩十一首日食百馬芻足有萬里塵乃知一駿骨可百駑駘身生汝天已艱天復無私親安肯養一物侵奪空四鄰長飢汝自取况值秋霜晨難生復難長愁絶藝蘭人胸中無全山橫側變峯嶺不及靈椿秋遂謂長春景只見柏參天豈知根獨冷井蛙見自小夏蟲年不永天人互償貸千年如響影廓哉神道逺瞬息苦馳騁平生逺游心觀物有深靜晝長夜乃短百刻君自量贏餘雖可致君看蜜蜂房董生論齒角三䇿奏未央樂天喻花實妙理通隂陽白詩荔枝非名花牡丹無佳實稠薄只升米聽爾宜飢腸好事理艱阻人情多畏豫芝蘭種不生鸞鴻動高翥遂令好賢心難親恐易去巢燕不待招庭花免憂慮所以末丗下凡百古不如皎皎千里駒背為場苗住求賢非吾分切巳在何處平生取友志持此當警懼因觀倚伏機亦愛柱下老時危不易度遜默庶自保不見春花樹隆冬抱枯燥生意斂根柢發泄敢獨早聖德實天生自信耿中抱猶存悄悄心庸人安足道幼安返鄉郡知音得程喜有問平生心但說臨流事乾坤魏山陽史筆凜生意物外此天民與魏偶相值見通鑑綱目淡然涉丗情月間雲目駛我作安化針上安其賢民化其得見管寧傳注韋絃不須置太玄豈無知不覺丗運迫為問莾大夫何如成都陌揚雄嘗師嚴君平扶搖得真易長卧山雲白扶搖白雲皆陳圖南號中有安樂窩氣吐宇宙窄消長燦以密彼主我為客觀先天圖可見問子居何方環中有真宅朝耕隆中田暮採成都桑平生淡泊志醜女同糟糠愛此真丈夫忘我厨無糧當年靚修銘團茅雞距陽雞距保府泉名舊嘗取武侯靚以修身語名所寓舍靚修菴回頭十五載塵跡徒自傷山居久岑寂主靜豈無方安得無極翁酌我上池觴燕南可避丗逸興生雲端安得百里封一邑不改遷絃誦和寒流溝涂映晴巔思此良自苦窮耕望盤餐願從八吟翁橫渠有八翁吟因自謂八吟翁同結一井緣買山不用詩探囊謾千篇西山霍原宅古蹟猶可稽見水經注重吟豆田謡愁雲落崩崖豆田謡見霍原本傳魯酒邯鄲圍撫事傷人懷林宗自高士此丗淹亦彌一聞孺子語西風草離披知幾在明哲何事紲塵羈君觀括囊戒無盈庶無虧我游深意寺郎山古清凉興妖如米賊乘時起陸梁事見五代史記不見重華帝所居亦成鄉乾坤師道廢春陽變秋霜撫事三太息欲語意何長和詠貧士七首陶翁本強族田園猶可依我惟一畒宅貯此明月輝翁復隱於酒丗外冥鴻飛我性如延年與衆不同歸孤危正自念誰復慮寒飢努力歲云暮勿取賢者悲獨正者危至方則礙尓實愀然中言而發違衆速尤忤風先蹶此淵明規顔延年語也見延年誄公文王風與運頽一輊不再軒消中正有長冬溫見瓜園人才氣所鍾亦如熖後煙寥寥洙泗心千載誰共研龍門有遺歌三嘆誦微言意長日月短持此託後賢淵明老解事撫丗如素琴似人猶可愛况乃懷好音鄉閭誰盡賢招飲亦相尋豈有江州牧既來不同斟仲尼每諱魯邦君誠可欽史筆自好異誰求賢者心木石能受唾豈獨相國婁視唾若如雨𥚹人亦不酬無心乃直道矯情實莊周身外不為我祖禓吾何憂伯夷視四海願人皆我儔吾謂下惠隘此說君試求飲酒不為憂立善非有干偶讀形神詩大笑陶長官傷生遂委運一如咽止餐參回豈不樂履薄心常寒天運安敢委天威不違顔莊生雖曠逹與道不相關物外有幽人閲丗如飛篷浮名不可近造物難為工西京二百年藉藉楚兩龔豈知老父觀才與薰膏同為問老父誰身隱名不通偶逢荷蓧者欣然欲往從生類各有宜風氣異九州易地必衰焠蓋因不同儔水物困平陸清魚死濁流麟亡回既夭時也跖無憂天亦無奈何自獻敢望酬寄語陶淵明雖貧當進修所似俚媪談浮圖汗漫恐不巳身心歸晏如鳯鳥久不至思君慘别顔中心藏竹實炯炯空千年千年何所往云在丹穴山何當一呼來徴爾無稽言翩翩三危鳥為我使崑丘聞有西天母靈化苦難儔願清黃河源一洗萬里流吾生豈無志所居非上游瀟湘帝子宅縹眇乘隂陽欲往從之游風波道阻長秋風動環佩星漢搖晶光月明江水白萬里同昏黃重華去已久身丗私自憐皇靈與天極蒼梧渺何山晴空倚翠壁白雲淡無言愁心似湘水猶望有歸年夢登日觀峯高撫扶桑木手持最上枝傳與甘淵谷一笑天驚白蒼凉出新浴何方積九隂區區尚龍燭纍纍玉膏實泠泠琪樹隂鸞鳯自歌舞瑟瑟風動林風林奏何樂賔天有遺音君何坎井念永負琅園心明星捧玉液太華參天長仙掌一揮謝此樂殊非常矯首望夸父飢渴無餘糧奔競竟何得歸哉此中央水物自一隅亦復具飛走乃知造化工錯綜無缺負茫茫山海間形類靡不有此亦何可窮一覽置肘後遙酹楚江騷清愁浩如海蹈襲此何人興寄果安在豈期紫陽出誇謾莫追悔見朱文公楚辝辨證五臧今九丘五臧見山海經序除去尚奚待流觀山海圖淵明有深旨撫心含無疆觀形易生死異丗有同神此境若親履何以發吾歡濁酒真可恃扶踈窮巷隂回車想高士厭聞丗上語相約扶桑止讀君孟夏詩千載如見爾開襟受好風試學陶夫子陶令自高士葛侯亦竒才中州亂巳成翩然復南來三游領坡意厭丗多驚猜不妨成四老雅興更悠哉和詠二疏委質義有歸乞骸老當去豈無戀闕心難忘首丘趣在禮此常典末丗成高舉漢廷多公卿圖畫兩疏傳至今秦中吟感歎東門路目覩霍將軍功高擅恩顧一朝産危機千載損英譽仲翁幸及年安肯嬰丗務聖主賜臣金奉養行所素造物佚我老餘齡今自悟田園付子孫身後復無慮神交冥漠中樂境尚森著和詠三良江山錯如繡死與弊屣遺安用親愛人共此丘土微秦人多尚氣宜與兒女私乃亦如當途區區戀衣帷因傷秦政惡三歎王綱虧殉人巳可誅而况收良歸坐令百夫特含恨與丗違秖應墓前柏直幹千年稀遙知作俑戒為感詩人悲重吟黃鳥章淚下霑人衣和詠荆軻兩兒戲邯鄲六國朝秦嬴秦王鷙鳥姿得飽肯顧卿燕丹一何淺結客報咸京當時勢已危竒謀不及行政使無此舉寧免係頸纓如丹不足論丗豈無豪英天方事除掃孰禦狂飈聲我欲論成敗高歌呼賈生乾坤有大義迅若雷霆驚堂堂九國師誰定討罪名一戰固未晚何為割邊庭區區六孱王山東但空城孟荀豈無術乘時失經營今雖聖者作不救亂巳成酒酣發羽奏亂我懷古情和讀山海經十三首寰區厭迫隘思見曠以踈四壁畫諸天愛此金仙廬丹青煥神迹勝讀談天書乃知屈子懷託興青虬車回首千百丗朝露棲園𬞞歸來誦陶詩復與山經俱山經何靜修先生文集卷之三
