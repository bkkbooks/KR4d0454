front:
  text: 靜修先生文集卷之十一
  hash: sha256:9e2c842bd6227d51314e3562260792aee356a82c04afef1976be4cce8c5896fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_011-1a}
body:
  text: 五言絶句明珠穴二首珠從何處來秀與天地生涵藴幾千古得此風雷聲山從何時裂珠去誰當還餘光爛猶在照我方寸間滴水龕膚寸遍天下至靜涵氤氲因看石滴水窺見未生雲石潭清不見羣魚暗不藏毒怪觀物得吾師終日欲相對春日游絲困無力欲起重悠揚芳草落花滿相思春晝長愼獨一葉下秋水微波去不停望中猶隱隱直欲到滄溟毀譽子賤波及魯犂牛不累騂寸心仁厚處萬物自生成偶書意當極快處心有不平時少忍容無害欲言當再思夢中作溪童望水滿日夜愁不巳雖非鷗鷺身亦有相関意觀化風雨何方來呼童出門望歸報是羣蜂聲在庭花上四皓圖雖戀紫芝美難忘帝力深驅馳恨臣老高尚豈𥘉心石鼎聮句圖玩丗如一鼎姓名誰得聞仙翁應自笑知我有鄒忻白樂天琵琶行圖冀馬嘶寒風逐臣念郷國江浦聞哀絃長吟望西北百蝶圖芳蝶具百種幽花散紅翠道人觀物心一一見春意子期聽琴圖琴瑟自吾事何求人賞音絶絃眞俗論不是古人心夢題村舎壁上己卯正月三日村居有何樂所樂人眞淳回看城市中居此勝買鄰村居雜詩五首隣翁走相報隔䆫呼我起數日不見山今朝翠如洗黃昏雨氣濃喜色滿南畒誰知一夜風吹放門前柳獨立偶懷古臨風還自傷一聲樵唱起回首暮山蒼削樹題詩句畫沙知酒籌他年成故事蕭散更風流芳茵皆可藉緩歩即吾車乘興三杯酒隨行一䇿書屏上草蟲四首螳螂逢物即能産其滋乃爾蕃不知何所積擬欲問乾坤蝸牛背上穹廬好問蟲誰汝施始知天地内棟宇匪人爲螻蛄後利前還澁隂陽體叚分不湏觀兎尾即此見羲文螽斯陽施隂專受精醇物始眞蟲魚寧解此聊用比振振飲山亭雜花卉八首牡丹丗變日以文花卉亦應爾懸知太古時其美未如此芍藥宜致美人贈服之良有功分形雖異種氣類暗相通薔薇色染女眞黃露凝天水碧花間日月長朝暮閱兩國萱草丹鳯忽飛來喜色滿朝露何以稱此花白頭戲嬰孺夜合消忿縁無毒合昏如識時韋絃千古意百繞惜芳枝酴醾勿剪架上花不是畏多刺得䕃難忘枝曽向花隂醉木槿巳拆暮雖落未榮朝又花生生如道體堪玩不堪嗟蜀葵且勿論傾陽色香尤可喜人情輕所多共愛姚黃美看雪雪花不擇地隨風恣飄蕩數片如有情飛落梅梢上絶句溪童出門望鷗鷺滿空下江水澹無情盡是忘機者出花下石緑珠井炙面昭君村坐令宜花地亦復愁移根商方爵商爵旣云古那堪形更竒不宜燕市酒雅稱野夫詩盆池有月湛秋影無風生小波澄心一相對今夜興如何偶書二首纍纍山下塚渺渺嶺頭雲歳晚不歸去笙鶴應望君昨日宋人苗今日牛山木寄語芒芒人管取牛羊牧筭盤不作甕商舞休停餅氏歌執籌仍蔽簏辛苦欲如何吕洞賔畫像微茫洞庭曉蕭灑崑崙秋海蟾生碧天相從何處游鴈圖夢回煙水寒鴻鴈驚不起道人心乆閑相忘有如此史處士挽章平昔未相識幾回曽寄聲今朝聞謝丗便有故人情飲山亭獨坐二首野性靜成癖幽居懶似高青山卧床下初不厭人豪愛玩不能去山晴雲卷舒敲門者誰子聊復忍斯湏偶成夢回聞雨聲忽覺是風葉問予何以知仰見梁間月溪橋歩月圖山中有幽人獨歩溪橋月莫問興如何披圖亦清絶題山水扇頭二首内二首六言山近雨難暗樓高秋易寒慿誰暮雲表添我倚欄干兩山環合一水中有老木叅天不著幽人草閤誰收無限風煙靜修先生文集卷之十一
