front:
  text: 靜修先生文集卷之十五
  hash: sha256:4745ed745dd41251e9a5c3c5bd12c6adc3392b9021e1cfc27e6d1a64b217eba0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_015-1a}
body:
  text: 樂府水調歌頭同諸公飲王丈利夫飲山亭索賦長短旬效晦翁躰一諾與金重一笑對河清風花不遇真賞終古未全平前日青春歸去今日尊前笑語春意滿西城花鳥喜相對賔主眼俱明平生事千古意兩忘情醉眠卿且去我扶我有門生窗下煙江白鳥窗外浮雲蒼狗未肯便寒盟從此洛陽社莫厭小車行念奴嬌二首弟一飲山亭月夕廣寒宫殿想幽深不覺升沉圎缺天上人間心共逺如在瓊樓玉闕厚地微茫高天凉冷此際紅塵歇翠陰髙枕併教毛骨清徹為問此丗從來幾人吟望轉首俱湮滅蟣虱區區尤可笑幾許肝腸如鐡八表神游一槎高泛逸興方超絶嫦娥留待桂花且莫開徹二憶仲良中原形勢東南壯夢裏譙城秋色萬水千山收拾就一片空梁落月煙雨松楸風塵淚眼滴盡青青血平生不信人間更有離别舊約把臂燕南乘槎天上曾對河山說前日後期今日近悵望轉添愁絶雙闕紅雲三江白浪應負肝腸鐡舊游新恨一時都付長鋏王漏遲泛舟東溪故園平似掌人生何必武陵溪上三尺蓑衣遮斷紅塵千丈不學東山高卧也不似鹿門長往君試望逺山顰處白雲無恙自唱一曲漁歌覺無復當年缺壺悲壯老境羲皇換盡平生豪爽天設四時佳興要留待幽人清賞花又放滿意一篙春浪鵲橋仙二首第一喜雨紇干生處幾時飛去欲去𬒳天留住野人得飽更無求滿意一犂春雨田家作苦濁醪釀黍準備歲時歌舞不妨分我一豚蹄更試聽今秋社鼓二悠悠萬古茫茫天字自笑平生豪舉元龍儘意卧床高渾占得乾坤幾許公家租賦私家雞黍學種東皋煙雨有時抱膝看青山却不是長吟梁甫木蘭花三首未開常探花開未又恐開時風雨至花開風雨不相妨說甚不來花下醉百年枉作千年計今日不知明日事春風欲勸座中人一片落紅當眼墜二西山不似龐公傲城府有樓山便到欲將華髮染晴嵐千里青青濃可掃人言華髮因愁早勸我消愁惟酒好夜來一飲盡千鐘今日醒來依舊老三錦雲十里川妃供一棹晚凉風欵送只愁無處著清香滿載月明船巳重氷壷水鑑元空洞天意似嫌紅翠擁併教風露入吟尊不惜秋光渾减動菩薩蠻四首第一為王丈利夫壽吾鄉先友今誰健西鄰王老時相見每見憶先公音容在眼中今朝故人子為壽無多事惟願歲長豐年年社酒同二飲山亭感舊種花人去花應道花枝正好人先老一笑問花枝花枝得幾時人生行樂耳今古都如此急欲醉莓苔前村酒未來三元龍未減當年氣呼山卧向高樓底今日到山村青山故意昏商歌聊一振千里浮雲盡老子氣猶豪山靈未可驕四回紋水圍山影紅圍翠翠圍紅影山圍水西近小橋溪溪橋小近西隱人誰與問問與誰人隱孤鶴對言無無言對鶴孤清平樂五首第一飲山亭留宿山翁醉也欲返黃茅舍醉裏忽聞留我者說道群花未謝脫巾就掛松龕覺來酒興方酣欲借白雲為筆淋漓灑遍晴嵐二青松偃蹇不受春風管松下幽人心自逺驚怪人間日短微茫雲海蓬萊千年一度春來爭信門前桃李年年花落花開三青天仰面卧看浮雲卷蒼狗白衣千萬變都𬒳幽人窺見偶然夢到華胥覺來花影扶踈窗下魯論誰誦呼來共詠風雩四賀雨雨晴簫鼓四野歡聲舉平昔飲山今飲雨來就老農歌舞半生負郭無田寸心萬國豐年誰識山翁樂處野花啼鳥欣然五圍棊棊聲清美盤薄青松底門外行人遙指似好箇爛柯仙子輸嬴都付欣然興闌依舊高眠山鳥山花相語翁心不在棊邊人月圎一首自從謝病修花史天意不容間今年新授平章風月檢校雲山門前報道麴生來謁子墨相看先生正爾天張翠幕山擁雲鬟二茫茫大塊洪爐裏何物不寒灰古今多少荒煙廢壘老樹遺臺太行如礪黃河如帶等是塵埃不須更嘆花開花落春去春來太常引三首男兒勳業古來難歎人丗幾千般一夢覺邯鄲好看得浮生等間紅塵盡處白雲堆裏高卧對青山風味似陳摶休錯北當年謝安二臨流相喚百東坡君試舞我當歌不樂欲如何看白髮今年漸多青天白日斜風細雨盡付一漁蓑天地作行􅌪把萬物都名太和三冥鴻有意避雲羅問何處是行窩今古一漁蓑收攬了間人最多求田問舍君休笑我兩鬢巳成皤髀肉儘消磨渾換得功名幾何風中柳飲山亭留宿我本漁樵不是白駒空谷對西山悠然自足北窗踈竹南窗叢菊愛村居數間茅屋風煙草屩滿意一川平緑問前溪今朝酒熟幽禽歌曲清泉琴筑欲歸來故人留宿西江月二首第一送張大經留在平生落落休嗟丗事滔滔青雲底柱本來高立向頽波更好一片花飛春減可堪萬點紅飄江花江月可憐宵莫賦招魂便了二飲山亭留飲看竹何須問主尋村遙認松蘿小車到處是行􅌪門外雲山屬我張叟臘醅藏久王家紅藥開多相留一醉意如何老子掀髯曰可南鄉子二首第一題外曰郭氏留耕堂壁上方寸足留耕大勝良田萬頃平隂理不隨陵谷變分明霜落西山滿意青十載董生行雞犬升平畫不成終日相看天與我高情身外浮雲自古輕二張彥通壽窗下絡車聲窗外兒童課六經自種牆東新菜莢青青隨分杯盤老幼情千古董生行雞犬升平畫不成應笑劉家劉老子無能縱飲狂歌不治生朝中措賀廉侯舉兒子金張家丗費貂蟬七葉侍中冠若就詩家攀例生兒合喚添官慿誰寄語廉泉父老斗酒相歡今歲孫枝新長甘棠消息平安臨江仙二首第一賀廉侯舉次兒子四海荆州吾所愛虎賁誰似中郎小孫今擬喚甘棠添官前有例簪笏看堆床明日乃公歸舊隱後園喬木蒼蒼青衫竹馬鴈成行當年廉孟子應有讀書堂二送二從事行色匆匆緣底事山陽梅信相催梅花香底有新醅南州今樂土得意即銜杯君見太行慿寄語雲間蒼壁崔嵬平生遮眼厭黃埃高樓吾有興無惜送青來喜遷鶯乙亥元日春風滿面是胸中春意與春相見不醉醄然無人也笑况是一年清宴寧兒挽䰅學語㸑婦舉杯重勸道惟願貧常圎聚老常康健二十七年丗事經千變今是昨非春恩花柳消盡氷霜殘怨門外曉寒猶淺門上垂簾休捲燈花軟酒香濃趂歌舞試輕輕咽靜修先生文集卷之十五
