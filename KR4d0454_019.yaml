body:
  text: 序趙徴士集注隂符經序豫讀隂符經觀天之道執天之行矣盡矣此言其體之自天而人者也天有五賊見之者昌即觀天之道也五賊在心施行於天宇宙在乎手萬化生乎身即執天之行也此言其用之自人而天者也天性人也人心機也立天之道以定人也此則言聖人之兼體用以天道立人極者也天發殺機龍蛇起陸則非天性矣人發殺機天地反覆則為人心矣天人合發萬化定基則又立天之道以定人者也夫苟不以道定焉則天人判而二以道定焉則天人合而一二之則機過而相悖一之則機定而化行化行則天地位萬物育而君臣父子各得乎天理而止其所矣性有巧拙可以伏藏九竅之邪在乎三要可以動靜此希天希聖之功而所謂執天道見天賊立天道合天人者其本皆出乎此也蓋九竅之邪未除則不能靜而常動若以三要為害而絶之則又一於靜而不動也惟知夫九竅之邪在乎三要克其邪而反其初則可以動靜矣其所謂動靜者即朱子之所謂動未嘗離靜而靜非不動者也其天人合發萬化定基則動而未嘗離靜者也而殺機則動之過者也火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人夫火剋姦潰以其大者而言之則龍蛇起陸天地反覆之謂也以其小者而言之則九竅之邪也知之修錬以其大者而言之則立天之道以定人之謂也以其小者而言之則伏藏動靜也此其言之自相發明若無所容夫説者而中山趙徴士才卿之集注近百家幾數萬言其志亦勤而學亦博矣陵川郝侍讀既為序之復因外舅郭公請一言於豫豫謂經之出處意義則前人巳盡之而其廣衍推稱則郝序又無遺者若兵家及養生家之説豫又未暇熟讀而悉知之特疑蔡氏中篇所引民可使由之不可使知之之説若非正學之語而有害夫道者豈蔡氏早年之説邪趙君必能考夫此故書以問之至元八年四月望日容城劉某書內經類編序近丗醫有易州張氏學其於書雖無所不考然自漢而下則惟以張機王叔和孫思邈錢乙為得其傳其用藥則本七方十劑而操縱之其為法自非暴卒必先以養胃氣為本而不治病也識者以為近古而東垣李明之則得張氏之學者而其論著治驗略見遺山集中鎮人羅謙甫嘗從之學一日過豫言先師嘗教豫曰夫古雖有方而方則有所自出也鈞腳氣也而有南北之異南多下濕而其疰則經之所謂水清濕與濕從下受者也孫氏知其然故其方施之南人則多愈若夫北地高寒而人亦病是則以其嗜酮乳而且以飲多飲速為能故也此則經之所謂飲發於中跗瘇於下與榖入多而氣少濕居下者也我知其然故我方之施於此猶孫方施之於南也子為我分經病證而類之則庶知方之所自出矣豫自承命凡三脫藁而先師三毀之研摩訂定三年而後成名曰內經類編敢望吾子序夫內經十六卷素問外九卷不經見且勿論姑以素問言之則程邵兩夫子皆以謂戰國書矣然自甲乙以來則又非戰國之舊矣自朱墨以來則又非甲乙之舊矣而今之所傳則又非戰國之舊矣苟不於其所謂全書者觀其文而察其理焉則未有識其真是而貫通之者今先生之為此也疑特令學者之熟於此而後會於彼焉耳苟為不然則不若戒學者之從事于古方而學者苟不能然則不若從事古方者之為愈也羅亦以為然豫聞李死今三十年羅祠而事之如平生薄俗中而能若是是可序年月日劉某序篆隸偏傍正訛序小學之廢尚矣後丗以書學為小學者豈以書古之小學六藝之一乎夫古之小學果專於藝而巳乎而其藝果止於書而巳乎而今之所謂書學者又果古人之所謂小學者乎夫古人之於書也點畫顚末方圜曲直一出於法象之自然非可以容一毫人力於其間者而幼學之士蓋欲即此而知其事物義類之所在因其形而求其聲焉而巳矣是皆天理人事之所當為非有一毫慕外為人之私也若夫後丗則虞有不知其姓而顔有不知其名顚倒側媚惟妍而巳矣而况於學者乎嗚呼丗變降矣雖一藝之微亦莫不然可勝歎哉豫今教授餘二十年每欲令𥘉學者移臨摸法書之功而求知夫偏傍之所以相生篆隸之所以相因分六書為類而以次習之顧力有未暇者焉今田君景延纂集凡隸書之形雖相近而篆實不同如奉泰奏秦春者為一書非惟使為篆者不以隸而誤而亦使為隸者知以篆為本真有用之書也名曰篆隸偏傍正訛而請豫序之豫因傷古道之不復歎豫志之不就而喜景延之勤篤也故為之書至元丙子八月既望序莊周夢蝶圖序周寓言夢為胡蝶豫不知何所謂也説者以為齊物意者以蝶也周也皆幻也幻則無適而不可也無適而不可者乃其所以為齊也謂之齊謂之無適而不可固也然周烏足以知之周之學縱橫之變也蓋失志於當時而欲求全於亂丗然其才高意廣有不能自巳者是以見夫天地如是之大也古今如是之逺也聖賢之功業如是之廣且盛也而巳以渺焉之身橫於紛紛萬物間無幾時也復以是非可否繩於外得喪壽夭困於內而不知義命以處之思以詫夫家人時俗而為朝夕苟安之計而不可得姑渾淪空洞舉事物而納之幻或庶幾焉得以猖狂恣肆於其間以妄自表于天地萬物之外也以是觀之雖所謂幻者亦未必真見其為幻也幻且不知又惡知夫吾之所謂齊也又惡知夫吾之所謂無適而不可也吾之所謂齊也吾之所謂無適而不可也有道以為之主焉故大行而不加窮居而不損隨時變易遇物賦形安往而不齊安往而不可也此吾之所謂齊與可者必循序窮理而後可以言之周則不然一舉而納事物於幻而謂窈冥恍惚中自有所謂道者存焉噫鹵莾厭煩者孰不樂其易而為之得罪於名教失志於當時者孰不利其説而趨之在正始熙寧之徒固不足道而丗之所謂大儒一遇困折而姑籍其説以自遣者亦時有之要之皆不知義命而巳矣雖然周巳矣其遺説亦其夢中之一栩栩也吾從而辨之冝無與於周矣然以周觀之則不若休之以夭均故即其圖而戲之曰圖汝者畫辨汝者書書與畫無知也圖汝者之心及吾之辨汝之心未發無有也既發亦無有也以其無所知無所有者而觀之安有彼是既無彼是安有是非周而有知則必曰吾惡乎知之使讀者作色於前發笑於後乃所以齊之也圖周者臯落楊內翰而序圖者劉某繼序而題詠者京師之才大夫也送郝季常知頴州序名家之子弟處天下之至易而亦處天下之至不易苟能勉焉自立而少異於衆人則皆得因緣馮藉以立事功苟為不然在他人未必遽得貶斥而巳為清訍所不容矣季常於其兄使宋之二年請介行人以問罪遣之而宋人不納後十年又請焉下大臣會議以為不可明年又請焉不得巳復遣之至建康而還幾死者凡十數其事雖無成而其可與有為者於此亦可以見之舊嘗從一授詩書又知其為有志者今其將為州于頴也載米與幣而過豫以别且請豫有以告之豫無以告子也子行矣豫固巳言之矣勉其所以處天下之至易愼其所以處天下之至不易者而已矣豫無以告子也容城劉某序送翟判官序豫昔聞翟氏之先人有隱德於人其事甚悉存之於心有日矣特未有以信之者也渡江之役而良佐與焉自江淮抵閩越觸炎熱瘴癘遂病不起時氣運方厄而南北之人病死相籍奄然一息孰能勝之人固不望其生巳亦不復以生理自念矣及還則鄉里雖驚其至然形容非昔而生氣若奪識者尚憂之後二年豫居山中忽報云新除江州路判官來訪出應則隱然昔之良佐也凡事有智數之所不能測者必有一定之天存乎其間昔豫所聞於是乎有以信之矣良佐好善喜讀書今將為政矣其思夫天人之際雖反覆變亂之極以人勝天以文滅質而氣失其平其所謂一定之理者固未嘗有毫髮僭差以負於我則其政必有異於人者矣子行矣豫將觀子矣登廬山泛九江裴徊於濂溪白鹿之間以致其高山景行之意而良佐見輕舟凌波隱見垂綸長嘯鼓枻而歌如太康之漁父者其必我也送張仲賢宣慰淮東序東南富山水之竒秀而限於南北不得周遊而歷覽之使人恆鬱鬱不樂而若有所失自宋亡百五十年之分裂一日復合凡東南名勝之迹一目萬里而惟其所欲焉此固不屑屑於當丗以觀物自娛者之所樂得也方天下無事事有綱紀士以才能自負者每以無以自異於中人而不得盡其所有者以自嘆今沿江南北皆我所新有民不習靜而多變有弊以革有害以除此亦有志於當丗以有為為事者之所樂得也堯山張仲賢出金源名族少嘗為刀筆吏武安樂舜咨道之令學乃能丗其儒作詩文有逺意頗喜讀內典於丗味雖甚薄而其可以有為與其所欲有為者則磊磊固在自省掾出參山東真定諸幕入而為京官復出而同知宣德雖皆有能聲然視其所存則百不一二施今宣慰淮東則其所也將行也而訪豫山中豫聞其有是行也而東吳西楚宛然吾扁舟之上矣故吾與仲賢之意向雖殊而得其所樂則一乃舉觴引滿各盡平生既而復與之盟曰今公與豫固樂矣然未真得其樂也或秋風春水我將圖南公與賢州牧郊迎於淮海之間豫因訪淮東之父老及公之僚佐得公之所施設於是以大白壽公而公乃指顧江山之勝槩者以酬我於是時豫二人之樂又將不止此而巳也仲賢曰然謂既有盟不可不載之辭故書以贈其行容城劉某序靜華君張氏墨竹詩序古之男女各有學其所學亦各有次第而莫不以德行為本如男子之所謂六藝女子之所謂婦工雖皆其所當能而必用之者亦各居其末焉然其所謂藝與工者乃內外之職男女之功各有常分者也蓋不惟不敢相越而知之亦有不暇者焉是以詩書六藝之文婦學不得而與之詩書六藝且不得而與之而况後丗之所謂書札繪畫雖男子亦所不暇者而婦人又安得而與之哉使其天資之美有不待學而能之者亦但當自寓而巳至於藉是以求知而傳永久則為外事明矣又暇屑屑於是邪靜華君張氏蔡武康之女嫁為喬氏妻而金源名士王翛然元裕之皆其外氏之親表故其家學遺澤蔚有風範而君之貞靜端潔其氣類之合又有與竹同一天者故素善墨竹而元郝諸公見之因為詩賦以比其德君皆不與知也而喬氏集成一卷請豫序之將併刻之石焉昔歐陽永叔作五代史敘王凝妻於雜傳之中朱文公刪定楚辭録胡笳於反騷之後蓋不無望於後丗之為士者矣豫因歌黃魯直詠姨母李夫人墨竹人間俗氣一點無健婦果勝大丈夫之句乃慨然為書之讀者亦當知豫之書君者不在此而在彼併敘男女之學古今之變庶其又有知所趨向者焉至元辛巳二月既望容城劉某序賜杖詩序至元二十九年春上賜侍衛都指揮使王公慶端西土所貢雕玉杖公既捧以拜天下聞之作詩而美之者五十餘首公分為三卷命某為序某曰夫古人自授田百畒含哺鼓腹以至於列土分封萬鐘千駟凡上之所以賜下者宜隨其分位而無不足焉蓋其職然也非有所為而賜也自力田以租至於御金革而理庶務凡下之所以勤上者宜隨其分位而無不盡焉亦其職然也非有所為而勤也上之人若曰是可以鼓舞之也是可以駕御之也以是而賜焉其下亦曰私惠之可懷也厚賞之可致也以是而勤焉則不惟非所以為君臣之義而其更相責望之間一有不至則其職從而虧矣後丗君臣之不終也其以此與然則臣之於君之賜也冝如何哉曰敬之而巳矣榮之而巳矣如古人之正席先嘗乘服以拜者是也某舊聞公嘗被錦衣貂裘之賜惟於巡衛錫宴則服之及退則襲而藏之惟謹蓋知是禮也今其於杖也其所以敬而榮之者亦必有以處之矣此則詩人巳略言之若夫聖上以如天之仁推赤心於天下必不以一杖之故遽圖責報於臣下而公之平昔以忠勤著聞蓋出於性分之所固有而行其職分之所當為必不以一杖之故然後加勉於國家此雖詩人之所共知而其言則未有及之者也敢以是為序而輔其闕云明年二月望日劉某謹序都山老人九十詩序慶都之山有老人焉姓劉氏少值兵亂未嘗一日去鄉里而兵亦不犯之今年九十尚無恙子孫滿前田園如故而老人不知其老也燕趙諸公作詩而壽公者甚多其子式集為一卷將時諷詠之以侑捧觴之樂焉復請豫書其事而序之豫讀而竊有感之者金源貞祐迄於壬辰河之南北兵凶相仍生意殆盡而先儒所謂天下蕭然洪水之禍蓋不至此者惟是時足以當之夫天地氣運壞亂若是而人物生乎是氣之申者乃所謂命也將何術以逃之哉而老人居南北之衝乃若與丗變不相與者豈氣稟之異雖天地之運亦不得而奪之邪抑存之深而積之久者有以勝之邪或偶然也是固不可得而知之矣然而此老人之所以自壽者也夫人子之所以壽夫親如恱其心志而安其起居時其寒溫而節其飲食者又非一也今老人九十而康強由是而登上壽一步武之間耳式其勉之子欲我序九十詩而巳乎年月日容城劉某序壽史翁百歲詩序翁年九十六百歲舉盈數也翁保定祁人有子今為郡從事從事先為宰府掾請出求為鄉郡以翁故也尹以下聞從事有親年及百擁車騎持酒肉造翁為壽敬老也親賔佐也夫人生滿百舉丗無幾唐人稱九十為人瑞况百歲乎漢官儀三老五更取男女全具者蓋以男女全具為可貴也宋故事民百歲男子官婦人封仕而父母年九十官封如民百歲蓋以有子而仕為尤可貴也今翁既百歲又有子而仕仕而又為鄉郡其為人所歌詠之也宜哉至元辛卯二月望日樵菴序廉公惠更名序故相廉公嗣子公惠舊名孚以其於兄弟之名字形取類為不合也蓋嘗請於公而未及更今雖巳孤而意恆若有闕焉者遂謀於豫而更之曰怡而以告諸家廟焉蓋亦禮之變也而其取名之義則有取於兄弟雍睦之義也蓋公之臨終也以諸子恪恂等皆幼而公惠獨長懇懇目諸子而屬之也今其設心以為既以一名字形於兄弟不合且必求其合焉而後巳而其取義則又專在於兄弟之義也以是而日警省焉先訓之不忘也其庶幾乎至元戊子十月既望容城劉某序古里氏名字序吳景𥘉請豫制其子名自敘其為女真人其子石倫為金大將為金死本姓古里氏以女真諸姓今各就其近似者易從中國姓故古里氏例稱吳已數丗矣豫聞之大以為不可夫姓氏乃先丗有所受而傳之子孫其脈絡截然有不敢毫髮亂者今非有所禁而自絶本根附於他裔顧乃因仍苟且徇於流俗而不恤彼兒子之名何所不可而反以為問乎今先為正其姓然後名其子承字之延伯蓋示其不忘所天而且有所貽也如是則古里氏其將為著姓矣後丗子孫雖欲改之其可得乎嗚呼承也其勉聽之哉至元庚寅重九日牧溪翁序徐生哀挽序至元十二年秋九月徐生景巖卒其疾革也泣謂豫曰養未終學未成草六年而死亦虛生也欲吾子一言於石庶其不朽以少慰焉幸終平昔之愛而無遺死者之恨其遺言於父祐及其故人徐子懌亦然嗚呼以生之明敏而未冠能文章既長而講學不輟夫豈不知其為學初不為不朽計而所以不朽者又不在夫人之一言而人之一言果可以託以不朽者又不必區區之石也今其哀懇如是豈其氣方英鋭邁往之際而天遽然折奪之其中有不能自巳者乎即此而觀其所志使天假之年或有以致夫真不可朽者亦未可知也欲勒銘表墓或分有未宜乃敘生之才志有如此者率同志為辭以哀之亦庶幾乎與人有終之義焉明年正月既望容城劉某序田景延寫真詩序清苑田景延善寫真不惟極其形似併與東坡所謂意思朱文公所謂風神氣韻之天者而得之夫畫形似可以力求而意思與天者必至於形似之極而後可以心會焉非形似之外又有所謂意思與天者也亦下學而上逹也豫嘗題一畫卷云煙影天機滅沒邊誰從毫末出清妍畫家也有清談弊到處南華一嗒然此又可謂學景延不至者之戒也至元十二年三月望日容城劉某書中祀釋奠儀序堂寢之制非古也像設之儀非古也而釋奠之禮獨從古焉未免有情文相戾者如神不地坐而簠簋前陳神不面東而拜或西向此皆先儒所欲為之修明而未睱者也雖然以今觀之其所謂情文相戾者學者亦不復盡見之矣而况先儒之所欲修明而未暇者乎安肅劉仲祥集諸家釋奠儀以成是書施於今之學者不為無益然向之所謂情文相戻與夫先儒所欲修明而未睱者學者亦不可不知也至元戊子八月望日劉某序李公勉復初名序天之授豫曰人焉而巳矣凡配人而稱其美如賢人善人之類雖其高下之品不同要其所指稱也各有限皆不足以盡人之大也如天也人或稱之曰上天者言其崇高也或稱之曰神天者則言其變化也皆不能有以相兼也若止曰天而巳則其天之全體為盡見也惟人也亦然今人有人稱之曰子賢人也子善人也則必欣然而恱稱之曰子則將怫然不恱蓋不知天之授豫曰人者之為大也苟知之將終身汲汲望有以少及乎人之稱而未能而向之所以欣然而恱者亦將陋之而不屑矣無極李公勉幼名授親所命也及冠而字則巳孤矣嫌授幼名也而更曰䇿今也公勉知其所當勉者在乎天之所授也即幼名而稱之終身古人之道也已孤則其名又所不忍更也於是慨然因祭以告其親而復乎初嗚呼公勉其有志也邪其不苟也邪吾知其必能思其名而勉之矣因其請也告以是説年月日泛翁序靜修先生文集卷之十九
