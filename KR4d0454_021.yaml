front:
  text: 靜修先生文集卷之二十一
  hash: sha256:448b58b79dcccc1820c33957539fa61b3da76c69a3eeeb39c74b347acbfca1a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_021-1a}
body:
  text: 書上宰相書九月二十八日因再拜因自㓜讀書接聞大人君子之餘論雖他無所得至如君臣之義一節自謂見之甚明其大義且勿論姑以日用近事言之凡吾人之所以得安居而暇食以遂其生聚之樂者是誰之力歟皆君上之賜也是以凡我有生之民或給力役或出智能亦必各有以自效焉此理勢之必然亘萬古而不可易而莊周氏所謂無所逃於天地之間者也因生四十三年未甞效尺寸之力以報國家養育生成之德而恩命連至因尚敢偃蹇不出貪高尚之名以自媚以負我國家知遇之恩而得罪於聖門中庸之敎也哉且因之立心自㓜及長未甞一日敢爲崖岸卓絶甚高難繼之行平昔交友苟有一日之雅者皆知因之此心也但或者得之傳聞不求其實止於蹤跡之近似者觀之是以有高人隱士之目惟閤下亦知因之未甞以此自居也請得一一言之向者先儲皇以贊善之命來召即與使者俱行再奉旨令敎學亦即時應命後以老母中風請還家省視不幸彌留竟遭憂制遂不復出初豈有意於不仕邪今聖天子選用賢良一新時政雖前日隱晦之人亦將出而仕矣况因平昔非隱晦者邪况加以不次之寵處之以優崇之地邪是以形留意往命與心違病卧空齋惶恐待罪因素有羸疾自去年䘮子憂患之餘繼以痁瘧歷夏及秋後雖平復然精神氣血巳非舊矣不意今歳五月二十八日瘧疾復作至七月初二日蒸發舊積腹痛如刺下血不巳至八月初偶起一念自嘆旁無期功之親家無紀綱之僕恐一旦身先朝露必至累人遂遣人於容城先人墓側修營一舎儻病勢不退當居處其中以待盡遣人之際未免感傷由是病勢益増飲食極減至二十一日使者持恩命至因初聞之惶怖無地不知所措徐而思之竊謂供職雖未能扶病而行而恩命則不敢不扶病而拜因又慮若稍渉遲疑則不惟臣子之心有所不安而蹤跡高峻巳不近於人情矣是以即目拜受留使者候病勢稍退與之俱行遷延至今服療百至畧無一效乃請使者先行仍令學生李道恒納上鋪馬聖旨待病退自備氣力以行望閤下俯加矜憫曲爲保全因實踈逺微賤之臣與帷幄諸公不同其進與退苦非難處之事惟閤下始終成就之因再拜答田尚書書某再拜復礼意懇到至於再三雖不敢當亦所不敢拒者然勢有不能者三今不免一一焉近有人自郷中來水幾嚙先墓尚頼相去甚近時有展省而謀所以遷避之方必三歳而後可庶幾焉一也家堂垂老有所生女子在趙州亦欲時一相見若逺去則往復極不易矣二也外舅郭判官平生受知最重今在平定卧疾十月間巳一往省視臨别垂淚云比死幸得一相見近其子書來云變腫而利醫者云利不利於是證也拙婦聞之殆難爲懷欲遂俱往視之則山路﨑嶇往復千里而勢有不能殆不免某復作一行也三也有此二者而遂舎之將以敎人而先失此雖公亦所不與也可往則一來即往誠不敢虚譌以要人之再三公若不亮察雖百往復亦止此而巳矣某再拜田侯請䟽附比竊以深聖人日夜之思不如斈也制桐子善惡之命時維師哉凡期進業之精必就有道而士伏惟夢吉先生两儀間氣四海英才𥘉斈語則自識於之无及講書則徑明其旨趣料緫角之時必至於聳壑甫弱冠之日俄駭其能文河傾萬卷之儲筆掃千軍之陣士類知畏公論有歸道積厥躬白璧抵連城之價聲聞於外良金難衆日之銷某有豚犬軰性止中庸席虚善誘敢望加諸陶鑄之力庻可逹於成就之途各習聖經動循天理盖素志實在於是舎先生將安之乎敬遣某人持䟽上請早賜俞音幸母多讓謹䟽答何尚書書某再拜復辱䟽禮意甚厚實非所敢當也然易之風土素所慕愛而公之才器則又所願交而未得者也又平生甞苦無書讀每思欲館於藏書之家而肆其檢閱而今之藏書復孰有如公之多者是三者蓋十年之所欲求而不得者今一朝不求而併得之且公出貴家而能不忘子孫敎養之計求之古人亦不多見而某又何暇辭但事緒卒不能絶六七月之交當再議之某再拜何侯請䟽附此竊以景星鳯凰爭覩治平之瑞秋陽江漢亦資濯暴之功是知莘野天民不拒互黨童子伏推夢吉先生天資頴悟風操崛竒馳聲瑣闥之間晦迹衡門之下沉潜抱負志斈期於聖賢發見輝光詩文復於騷雅冀藏噐待時之日傳傳道解惑之心故仰瀆於仞牆願俯垂於金誥燕山改色載瞻伊洛之風易水增明顒俟河汾之敎輒伸卑懇傾聽來音謹䟽與王經畧書八月二十八日刘某再拜以生平知已有五年之別且還自数千里外欵叚下澤奉候起居角中私第從容觴詠爲数日留以道前日西山連榻南州並轡之好實初心也故自四月初始聞有歸意訪問迄今無虚月及至則腹痛連綿不止而不能徑往南望依依徒增悵恨仲實來仍聞執事脚氣作不知近日復何如謹專人奉問續當親往未閒秋嚴惟順時以道自愛不宣某再拜經畧恩公執事答張推官書某頓首啓自獲與仲實交甞竊聞家丗昆季之美而執事恬退之節樂易之風雖未之識固巳若親承其敎五月間彦通來聞秩滿家居而僕方私或以事至府則庶得一見焉及仲實至則紙墨等物遽蒙先施之辱矣且許以北行則取道於此而將枉駕焉感慰不自勝然思其所以得此豈仲實諸人甞以不肖欺執事也比當面敘姑此馳謝八月二十八日某再拜推官先軰執事答王判官書某頓首復緫判執事向居保府竊聞才名風節之餘向慕而願交之者有日矣然公宦游南北而僕復閉門癡坐蹤跡蹉跌是以十年之間僅望見風采一二於稠人中竟未甞接杯酒殷勤之歡以道其相與之意及來山中交道日狹故人日踈凡郷曲之賢平昔之願交而未得者日往來於心其相與之意故在忽八月九日領四月間見寄詩其賦敘平實而興寄高逺辭旨精嚴而風格古雅其平日磊磊自負與夫期待之辱又槩見於言意之表讀之不覺驚喜向之願交而相與者自此敢少進於前矣特恨浮沉乆而得之睌和答難而報謝遲故謹專人先此馳復比良晤秋嚴惟順時以道自愛不宣八月二十七日某再拜䟽王治中請趙君玉䟽道人遊於内形骸無癈疾之嫌老者近於親飲食有忠養之戒惟其布帛之文不爲野所以耆艾而信可以師伏惟提學先生經明行修年高德邵人惜士安之苦節天留鑿齒之半軀某蚤失師傳今勞王事每慙將逼於晚景但欲常聞於善言避堂寢以舎蓋公固不敢當禮賢之僣載酒肴而過揚子庶幾能伸問字之勤厨傳巳修薰沐而待謹䟽請趙敎授就師席䟽伏以爲州郡立師乆著朝廷之令式選生徒入學屢頒臺憲之條章共興激勵之心爰得依歸之所㳟惟先生蚤親有道晩舉力田以公論所歸膺師儒之選某等幸居是郡得預諸生敬備束脩願行見先生之禮特新講肆望不虚郷國之勤謹䟽靈陽觀鳩糧䟽奉爲本院見闕道糧謹投一鄉上善共加補助者竊以力田固清修之本收功有豐歉之殊終歳徒勞連年失望驩虞里巷共歌樂土之有秋寂寞齋厨實望仁人之移粟謹䟽雜著節彖渙先隂而後陽也自一隂一陽而二隂二陽也故爲渙爲渙散也節先陽而後隂也自二陽二隂而一陽一隂也故爲節焉節止也以卦之象而言之澤所以限水水遇澤而止皆節之義也以卦之德而言之方說而遇險險而以說行之又皆節之義也夫事物之有限而止者節也而節亦一事物也獨無所謂有限而止者乎知節而不知節其節焉於彼雖爲節於節則爲不節也此則節而至於苦者也在物皆有自然之節也若因其節而節焉猶支之有節分之有叚亦風行於水自然披離之爲渙而巳若節而至於苦則非自然之節矣凡卦之所謂亨與貞者其亨與貞皆同而所以爲亨與貞則異渙即亨也亨在事先節有亨之道而已亨在事後然易無無貞而亨者猶物之無無隂之陽也亨在事先者其卦以亨爲主而守之以貞亨在事後者其卦以貞爲主庶幾其有亨也在渙其辭有聚渙之象焉在節其辭有苦節之戒焉渙非必渙也節非必節也未節則思所以節焉巳節則思戒其所以苦節者焉動乆而以靜節之靜久而以動節之皆所以爲節也知此則知其所謂亨與貞者亦隨所遇而變也友人筮遇節當以彖辭占故爲言其義例之大畧焉武遂楊翁遺事翁與予外家通譜牒一丗矣昭穆則舅父也八十歳餘每一過予輒自喜數日而謂有所得也好聞邵氏惡盈語每告之一二必手録而藏之甞謂予曰予視丗俗惟予與山西一石丈者其所爲頗當吾子意冝吾子之不見合於人也畧能道予家數丗事毎援之以爲其朋友予孫之戒臨終遺其子孫者無他語惟及予戒其子孫令從予學而巳翁舊甞與予言者自西山來武遂渉百里途一日意甚速訪捷徑于人視所常往來當早至中途遇人奪騎補馹傳乃走避之乃反迂于所常往來者尓後思之事莫不然遂不敢求捷又云某人者擁高官以南予謂其人不免後果如予言蓋治行時予見謀利之具以知之又云昔年二十餘遇保州鈔騎身巳十餘創即伏而死矣其一人復抽刀由背及腹刺至地而去是時豈意復生於天地之間六十年餘也以此知生死非人所能爲也又云保州屠城惟匠者免予冐入匠中如予者亦甚衆或欲精擇能否其一人黙語之曰能挾鋸即匠也拔人于生擠人于死惟所擇事遂巳而凡冐入匠中者皆頼以生當時恨不知其人之姓名若此等語毎語次必一二及之予亦樂聞而不厭其言之屢也性喜飲醉即微笑好談佛書亦頗能知其微處嗚呼親舊日益盡予日益孤感念知已不覺涕零遂書此示其子孫使知翁之言行如是其令不忘予家之好云翁字吉甫忘其名至元十六年正月十六日書于吟風亭書示瘍醫周禮瘍醫凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之五毒疑即醫師所聚毒藥凡五藥之有毒者非謂一方五藥而可以盡攻諸瘍也攻與療所以去其疾也養與節所以扶其本也蓋攻則必養之療則必節之攻視療加急養視節加密理勢然也鄭氏釋五毒以黃堥置石膽丹砂雄黃礜石慈石其中燒之三日三夜其煙上著以雞羽取之以祝創惡肉破骨則盡出宋楊文公見楊嵎驗之果如鄭所云此蓋古方五毒藥之一尓若即以是爲五毒則不惟聖人之言不如是之狹而執兼與下文五氣五藥五味之言亦不類矣予又恐以楊之偶中而致人之不中也賈氏䟽又以五藥爲五毒則鄭旣失經之意而賈又失鄭之意也東坡甞論學儒不但費紙而正俚語之非唐庚論陶隱居注本草與昜之說非知言者蓋儒術之大無對非可與醫並言者也然衆技校之則李明之常言蘇沈良方猶唐宋類詩蓋言不能詩者之集詩猶不知方者之集方也一詩之不善誠不過費紙而巳一方之不善則其禍有不可勝言矣友人爲醫者求予書其醫瘍也故云讀藥書漫記二條人秉是氣以爲五藏百骸之身者形實相孚而氣亦流通其聲色氣味之接乎人之口鼻耳目者雖若汎然然其在我而同其類者固巳脗焉而相合異其類者固巳怫然而相戾雖其人之身亦不得而自知也如飲藥者以枯木腐骨蕩爲虀粉相錯合以飲之而亦各隨其氣類而之焉蓋其源一也故先儒謂酸木味木根立地中似骨故骨以酸養之金味辛金之纏合異物似筋故筋以辛養之鹹水也似脉苦火也似氣甘土也似肉其形固巳與類矣而其氣安得不與之流通也推而言之其吉凶之於善惡亦類也天生此一丗人而一丗事固能辦也蓋亦足乎已而無待於外也嶺南多毒而有金蛇白藥以治毒湖南多氣而有薑橘茱萸以治氣魚鱉螺蜆治濕氣而生於水麝香羚羊治石毒而生於山蓋不能有以勝彼之氣則不能生於其氣之中而物之與是氣俱生者夫固必使有用於是氣也猶朱子謂天將降亂必生弭亂之人以擬其後以此觀之丗固無無用之人人固無不可處之丗也敘節婦賈韓韓氏中山治中賈公之子增順妻也其先眞定獲鹿人父某金末甞代上黨張公爲潞州帥後歸國移鎭彰德西道㑹有告其與金烜山武公通問訊者遂繫獄行唐當天下草昧非強宗豪族不能自保其室家况當衰謝罪累之餘其強凌豪奪孰復能禦之者時韓氏年巳十五姿色復過人獨能以礼適名族其風節巳可想見矣二十七增順死賈之族黨有欲嫁之者韓氏以死拒之其兄知沁州事某憐其少寡欲迎歸之韓氏恐其將嫁已也凡五往復終不許及年四十則曰吾老矣吾兄必不強我也方一往焉韓氏出衣纓復移天於大家其生長見聞宜不知勤儉勞苦爲何物也及增順死家無以爲生童稚嗷嗷待哺於前韓氏即斥去脂澤其服飾雖山野農家之所不堪者韓氏處之若素也復慨然以勤力自任毎日以麻二束自課剥而績之盡焉而後寝其事舅姑接夫子御妾媵待親戚則又郷閭以爲模範者其婿郭賡屡爲予言之始爲敘其大畧庶有如安定胡翼之者聞將著之賢恵録云靜修先生文集卷之二十一
