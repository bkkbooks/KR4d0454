  text: 靜修先生文集卷之二十二
  hash: sha256:6d8cc5a108db39da5b184ed2dca0555ef5998613a1e7fbf37e0f71140b7537e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_022-1a}
body:
  text: 題跋書太極圖後太極圖朱子發謂周子得於穆伯長而胡仁仲因之遂亦以謂穆特周子學之一師陸子靜因之遂亦以朱録爲有考而潘誌之不足據也蓋胡氏兄弟於希夷不能無少譏議是以謂周子爲非止爲种穆之學者陸氏兄弟以希夷爲老氏之學而欲其當謬加無極之責而有所顧籍於周子也然其實則穆死於明道元年而周子時年十四矣是朱氏胡氏陸氏不惟不攷乎潘誌之過而又不考乎此之過也然始也朱子見潘誌知圖爲周子所自作而非有所也於乾道己丑巳序於通書之後矣後八年記書堂則亦曰不繇師傳黙契道體實天之所卑也又十年因見張詠事有隂陽之語與圖說意頗合以詠學於希夷者也故謂是說之傳固有端緒至於先生然後得之於心無所不貫於是始爲此圖以發其祕爾又八年而爲圖書註釋則復爲莫或知其師傳之所自蓋前之爲說者乃復疑而未定矣豈亦不攷乎此故其爲說之不决於一也而或又謂周子與胡宿邵古同事潤州一浮屠而傳其易書此蓋與謂邵氏之學因其母舊爲某氏妾藏其亡夫遺書以歸邵氏者同爲淺薄不根之說也然而周子邵子之學先天太極之圖雖不敢必其所傳之出於一而其理則未甞不一而其理之出於河圖者則又未甞不一也夫河圖之中宫則先天圖之所謂無極所謂太極所謂道與心者也先天圖之所謂無極所謂太極所謂道與心者即太極圖之所謂無極而太極所謂太極本無極所謂人之所以最靈者也河圖之東北陽之二生數統夫隂之二成數則先天圖之左方震一離兊二乾三者也先天圖之左方震一離兊二乾三者即太極圖之左方陽動者也其兊離之爲陽中之隂即陽動中之爲隂靜之根者也河圖之西南隂之二生數統夫陽之二成數則先天圖之右方巽四坎艮五坤六者也先天之右方巽四坎艮五坤六者即太極圖之右方隂靜者也其坎艮之爲隂中之動者即隂靜中之爲陽動之根者也河圖之竒偶即先天太極圖之所謂隂陽而凡陽皆乾凡隂皆坤也河圖先天太極圖之左方皆離之象也右方皆坎之象也是以河圖水火居南北之極先天圖坎離列左右之門太極圖陽變隂合而即生水火也至元丙子八月望日書書康節詩後物齊也齊之則不齊矣猶之東西也東自東而西自西固不齊也然東人之西則西人之東也是曰東亦可曰西亦可則是未始不齊也然東西之形旣立指其西而謂之曰東則爲東者必將起而爭之而不齊者出矣不齊之則物將自齊而平矣東也西矣吾立於中而制其東西焉如是則謂之無所著可也一有所著則不東而西矣謂之無所著可乎彼空將無所著也一倚於空獨非著乎此程子深有取于邵子之言也然彼爲其說者曰是不足以破吾說也吾曰齊固未甞齊夫物也吾曰空固未甞著夫空也噫悠謬輾轉愈遁而愈無實矣跋懷素藏眞律公二帖墨本後顔魯公自其九丗祖騰之至公以能書名天下者凡十人而頵頍不與焉其淵源巳如此而其父巳傳法於殷仲容而公又㑹意於張長史今見懷素此帖所云則知公之講習於師友者又如此嗚呼書一藝也必欲其精而猶如是矧其大者乎帖後有文潞公吕汲公趙懿簡劉忠肅諸公元祐四年跋語是年潞公以元老平章軍國事方辭去不得而汲公爲宰相懿簡公爲樞密忠肅公爲御史吁亦盛矣哉後游師雄刻此帖於長安則八年九月也宣仁后實以是月崩而明年巳非元祐矣宋之治亂於此焉分又所以發予之歎也此雖一帖而有可鑒者二故併書於後以待覽者云至元丁丑七月己亥容城劉某書書王維集後維與鄭䖍同以能詩與畫名當丗後又同事賊賊平復同以畫得苟免死而鄭相如者固甞言虔當汚僞官然復云願守節可免夫仁義禮智天道固有所謂命者而其義之於君臣有不能盡者彼善術者或於其氣運之間有可以推而知之者然其曰守節則可免則是有性焉而巳矣陳圖南謂种放晚節當不逮初謂敬愼則不失亦此意也是彼爲術者固亦必以人事爲主而不專於數矣因表而出之於此云書高允圖後人之制行近於當理者多矣欲必其制行之初眞見義理之當然而斷然無一毫人欲之私者則未易知也然攷其平生則心術之微亦有不可得而掩者矣如高允忠情之直亮蓋其生質之本然其設心處事必非善爲僥倖委曲之人也如勸翟黒子有罪首實亦以義理之當然爾而作史者遽繼之以庶或見原之語則所謂首實者乃所以爲僥倖之資也至於史事不欺則又以謂恐負翟黒子故則允之所以爲是非以義理之當然第以此爾此皆史臣不明義理而於遣辭之際輕爲增損往往使人忠亮之心不灑然于天地間非止允一端而巳讀史者不可不知也跋魯公祭季明姪文眞蹟後季明與盧逖同時遇害也今公所謂仁兄愛我俾尓傳言者不應居逖之後也果先之則潛告之舉自忠節發而史爲遺誤矣且公於其父之廟碑自敘距師古爲四丗與忠節爲同祖而新史乃以公爲師古五丗從孫與忠節爲同五丗祖不應公自敘亦如撰歐陽璀碑之有誤也舊史自以之推爲公與忠節之五伐祖以忠節爲公之從父兄矣不知新史何所據而改之而汪應辰於公傳辯師古五丗之誤於忠節傳不辯其同五丗之誤亦可謂攷之不精矣是以知歐陽永叔不敢以新唐書丗系列傳爲正者不特張許孔氏而曾子固所謂史誤者又不特李白傳而巳也至元丁丑八月癸亥日容城劉某書書王子端草書後子端振衣起遼海後學一變爭竒新黃山驚嘆竹谿泣鐘鼎騷雅濳精神黙翁語也雪溪僊人詩骨清畫筆尚餘詩典刑聲光舊塞天壤破議論今著兒曹輕遺山語也二公之言必有能辨之者東坡謂書至於顔柳而鐘王之法益微詩至於李杜而魏晉以來高風絶塵亦少衰矣朱文公亦以爲然而黙翁蓋知此者是以不取于子端也安得如黙翁者而與之論書至元十五年正月二十三日書題婁生平鈒模本後銀工婁生平鈒墨本前人題誌莫不以爲天下之絶巧也夫以人心之靈有可以參天地而贊化育者存苟專力于一藝其精密神功亦何不至此固無足怪焉予所感者自汙尊抔飲而有器皿自器皿而有文飾自文飾而有如此至有如此者攷其丗尚未逺也而來者無窮焉將止於如此而巳邪將變而益以文邪抑亦將反古人創物適用正大淳厚之制也題遼金以來諸人辭翰後遼誥勅一卷金正隆詞人製作附今姚竇諸人跋語一卷予觀之謂遼金迄今自北而南漸以大其文物之變也亦然劉某題跋朱文公傑然直方二帖眞蹟後先生傑然直方二帖郝奉使得之儀眞予觀其詞旨筆勢則跨越古今開闔宇宙荆公實不足以當之而其頽然其順浩然其歸方康節檢束之時蓋亦無有也書法自漢魏而下壞於晉宋極於黃米此先生千古絶絃之論觀者以此意求之或有感焉而於以讀先生之書而得其心則視凡丗俗之所爲學者皆在百尺樓下矣又豈但書法而巳乎至元丁丑八月壬戌容城劉某書靜修先生文集卷之二十二終
