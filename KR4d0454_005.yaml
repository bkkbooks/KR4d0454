front:
  text: 靜修先生文集卷之五
  hash: sha256:e7328679bc6c63736d5f0eec2916ebc60c76641f2179a8a4e7b4a0910da7ab43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_005-1a}
body:
  text: 七言古詩三月三日許天祥置酒東城都門氣習豪翩翩此君尊俎今宛然春色今年遲半月留待匆匆過寒節臨流雅唱尋舊盟青眼青天對今夕橫橋綺服麗人天蒼苔坐我羲皇前花枝華髮兩如許天意時情一杯舉安石起舞元龍歌蒼生我竟如渠何飲仲誠椰瓢君家瓠落無所容江湖誰辦平生胸海南佳氣久鬱塞灔澦似喜今相逢前年對酒面發紅今年對酒氣如虹江山萬古騷人國跬步便與華胥通河間古儒病我拘聞我一飲喜氣濃平生得意南湖張此意頗與河間同太古窪尊老無底一朝傾倒何由供醉鄉千年有此客鳥歌蝶舞春𪷟𪷟醉翁之意不在酒宛如琴意非絲桐太和風景無酩酊洛陽樓閣高玲瓏泠然仙馭一杯水眼中渺渺無極翁西家伯倫瞽且聾東家醉死王無功酒中醒境渠未識氷壷秋月崑崙峰舉杯喚月來胸中人間白日浮雲空五嶺山高雲幾重朱崖滅沒南飛鴻玄鶴翩翩渺何許操瓢徑訪眉山翁河間謂趙君玉南湖謂仲實泠然仙馭一杯水見潘延之和茂敘憶濂溪詩洛陽樓閣用堯夫空中樓閣事熙明殿古墨宋度宗江南賜姓功臣李吾州奚生墨工爾江南赭盡吳山松吾州老樹搖晴空君王弄墨熙明殿不覺江頭度白鴈劫火猶解愛庭圭吹送山家易水西松風含哀生硯滴似訴優遊解亡國只今誰有哀江南寶氣不受鵝溪縑早晚扁舟適吳越為君揮灑天門雪元章論書帖曹家豪猛見丗變寥寥鐘鼎今幾塵古人胸次無滯迹意外蕭散餘天真愛書愛畫即欲死狂絶俗絶無此人臭穢功名皆一戲渠言夸矣君勿聞霸陵圖霸陵平生有詩境黃閣何物為清風鄭五自知非相才獼猴枉畫凌煙中作傭莫作詩家傭百為淡苦誰汝供古人星露尚有戒况是風雪來無窮襄江明日蒲萄暖斜風細雨船頭轉門前暮雪吾不知坐上春風人未逺友人送枳术丸心胸未試黃昏湯無食何用求檳榔書生但苦湯餅睡巴椒慘慘無鼠腸舊聞易水仙翁術緑荷包飯圎枳术南州故人持送我但欠黃雲數千斛笑撫青囊時一鼓健啖何由酬此腹送徐生還鄂併序江夏徐生東湖故家庚申北渡客燕趙十七年而宋亡其子姪書來迎之而還蓋前人所謂黃鶴歸來疑城郭之猶是浮雲一去惜人代之俱非者也諸公賦詩以道其行命容城劉某序而倡云燕山送客歸南州興來每恨無扁舟君歸為我謝江漢思君不見令人愁千里風煙想瀟灑一代英雄成古丘當年才氣鸚鵡洲拊掌笑殺黃鶴樓黃鶴歸來哀江頭江山依舊人悠悠浮雲萬古恣變滅眼中擾擾何時休紫陽仙人歌逺遊飛蚊起滅三千秋為君揮手崑崙頭紫陽謂晦翁飛蚊起滅見逺遊集注明河秋夕圖明河淡淡縱復橫行雲悠悠度踈星鳳媒不來烏夜驚瓊枝玉佩遲所託畫中隱隱聞機聲秋來秋去今猶古此恨不隨天宇青崑崙西頭風浪平辦我一舟蓮葉輕浩歌中流擊明月九原喚起嚴君平人間此水何時清趙生水墨虎南山鬱鬱煙霧濛北山落日薄幽叢先生眼花臂猶健聞虎有真心愈雄聲絃寄目黃蘆東人言此是高堂中仰天大笑出門去時危慘淡來悲風美人美人姢姢秋水隔煙霧深沉蒙玉質目逐晴波去不歸遙山只有行雲碧碧雲日暮心悠哉窗前一夜梅花開平生自信心如鐡一寸相思一寸灰仲誠家藏張蔡公石女翦製香奩絶巧持以求豫詩靜華墨君天下竒陵川仙人為賦之遺山野史誇慧女萬古春風蝴蝶辭豈知此巧復絶代夜月靜拂天孫絲夢雲絲雨有形外郢斤庖刃無心時蔡公凛凛褒鄂姿諸郎畫戟清香詩香奩秀發亦餘事詩人飢眼省見稀敲門青燈爛紅碧布衾驚走惡睡兒破屋猶疑翠鯨怒短褐誰憐紫鳳移東家健婦把鋤犂西家處女負薪歸哀哀正念誅求苦對此無言空淚垂金太子允恭墨竹黑龍江頭氣鬱蔥武元射龍江水中江聲怒號久不瀉破墨揮灑餘神功天人與竹皆真龍墨竹以來凡馬空人間只有墨君堂何曽夢到瓊華宫瑤光樓前月如練倒影自有河山雄金源大定始全盛時以漢文當丗宗興陵為父明昌子樂事孰與東宫同文采不隨焦土盡風節直與幽蘭崇百年圖籍有蕭相一代英雄惟蔡公一䇿書紛紛少顔色空山夜哭遺山翁我亦飄零感白髮哀歌對此吟雙蓬秋聲瀟瀟來晚風極目海角天無窮黑龍江見金史幽蘭軒義宗死所汴亡張蔡公以金實録歸遺山嘗就公謄録此軸亦公得于汴之中祕者公之子仲仁持以求豫詩故終篇及之阿寅百晬南湖風鑒不多可詩中驚見阿寅名朝來抱來聚星亭神涵秋色啼古聲都山張氏丗有賢斷崖近得唐碑銘乃翁寂寞老窮經阿敬健筆敵中勍循還無間豈終晦開物有期須一鳴老夫自任河汾教先與虛席待此生蠡吾王翁畫像併序蠡吾王翁丗為農家多蓄粟金源貞祐𥘉宣宗南渡河朔大飢翁于是發之全活者甚衆時鄉豪在所皆自樹慕義者咸欲推翁為首翁不許挈家避地扶溝餘二十年而汴亡天下蕭然蕩為丘墟翁家獨無恙而歸子孫讀書不求祿仕三丗皆以壽終殆不偶然也翁之曾孫天輔求豫敘翁之行義於其畫像謂庶其能聞之名士大夫而有以發潛德之幽光也北門翠屏雷破山畢逋頭白五馬遷乾坤運會到血肉有欲脫之誰飛仙河朔諸州尤可憐有飢以來無此年鄉閭嗷嗷翁哺之翁囷有底心無邊諸豪推倡彼亦義亂丗性命翁能全教子讀書不求官歸來素髮家山前天理不隨陵谷變坐看老樹生蒼煙只今圖畫對翁像回首兵塵一慨然誰能生死太平日白石共煮西山泉張元帥寶刀土不産金人氣雄真人握鐡開鴻濛不知此刀何所得風雲餘烈來霜鋒將軍聲名今蔡公酒酣過我歌􅊮弓持刀對翁兩竒絶眼中已覺南海空木波江聲浩無窮朝礱夕淬天有工回鶻健兒覷天巧前身鐡精非凡庸紫煙熖熖天為紅􅣱紋秀發青美蓉寶環搖落初開封四座如著清水中天山積雪聚鋩鍔寒色直欲朱崖通摩挲神物三太息此行善保千年功山行見馬耳峯近山豪士少羈檢酒澆不下胸崔嵬逺山靜女亦間雅尚恨少有傷春懷亂山米聚爭拱揖武卒侍婢皆凡材天知老眼不受塵路轉忽覩雙峯開雙峯何年聳雙耳叱之不動煩風雷今朝向我效神駿翠色欲逐神鞭來浮丗浮名酒一杯我欲駕此觀蓬萊只恐日暮三山上黃塵回首令人哀雪浪石邵家水陸説影像一物自可涵無垠滄浪仙人歌感應石中固有此理存老坡胸中如此幾磈磊須得銀河噴嘲嵩唾華天不嗔武夷赫怒張吾軍偶從北海得生氣竹石也愛風姿新我來正當秋雨霽一杯冥漠玄都門小璫好事如先臣坐令平地石生根渠家兒戲解亡國作詩一笑君應聞王君奉命賑濟彰德過豫求詩十年監官窮到骨一簿武邑如登天巧宦紛紛日九遷白髮青衫獨可憐昨朝讀君阜民篇善察物情亦巳賢南郡飢民想更苦以君賑濟非偶然驛傳星馳乃爾急何暇載酒揚雄玄茅容問稼當有語野夫憂國願豐年同仲實南湖賞蓮醉中走筆湓江紺寒風露涼安得置我濂溪堂音塵縹眇芙蓉裳百年得此南湖張舉杯人勝景亦勝有蓮以來無此香蓮香隨酒來詩腸得句驚起幽禽翔幽禽隨人作殢態意欲和我風雩狂人間一味清到骨兩足暫付吾滄浪螟蛉蜾裸卿且去醉眼太華雲間蒼明逺堂賞蓮醉賦畫堂香逺凝清秋宛如坐我南湖舟主人愛客情亦重謂我無語花應羞荷香繞筆詩自健滿𥿄巳覺清江流平生老氣回萬牛為君傾倒元龍樓舉杯喚起謝安石我醉不省蒼生憂玉簪春色醉人人未醒誰憐月露秋零丁昭陽日影巧相避寸心未減寒泠泠只應得我一顧足為君小醉秋風亭蓮兄君子菊弟隱何地處君君意肯玉簪玉簪誰與簪蒼苔踈雨秋欲深緝熙殿硯宋理宗使君持送緝熙硯捷音才到山中人四十三年如電抹此硯曽經秋復春寂寞經筵勸講臣詩酒宫中樂事新文章只數中天月萬卷何曽筆有神宋徽宗賜周凖人馬圖筆底金鞍有蕭爽誰云不博降王長汴梁門外若雲屯畫本相看應自賞十載青衣夢故都經營慘淡欲何如只除金粟呼風鳥曾見昭陵鐡馬趨雪翠軒觀太寧火吾家雪翠天下白銀河無風月無色天關不閉寒崢嶸箕尾晶英凍欲拆帝遣六丁下取將敕賜銘軒換金碧初如紫電蟠青雲飛下人間作堅壁漸如扶桑六龍出萬縷丹霞吹海立何人辦作女媧氏補天重煉蒼蒼石陽能兼隂今可知祝融若并玄冥國正教蕪穢洗欲空誰為千年棟梁惜殺機如火出至微熖熖寧知有今夕軒中高卧劉更生願借餘光照方册方册有道出黃虞今古煌煌天與極火耕明日千萬斛酒甕巳聞春雨滴不妨一飲盡郡山醉暈春生半天赤南溪行老人耕牧南溪南南溪草淺牛所貪大孫攜書小攜酒青蓑為席樹為菴以書教孫仍自讀隔溪遙聽聲喃喃牛眠樹隂孫勸酒老人未醉意巳酣老人氣高軀幹小面狹於髯森若杉年周甲子辰又浹丗故十率八九諳早歲精勤傳丗業口誦太素手弄苷以藝發身寧久屈安車徴起詔使監入為天子侍從臣龍沙萬里嘗陪驂鼎湖白雲望不極招之歸來山有嵐身出夢關涉覺境人間萬有皆空函侍從之名不復記老人自署南溪銜呼兒來前雙玉立曰我愛汝擇所堪自我中年學讀書方寸若有神明鑒活人之功豈不美一有不中中或慙青囊祕封不再展塵迹從此乃一芟讀書力田兩交進囷有所收心有涵開此樂國自我始繼而大之在汝男我今巳成齊變魯汝等當為青出藍東北一舍容城翁今年卧病家山巖其室雖邇人甚逺汝糧自褁簦汝簷雪中欵假來扣門僕僮汗流扶酒甔侑尊有物隨土産厥包雜進鴨與䳺飲劇談發不自禁四鄰驚走來窺探先生靜默如土鐘扣之愈大聲愈韽今朝音吐瀉河漢老人者誰開其緘斥之令去不復語興亡萬古手與談空鈎意釣不在棋淡然相對如禪龕老人思家不可留二兒扶歸杖几參臘醅開時魚可膾相約載酒遊溪潭煙霞觀雲巢松盤柯盤屈今幾時龍攣虎跛森英姿道人眼中無可怪一巢見餉吾何疑我所思兮潁與箕秋聲蕭蕭吹送之清風一枝雲一席松中之樂天不知靈臺方十有君節虛籟萬古絃吾詩歲晚相期君與我笑拊吾髯盡此巵白鴈行北風初起易水寒北風再起吹江干北風三吹白鴈來寒氣直薄朱崖山乾坤噫氣三百年一風掃地無留殘萬里江湖想瀟􅎈佇看春水鴈來還宋高宗題李唐秋江圖秋江吞天雲拍水濤借西風扶不起斷雲分雨入江村回首龍沙幾千里淡菴老筆搖江聲髣佛阿唐慘淡情千秋萬古青山恨不見歸舟一葉橫靜修先生文集卷之五
