front:
  text: 靜修先生文集卷之九
  hash: sha256:995381fbeee81a4bb1feb511de2b66da0b119be211f2cc4377e28872516b8b7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_009-1a}
body:
  text: 七言律詩有客門前有客通名姓一别十年記憶無􅁂髪俱驚各衰白行藏巳渉幾榮枯急呼滿酌辭醅軟聊用親甞􅀘飯麄深感故來兼乆候送歸雖病不湏扶雨夜夢覺呼童問幾更未譍先作不平鳴山深六月有秋意夜靜滿城惟雨聲四海虚名此身愧百年浮丗寸心驚誰敎簷溜如愁思欲断還連直到明現前萬事除無取現前此身隨處可周旋居南懷北豈安土巳夏願春非樂天誰謂包􅆂心有外我知彌滿道無偏洞觀今古平平在賸盡區區智與權上塚郷隣見戲􅀃兒童日日相邀社酒紅故國無家仍是客病軀未老錯呼翁里胥驗帖徴游户縣長聞名謁下風欲向溪南訪喬木不禁煙雨正空􅄥桃花菊東籬元不是天台誰挽春風到酒杯丹藥有靈能換種黃花從此不湏開已經晚節霜􅂊識不是寒香蝶亦猜老眼淵明不今古幾回春去復秋來夏日幽居二首隱几青山意獨長回看人丗易炎凉㘽培得力江陵橘薄悪傷心陸氏莊莫就一時論絳灌要從千載到羲黃人間何處莵裘好擬問希夷買睡郷閉門終歳澹無求雲雨人情亦可憂斗酒難酬滿車望杯羮直結殺身讎平生幾緉謾多苦一日百錢姑少休山鳥不鳴林影靜卧看蛛網罥蜉蝣夏日飲山亭借住郊園舊有縁緑隂清晝靜中便空鈎意釣魚亦樂高枕卧游山自前露引松香來酒盞雨催花氣潤吟箋人來毎問農桑事攷證床頭種樹篇午睡閑中何事不清妍鳥戀花隂伴晝眠䆫外雨晴山有暈枕邊風息樹無絃面前多放寛平地方寸嚴臨咫尺天萬古羲皇有餘意不妨分我百來年新晴小雨新晴草色蘇家園生理未全踈埋盆欲學魚千里試地先㘽芋一區時與老農談稼穡不因閑客罷琴書乾坤妙處無人㑹卧看墻隂雀哺雛醉梨白雪春香洗未殘玄霜誰遺凍成團漆封圎顆盤增滑􅁡和濃漿齒避寒緑蟻從今忘病渴金花無地著餘酸快人風味依然在莫作㝷常軟熟看送人官浙西江海十年幾戰酣劫􅁅飛盡到耕􅁞亂離文物想猶在凋弊徴科恐未堪眼底興亡即今古胷中形勝欠東南因君漸有扁舟興佇待清風洗瘴嵐九日客至有人車馬訪柴桑怪見寒花滿意黃莫對青山談丗事試將華髮照滄浪淵明不與白蓮社程子猶憐緑野堂他日燕南話耆舊此回風味亦難忘贈趙丈八十詩併序趙丈字澤民金義宗初年應律科中天下第一授商州知法㝷除左部檢法遷新息令北渡客順天中統初擢爲左三部司正致仕景州判官爲人樂易寡黙甞與先人同應眞定宣撫司辟召故予以父執事之今年八十餘里人好事者榮其壽諸公爲賦詩而求予倡焉律學專門自可疑更從報施論心期干戈留在三章法松菊歸來兩􅁂絲再拜通家惟此老百年渉丗亦吾師平生辦作耆英序慚愧胷中壽域碑九月晦日過鎭州宿趙徴士黃極道菴慘酷姦訛禍丗親翕張無復見眞淳藏來龜六終留殻調中狙三巳自塵符藥眞能度衰俗漁樵却恐有幽人摩挲石刻皆名筆庭下寒花不似春菴取象藏六􅀉張之傑便擬庭闈捧檄過直湏隨俗苦􅀭波一瓢有樂誰云細三釡無􅂬亦謾多戰國遺風餘管樂南朝清議尚王何見人時様知吾拙獨誦滄浪太古􅁔黃精地黃合釀名以地僊酒僊家名品對嵳峩誰信幽人用物多酒面白雲招我在杯中華髮奈君何西山秀氣斸欲盡易水寒聲釀亦和未望天行望千歳舉觴當和紫陽􅁔雲卧天行非予敢議守一處和千二百歳晦翁調息箴也席上分賦二杯二首隴鳥回頭意若何刳腸欲我鑑紅螺微茫山色詩㾗在灔澦灘聲飲興多聖處巳分糟與蟹醉來惟見酒成波千年醒殺江魚腹應恨生身向汨羅右螺希夷尊俎永相忘混沌鑿開見此觴金橘有天容逸老青田無地避餘香雲中招飲留仙掌物外㝷眞得醉郷試向峨眉問啼鳥人間紅雨幾斜陽後蜀紀刘光祚進桃核盃云得于華山陳摶邵康節謝人恵希夷尊詩有仙掌峯峦峭不收希夷去後遂無儔能斟時事高擡手善酌人情畧撥頭之句右桃張氏西園水府生煙晚更蒼翠隂含雨暗生凉人間豈有赤松子天上應無緑野堂一日平原驚客散千年郭隗又臺荒誰敎老樹夕陽在留與慿欄遣興長示彩鱗相思擬話百年情燈火直湏幾徹明繼志未論班氏史隆師何用鄭公名人門忠孝寧無責學術淵源先有盟欲􅀉君詩仍感泣野夫能有幾門生除夕莫道春風室罄懸試看􅀌影伴頽然浮雲往事空千変清鏡明朝又一年頭上無繩繫白日胷中有石補青天幾時能了西山約六角黃牛二頃田秋郊行過青林徑欲還誰家茅屋在林間雲初湧出半含雨風漸吹開微露山丗味甞來知􅂴貴物華老盡覺秋閑天敎勝境爲詩敵未許幽人穩閉關薔薇酒顔色酴醾茉莉香琉璃到手㑹湏甞一盃滄海泡成幻萬古花菴醉有郷凉冷併收天水碧輕醇猶帶女眞黃錦囊盡貯春風在别是僊家不老方服食家有餌薔薇法送董巨濟㝷親花繞東鄰竹馬鞭春隨西舎板輿肩白雲尚在棲遲地彩服俄驚喜懼年樵爨定知生處楽兒孫多向老來憐阿翁别後還家夢比擬思親恐未偏賈氏溪堂澹澹春波逺更宜丘山華屋緫成非來今往古年華在厚地高天人力微丗上紅塵無此客杯中明月有清暉燕南盛事君湏記曾爲東湖盡醉歸望易京亂山西下鬰岧嶤還我燕南避丗謡天作高秋何索寞雲生故壘自飄蕭誰敎神器歸羣盗只見金人泣本朝莫怪風雷有餘怒田疇英烈未全消七月九日往雄州秋聲浩簜動晴雲感􅁣悲歌氣尚存灑落規模餘顯德承平文物記金源生存華屋今焦土忠孝遺風自一門白髪相逢幾人在蒼煙喬木易黃昏水門菴池煙林影澹無姿物外高寒兩石磯雲水流行寧有跡乾坤俯仰自相依波􅆂晴景動猶靜鳥戀幽人去復歸回首塵縁吾未了靈風且莫故吹衣答或者以所註孫子見示二首學術兵農豈盡無規模如此亦區區權書不免增多口霸論誰教混一途親手申韓如果有許身管樂未全誣千秋萬古中庸在留與橫渠作後圖邵公武讀書志有横渠少年註尉繚子一卷誰遣歐陽筆有神微詞端不赦堯臣樵夫見笑寧無愧童子羞稱亦可人但得躬耕全性命猶勝偏霸在風塵蒭蕘一語宜深聽樓上元龍且莫嗔溪光亭看雨萬山齊擁白煙來木杪先聲失怒雷海岳奔崩换毛骨乾坤收斂入肧胎龍公所藴有如此塵丗一清何壯哉坐看神功空束手夕陽華髮對蒼苔避暑玉溪山風露撩人儘力清也應知我到禪扃秋聲滿谷有生氣山意帶煙成逺形皎月欲升天失色白雲􅀄出樹留青他年若訪經行處合有先生避暑亭飲江漢白高亭飲興動江山爲捲灘聲入坐間糟麴眞能釀滄海魚龍直恐盡神姦襄流謾􅀃葡萄暖僊國曾分玉液慳聞道兵塵埋楚甸一杯誰與洗愁顔郷先生漢韓太傅嬰墓章句區區老益堅百年軻死巳無傳四詩今併毛公廢三䇿聊存董相賢祀典曾聞郷社在荒墳重爲里人憐絃歌燕趙今誰見高詠周南獨􅁣然玉柱􅀟清香二氣元從太極分浮雲起滅見來眞白虹貫日豪華散砥柱中流意象新方寸有靈􅆂大塊頭顱無物隔蒼旻藍田萬里煙生玉禾辦晴䆫半穂春心無外躰無間吾薰炉銘也對菊迂踈不辦一身謀􅁂髮空􅄈四海憂􅀞本流民今復見詩家逃屋爲誰留黃茅安得千間厦白布空歌萬里裘政有南風曲中意可能獨醉菊花秋西湖水竇深藏十畒煙賣書直欲買魚船數椽破屋巳自足四海虚名良可憐醉後不知清露下興來擬共白鷗眠濂溪謾有當年志老去而今只愛蓮玉乳峯亂山如擁欲爭先惟許􅀌峯入馬鞭舊見劒光曽犯斗誰敎箭筈亦通天只應絶頂千年石中有齊州九􅀧煙安得凌風乘此去東游滄海看桑田積雨萬象何爲入杳㝠懸知物外自高明前年憂旱有今歳半月閉門如一生捧日謾勞中夜夢補天誰識寸心誠隂雲政使高千丈坐受魚頭恐未平溪光亭小憇尋凉隨水到溪亭十里緑隂慙鳥聲自惜筋骸恒丗故豈知風露巳秋清白雲似與山爭秀落日放敎川盡平六月農家猶赤地登臨舒嘯若爲情都山劉丈九十詩卷感事還悲􅀒米身此生無復九齡親干戈誰共知年喜天地獨全愛日眞只擬商顔亦秦􅁟豈期唐水尚堯民胷中壽域平生在開卷題詩覺有神秋夜巳喜山深稱野情每慙無物慰諸生書貪日課不時睡雞爲誦聲長早鳴病後端居信張詠靜中未發有延平誰知今日絶絃意却恐人間知此聲憫旱農父看雲淚亦乾靈湫誰信欲生煙萬金良藥汗猶出一寸丹心天可旋未便無食思樂􅁟不禁憂國願豐年爲占河漢中宵起獨對殘燈理斷編過徐橋老岸石欄􅍼色分只疑身是入山雲十年往事不回顧百里清泉如可聞人丗誰敎有長路坤靈終亦化塵氛興亡更遣陂塘在幾欲悲歌酒未醺宿龍宫擬欲題詩贈白雲且傾濁酒洗塵氛閑將談笑論當丗却喜稱呼是隱君天柱舊曾分户帖神林今又有移文夜深長鋏悲歌罷此曲山靈恐未聞過東安趙宋先塋五李風煙􅃤晝霾渠兒有志亦雄哉累朝禪䇿皆虛器千古黃袍又厲階文物漢唐今巳盡史編南北更堪哀荒墳一品知何處猶遣石麟草半埋秋夜坐困沉思強起行虚庭凉露下無聲爲爾寂寂人莫笑不肯碌碌君何成萬古興亡天亦老百年身丗夜難明情知不爲學仙去也欲蓬瀛􅀉此生洪元宫明日擬到天城樹邊平野接晴霞脚底清江走白沙方外道人留客住門前塵丗倩山遮自慚爛賞無多暇更有行􅌪第二家煙雨兩陂皆古木興來便作上天槎哭王之才編脩草草離觴記去年誰知此别是終天傳雖成癖今安用史未爲榮應自憐四坐高談宛猶在一經白髮竟無傳交朋日與來書少不過西州亦泫然張仲賢宣慰淮東過子山中臨别贈詩庸見定交之意云昨夜相逢終夕話今朝送别百年情丗縁盡付禪心在官况併隨詩境清此日救焚猶有望他年勇退豈無盟知君苦愛希夷老莫厭山深不􅀉聲白海青扶餘玉爪舊曾聞青鳥猶霑海氣昏掌上風標有如此眼中神駿更憐君平蕪未洒頭鵝血春水誰開獵􅀐門過應昏鴉莫回首霜拳高興在空雲城樓待雨雨入江樓勢欲吞雷轟何止語難聞未憂彼岸將爲壑只恐吾山盡化雲風伯爲誰能却敵物華依舊歎如焚百年人事今如此猛拍欄干怨夕曛憇謁山寺石田霜落晩簫騷一徑禪扃亦自高九萬里風安稅駕三千丗界等秋毫山哀似苦天相􅇁秋老不禁詩大豪西望􅀟龍有高隱結菴終擬近林臯唐張忠孝山亭故墓斷碑藩鎭記當時杯酒談兵少牧之山色何曾間今昔人才初不限華夷水波風起心猶壯木杪秋生􅁂已知莫更候雲臺上望武陽禾黍亦離離武陽故臺仁義徒令此舌存轍環初不救紛紛天公欲爲秦漢計野色更無燕趙分滿眼兵塵餘故壘一聲樵唱入秋雲擬乘碣石觀滄海易水東流去不聞次韻答范陽郭生黙坐誰窺樂境深無絃初不用知音曲肱睡起亦何事弄月歸來徒自吟多愧􅀉書勤訪道未嫌傾蓋即論心西山百里平如案欲認東州煙雨侵登武遂北城神州英氣鬰高寒臂斷爭敎不再連千古傷心有開運幾人臨死問幽燕平生卧榻今如此百萬私錢亦可憐咫尺白溝已南北區區銅馬爲誰堅靜修先生文集卷之九
