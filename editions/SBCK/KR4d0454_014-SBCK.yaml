front:
  text: 靜修先生文集卷之十四
  hash: sha256:bd0c46e489474686efbb111601197a3f032be1f2dc61e42a32c90119a052b3c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_014-1a}
body:
  text: 七言絶句書事五首當年一線魏瓠穿直到横流破國年草滿金陵誰種下天津橋畔聽啼䳌卧榻而今又屬誰江南回首見旌旗路人遥指降王道好似周家七歳兒朱張遺學有經綸不是清談誤丗人白首歸來㑹同館儒冠爭看宋師臣風節南朝苦不伸泝流直要到崑崙丗宗一死千年欠此是黃河最上源唱徹芙蓉花正開新聲又聽採茶哀秋風葉落踏􅁔起已覺江南席卷來登楼絶句􅀝遍欄干十二楼卷舒風景入兵籌南山自古爲勍敵秋色終當讓一頭雪嶺遇雨天爲西游餉我晴野花林鳥效平生今朝雪嶺􅀄逢雨應是郎山戴㡌迎土人諺云郎山戴㡌十日無道寫眞詩卷三首龍祠嶽廟盡􅃣巾雨露何關土木身不是二程窮物理誰從一髮辨天眞彼此相懸一髮邊聖賢廟貌幾十年周郊自有圜丘在莫道金人便是天共􅀃雲雷起畫龍聲容誰道影堂空含糊􅀂信俗儒論巳落三家僣禮中漫題乾坤未覺化機停丗態能逃醉裏醒共見白雲又蒼狗豈知蜾臝即螟蛉顔曾二首陽光浩蕩斂秋容隂景深沉暖漸融萬古顔曽留意象洪爐春滿聖門風剪氷成雪舊知氷􅅮雪成氷見未曽到底春風同一貫要從此地識顔曾顔愚徳曽魯質雜詩五首老兎雛雞自有春氷壷澈底照來眞驢鳴必竟渠皆聽解識天機得幾人水花庭草思悠然風月濂溪有正傳二十四年程主簿已知随柳過前川天敎觀物作閑人不是偷安故隱淪要識邵家風月興一般花鳥華山春寒氣常侵一半春詩家道體􅀃來眞不敎暁入雄雞口誰喚南䆫打睡人湯鼎石壇老眼親隂陽誰見屈中伸年來併識顔家樂十月天敎薺麥春梁甫吟功名且就漢庭多比竟曹瞞累我何汶上千年英氣在有人梁甫正高歌偶讀漫記恍惚天光散亂風向前一蹴是虚空麒麟正要黃金鎖收入簞瓢􅀶約中眞樂攻心不奈何南華風景偶經過憐君日暮不歸去直到􅀝門猶自歌道境道境相看滿面春平生心事數來眞南山正在悠然處未肯回頭錯應人感興七首江山心境儘風神弧矢􅁭期記此身􅀃與求田田舎叟遨游何必故郷春優游千古禍成胎冷雨踈煙撥不開却喜夷吾成霸業又思漢武亦英材天理胷中霽欲流黃浮眉宇酒浮甌生香似見花交樹引得游蜂舞不休霜落江湖水太清巖巖山色欲秋爭爭如一覺南䆫睡門外春風草自榮功名藉口爲蒼生唐漢英風未易輕千載興亡舒卷了區區勲業亦何成斷簡殘編絶賞音誰從百鍊見眞金龍門千古遺歌後更覺良工獨苦心按劒無人誅武后斵捾終恨貸朱梁一杯爽氣迎秋隼何處雲山是致堂畫猿萬古空山只月明畫中依約曉猿鳴幽人未去湏深􅃪一出丗間無此聲山行遇雨無邊暮雨暗前山天意人情豈偶然衡岳自能哀吏部嵩高元不識伊川華山圖水墨驚看太華蒼夢中十載果難忘三峰雖乞希夷了應許劉郎典睡郷邯鄲欹枕圖不見當年夢虎公無端幻術眩愚聾區區政有僊凢異未便壷中勝枕中天命天命無私義理公此身承奉有餘㳟人心可信難盡合親令何由敢勇從夜坐即席分賦燈花瓶聲二首眉間正有喜千丈眼底才消燈一花我自無憂安得喜不湏開向野人家萬丈潮頭落晚江一瓶收拾入秋䆫宫商不在人間丗鼻息雷鳴未肯降霜落霜落清江一葉秋覺來明月滿江樓酒醒人散夜將半花上鳥啼空自愁山寺早起松䆫一夜逺潮生斷送幽人睡失明夢覺不知春巳去半簾紅􅀨落無聲落花光景花中自一天精神楚楚照芳筵朝開暮落君休笑還似人間幾百年答友人見􅀉兩首新詩􅀉草堂一詩曾許􅁲隣墻白雲巳領歸來約只恐山靈不解忘中山道中不許花開一日先征鞍過處及芳妍只應春隨山翁出野杏溪桃悵望邊次人望􅀨韻五月良田種不成蓬蒿無􅀨亦青青䄂中凖有天瓢在自是今年夢易醒李伯時馬足不能行氣自馳天機深處幾人知丗間無物能形此除我南䆫兀坐時中秋無月鎭日暗明此夜隂如何天意異人心一聲長嘯浮雲盡快意金杯莫淺斟答問目執其兩端章不是黃河且勿論只從河水覔通津西至崑崙東至海從頭一一認來眞高卧圖萬里青山卧平地丗間何物是元龍無人語與劉玄德君在青山第幾重孫尚書家山水卷三首扁舟老樹傍蒼崖好似今秋雪嶺廻試問黃塵山下渡幾人曾爲看山來諸公乆矣笑吾貪是處雲山欲結菴只有皇卿解貲助畫山湏畫靜修龕謂皇甫安國畫圖題品代移文􅀉謝神川老使君欲乞龍山恐􅀌絶南州隆慮且平分對碁直釣風流又素琴也􅀿似我對碁心道人本是忘機者信手拈來意自深夷皓萬古人心自有堯直敎夷皓怨難消慿誰移去安歸嘆換作康衢擊壤謡聞角人間無物比悠􅀭誰遣一聲隨夜長餘哀到曉無㝷處吹作南湖十里霜題宋理宗詩卷後已未天王自出師眼前興廢想當時臨江洒酒男兒事誰向深宫正賦詩􅀨中閒雲溪不在燈火幽䆫擬對談十年不到二龍潭白雲欲作山前􅀨􅀿報高僧不在菴送新安田尹扁舟屢訪南溪老驚見田侯拜下風一遇蓋公能北面愛君心與古人同勉齋萬徑千歧各自分北轅適越亦徒勤勉齋究竟將何勉不認途眞恐誤君惷齋莫􅀝惷愚遂自踈保身湏要畏刑書頭邊旣有儒冠在誰爲齋名赦得渠跋遺山墨蹟晚生恨不識遺山每誦歌詩必􅁣然遺墨數篇君惜取注家叅校有他年題崔氏雪竹海棠二軒崔氏溪亭竹樹新分題爲我報詩人而今别有春風在玉立諸孫鶴髮親王君願縱私屬詩卷共賦人形覆載間忍敎牛馬與同欄人情比比王褒約毀劵如君亦自難陶母剪髮横披剪髮英明子可知披圖三歎淚􅀟垂阿娘􅁭量如陶母爭信癡兒到老癡王治中請蠲免回都南連歳水爲災輸輓區區亦可哀驚見流民行復止傳聞昨日治中來題孫氏永慕圖畫其家山先隴所在游宦恐忘丘隴念披圖如對白雲􅀌平生畫卷看多少最愛孫家永摹圖賀廉侯舉次兒子相國當年病且貧乘除天理暗中存青青後樂堂前樹又見廉泉第二孫􅀉楊􅀳州字伯榮二首曾是吾郷舊幕官秋風碧水記紅蓮而今却憶當時事回首驚看二十年南州選舉數三楊中統衣冠半在亡明日朝廷訪耆舊不應白首尚爲郎萬壽宫館舎來時殘雪􅀧征衣落盡庭花尚未歸夢裏不知身是病春衫歸路馬如飛陳雄州止善堂詩卷乆􅀍􅀖君撫養慈野人無路識風姿願將明日甘棠詠用續諸公止善詩朱君挽章送葬曾求薤露辭一家風樹衆人悲十年不廢當時念篤孝如君亦我師踈齋二首漫浪随時􅃪自更要從僻汎到無名踈齋未便常爲主月旦明朝有後評眼前萬事先天圖人力那容巧有餘看盡四傍文理密環中空闊却如􅀄題樹上才脫蓑衣㬠網回芒鞋隨意趂蒼苔忽聞人語還私笑林外誰呼學士來贈狂道士得意雲山是處過逢人對酒即高歌丗人休笑狂夫惡却恐狂夫笑汝多李臨城哀挽字仲温趙郡經過二十春臨城名姓舊曾聞驚看哀誄傷存殁悵望恒山日暮雲長卿兒子阿延百晬二首老年生子吾何願所願常推欲及人但願無災保家外一生長作太平民和子新詩亦解狂詩中名姓莫相忘通家㑹有西山約各喜譍門共父長靜修先生文集卷之十四
