front:
  text: 靜修先生文集卷之七
  hash: sha256:c30099a8d439f34f1d2bcb9a075363b471600e013a07feec97f760f6c81b80e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_007-1a}
body:
  text: 五言律詩除夕百􅀊三分一初心謾􅁣然空囊難避節青鏡不藏年靜閱無窮丗閑觀已定天履端思後日四鼔未成眠晚上易臺遺臺連廢壘落日展遥岑海嶽天東北燕遼丗古今毎當多感􅁣直欲罷登臨莫更留塵跡千年不易禁登武陽朝游樊子館晚上武陽城潮接滄溟近山從碣石生㫁虹雲淡白返照雨踈明且莫悲吟發樵歌已愴情郷郡南楼懷古南比丗更迭江山人重輕澶淵出師詔顯德受降城遺恨幾時盡寸心千載生區區蓼花詠癡計欲何成蒲城道中學館三年夢西山此日行人生两屐足丗累一蓑輕別澗水流合㫁林煙補平誰能分半壑相與結巖耕夏夜院靜復夜靜幽人丗慮輕是非容勿辨憂寵莫多驚萬樹鳥飛月千家犬吠聲夢回無一事惟有紙䆫明重游源泉人丗自人丗翛然物外身滄浪來照影白㡌恐生塵題壁雲封石攀花鳥護春今年風景別開卷覺詩陳張氏別墅惡木推不去好山招未來豈無平曠地當有妙高臺芳草趂隂坐雜花隨意開東南村落近試與問新醅書堂旅夜三首少小抱孤苦飄零重此行迂踈從我好憂戚頼天成夙志存無幾覊懷觸又生寸心同弱草歳晚怯霜清淹留巳半載去住意何深月色一千里愁人方寸心秋聲助揺落生理嘆浮沉松桂清霜滿哀歌動故林丈室不自掃寸心徒爾豪丗途仍險阻風物故䔥騷皓月霜洗淨明河天放高空庭一片石獨坐首頻搔生日四十舉児子明珠掌上稀圭璋􅀩養正朱蜜病防微春露有時降􅀌雲何處飛悲􅂬共今夕餘涕不勝揮虞帝廟二首淫祀徧區宇空山餘帝宫皇靈有天在像設與人同身丗千年後塵埃百感中清泉分一酌毛骨潤南風四顧莾何際威灵儼若臨山川尚淳朴天地自高深鳳鳥千年歎簘韶三月音玄功乆無復徒抱致君心竒村道中此日西塘路乘閑作勝游深深栁成巷脉脉稻分溝白石長含雨黃花不受秋移居新有意試就野人謀城南山人􅂴到骨一出動經秋欲赴城南約如營海外游岸容收潦盡村色帶煙留禾黍歳將晚農家猶未休有客有客談稼穡對人增感傷自言二頃業不􅀶半年粮宿麥得春旱晚田經早霜無功一杯粥俯首汗如漿早行曙色警初動物情無乆閑薄凌護頽岸落月淡空山殘夢失逆旅少休期守關㝷常午䆫雨擁被聽􅃢􅃢白菊僊草尚􅀌潔東籬芳未芳精神渾是露氣勢巳無霜夜月藏不得晩風吹又香天敎陶靖節素髮與交光水亭夏日孤亭耿獨坐一碧澹凝秋氛雜市聲逺空明雲影留傷時仍磊磊對鏡即休休幾欲解維去乾坤無釣舟野興二首乘興閑登眺歸來晝掩扉靜中見春意動處識天機大節始終論全才今古稀平生有舊約常恐寸心違莽莽榛蕪路􅃖􅃖魚肉民乾坤幾逐鹿今古一傷麟眼底人間丗胷中物外春江山滿花桞無􅀒百年身秋望病骨秋偏早單衣露亦寒微雲生水際􅊕色起林端地逈月遲下樓高山易殘輕風吹欲舉醉䄂拂層巒雜詩七首堯山唐故國淳朴帶遺蹤種果收奴力開田享素封採收多上藥景仰近神峯夢寐驅黃犢巖居一老農聞昔蜚狐口竒兵入擣虚人才九州外天道百年餘草木皆成􅀐衣􅃣盡化魚遺民心膽破諱􅀃戰爭初冀北高寒境英靈海岳全斯文若程邵家丗亦幽燕祀典今誰舉遺經㑹有傳吾郷此盛事瞻仰在他年􅀜嶺通山後風謡採路傍地寒人好壽草淺畜宜羊用水如奴婢從川貯米粮西風如有約乘興即吾郷何事招提好山深馬可驅松巢低映㡌竹溜細通厨霜粟千封户雲屏四畫圖冠巾如用我白鹿起規模巖居訪高道少日在風塵回首話前事低眉厭此身江山資寇盗田畒化荆榛領取天倫重無君愁殺人水繞千山合雲藏数畒荒初㝷香有陣漸入翠成行豚穽依危石牛蹊帶小塘團茅奄如畫可惜是逃亡早發濡上寒出防優逸詩情非浩然煙濃山失色雲重雪連天坯户僊游上氷髯老境前别家忘再􅀫桑海問何年偶書擾擾推遷裏誰知不偶然要從人力外推見事機先青白天公眼低昂造物權俗情謾悲喜􅀝伏有他年宿田家偶到田家宿歡迎如遇仙杯盤陳户側妻子拜燈前青白眼誰静炎凉情易偏豈知人丗外還有野夫憐半丗半丗恒棲託􅀌生備險艱寡言非藴蓄􅄶性􅀋清閑生計朝霞上交情暮雨間柴門本無客幽僻况長􅀜重渡滹沱遥臨滹水岸回望土門􅀜秋色巉巖上川形拱抱間分疆人自隘設險地誰慳欲問前朝渡江鷗故意閑恒山樓萬嶺尊恒嶽遺臺枕後潭仰高慙對坐哭險􅀒竒探影落滄溟北雲開斗柄南山靈憐野客今夕費煙嵐登鎭州陽和門百尺市門起重過爲暫停毫分秋物色米聚趙􅁭形北望雲開岳東行氣犯星慿攔天宇在人事聽浮萍辛巳中秋旅亭獨坐分光隂太盛無力掩滄溟大塊供微黒高天失舊青興從愁外發秋向露邊零􅀧數山河影依稀見草亭文章文章費餘力齒髮愧初心璞有連城璧精非百鍊金靜中天地我閑裏去來今鳥散爐薫盡長歌激暮隂一身一身能換骨毛髮散冲融氣變精醇後人生感化中朝陽方杲杲春意正􅄥􅄥百載唐虞德方成比屋功周邵百年周與邵積學欲何期徑路寛平處襟懷灑落時風流無盡藏光景有餘師辜􅀒靈臺境圖書重一披上塜過家來上塚顧影念􅀌蹤春露歡迎失寒泉感激濃千金一毛髮十夢九音容不惜從黃壤多慙未了胷送東海相士青鏡雲千變紅顔酒一巵忘言三日雅觀化百年期烈火誰當救神游亦自竒海山如見問聊舉送君詩􅀉答祖丈先友從游地雍容几杖尊秋風太古觀春日樂郊園妙理欲自得高情誰與論别離空六載期待􅀒知言贈答徐生三年不窺牖城府有山深於道無少得多君肯見臨一杯上池飲千古水仙音爲子終宵話相期勞寸心憶金坡道院平昔多游覽兹游不易忘溝涂春脉脉松石晚蒼蒼有客愛山谷無家名草堂金坡從此號聊著永相望過唐水望堯山神化大無外名山能幾峯威顔渾咫尺天日尚雍容蒲阪堪飢死重華有舊蹤三謨讀未老於此卜巢松哭張之傑義許同生死奪君何遽然無人共清夜有淚葬黃泉苦疾求予禱遺孤託我憐傷心墓頭字旌孝看他年予題其墓道爲張孝子墓宋道人八十詩卷往事枕中記新編柱下言知音有銅狄逸史訪金源春露霑濡際秋陽想像存􅀄逢疑夢寐埀淚拜桓温宋貌絶肖先子哀郭勸農才命不相偶如君良可嗟半生在人下一死更天涯三􅀊同君里前年過我家相望已塵跡零落舊煙霞寒夜肝膽了無寐􅁭懷誰與同更長頭可白燭暗火逾紅硯滴氷生癭星流氣吐虹林鴉先我起鳴噪竟何功閱竇氏名方人從大節論士向絶無求獻可有先見老泉多逺憂方書空物齊耆舊盡山丘矯首候斜日䆫中倦鳥投感范女房望呉中范衣􅃣相國孫風流猶李白樵㸑巳陳雲感事哀龍種慕名重虎賁乾坤厭更迭誰與救紛紛郷人王母九十九十青瞳母寒温白髮孫桑田閱滄海冠帔記金源案上春風橘階前雪色萱移家就隣舎種􅂎易陽村哀徐生去歳登高句霜風秋幾多東籬成惡䜟西郭動悲歌天道憐渠在吾文柰尓何送君紅樹下風葉尚吟哦生且死求予銘爲不朽計東籬事見擊壤集眼醫詩卷火景元中暗月光徒外明每當天抺漆未便目無睛暗自何年有明從底處生若知當告我心事在蟾精禇母節孝詩卷寂寞吾鄉國才難婦愈賢題評慚我後旌表聽人先艱苦􅀄心盡安榮老境偏幽濳天有待留看百來年􅀉彦通吾子今應健山人老已癡迷藏高著眼興廢大觀棊感遇渾非昔忘懷若有思絃歌吾舊隱寂寞暮春時頥齋張先生挽卷與先奉直府君同住金太斈耆舊晨星盡公亡益可嗟先人曾共學稚子與去聲通家白日明心素青山􅀧􅁂華封龍餘爽氣誰與酹煙霞山中憶故人故人南郡去消息乆無聞瑶草止堪種白雲誰共分屋梁驚落月鵬翼賦垂雲歳暮一尊酒高歌如見君何太夫人壽一首近親猶致敬結友合升堂薄俗隨遷變淳風墮渺茫吾人當復古此日得稱觴髙詠靈椿句燕山暮色蒼去歳稱觴後今朝重過庭將軍不好武宅相舊明經拙宦供行樂忠臣見典刑北堂多竹石歳晩亦青青送尹宰百里衡山縣千年陸宰名隣封今見此郷校可無評俎豆欲成趣絃歌漸有聲淶陽吾舊隱聞去亦關情夢採松脂及甘菊棲遲􅀒松菊夢寐得甘馨隱逸喜同臭流膏味獨青人誰借三徑天欲制頽齡毛骨清猶在枕邊霜露零鸚鵡風雨房櫳暗猶疑隴樹昏無愁縁得食有夢想高翻巧語誰自脫深憐未是恩人情多好異渠豈不能言過奉先閠遼承宋統此志亦雄哉置縣名猶在因山勢已摧百年元魏史千古汝南哀華表鶴應有悲風海上來種􅂎法出千金要畦容一席分灌苗身巳健採實夢先勤白􅁄慿誰辦靈厖秪自聞知音九節杖惟有華山雲移甘菊移晚戒前歳植根先此秋親甞杖屨遍嚴課僕童憂小蘂終年計新荑一飽謀區區嘆莎􅁄陸子謾多愁採野苣糞壤自肥膩雨苗絶丗紛炊餘香更美甘出苦難分冝酪法新得輕身方乆聞野人聊自享未敢獻吾君食􅋎白採食陂塘利分甘野老心杯盤收浩渺蘋藻避清深命婢即能識招隣亦見臨吾郷希此味咀嚼有呉音秋日山人乆不出今朝天氣清秋光濃可掬草色翠相迎捫蝨暮山碧敲門新笋生歸來重回首佳處未忘情張監院過有客敲門乆山人與鶴歸論文翻草本換酒當蓑衣暫㑹還成别相歡且莫違明朝誦佳句此望漫依依酒令觴至欲何語令嚴當謹聞茅容惟問稼李白只論文且喜無多客母辭過半醺故人知此老舉白解浮君觀藥爐自戲二首無病不服藥康節語也此懷清更嘉歐陽或有道韓子豈無瑕羸疾嗟子乆名方信彼誇回頭謝鷄犬何日是仙家退之服硫黃一疾訖不痊樂天詩也赤松共游也不惡誰能忍飢啖仙藥已將壽夭付天公彼徒辛苦吾差楽東坡序歐陽子語也地髓服仙草黃精失採花徴永遍親友炊㸑罄樵車屡敗從人笑偶成容我誇側聞僮僕語辛若是仙家旅夜欹枕寂無寐沉思坐不禁靜中天地我閑裏去來令磊磊平生事休休今夜心何方有邊戍雲外急清砧送友生無人慰幽獨之子罷登臨野鶴籠中態翔鴻天外音吾儒關丗運晚節見初心有問山間事白雲今更深名醫張國綱挽卷良醫不出户眞隱要逃名宿草今如此春風宛若生一囊三丗藥兩子萬籝金平昔憂多病懷賢倍有情送成判官釋菜成郷約從君此例新􅂬游渾幾日離索又殘春相愛求詩切臨行枉駕頻幾年人事絶送子爲情親盧斈士按察江東不廢蒭蕘賤狂言試一聽品題停月旦言動律東銘飲少得眞樂吟多損性靈青燈四書外澹泊養遐齡郭判官按察廣右謝病三公􅁺分司五嶺南桂山天下秀憲府百僚叅夜泊防風浪晨征避瘴嵐遥知慈母念先汝過湘潭愓子忠緫管福州燕趙多豪傑楊侯氣自竒風流猶丗胄開爽亦天資尊俎論交地江山送别時閩中有佳政聊用慰相思登保府市閣十載鷄泉隱今朝市閣晴民謠混諸國里號帶軍營瀛海依依見堯山隱隱橫懷仙與思古獨立若爲情烏古論顯之母夫人挽章冠帔金源舊門閳戚里榮鶴悲人丗短銅泣露盤輕往事驚波去新墳宿草生烏啼原上樹霜月有餘清劉仲文挽章并序仲文名郁祈州蒲隂人少從事毫府軍謝病歸杜門不出以春秋左氏學爲業所居里名黃臺因以爲號後仕京師爲將仕郎年六十餘命酌賦詩而終子允今爲太常奉礼郎楚塞十年役黃臺一室春從軍有何樂學道不知貧生子爲名士居郷稱善人死生無所恨今古一丘塵送成從事易水河梁夢回頭巳十春相逢驚我老送别向君頻求贈攀前例將詩認故人故山松菊在歸去未全貧張察院分司臨安餘杭古佳䴡御史重分司甘旨足爲養江山能助詩梅花春早晚潮候月盈虧紏按先從此隂陽恐失宜簜尊宋祕􅁥索賦南國有竒竹天然成酒尊來因交趾使價重祕書門含蓄中誰似堅貞節尚存盤盂古人意􅀚象可忘言􅀉子東太守一夕西山客十年往事非黃塵驚我老青眼似君稀别浦秋容靜離亭草色微殷勤重􅀉謝後㑹不應違示張源堂高餘慶在道重魯齋傳洗眼名家後驚心大學年白頭􅀒風鍳青佩見時賢明日鹿門隱須君拜我前宣慰孫公慶七十詩并序至元二十七年冬與處士張君察院張君提舉郭君都事張君飲教授趙君所工匠提舉孫謙􅁇至察院曰是家古丗官也將甲氏四丗矣今其翁正議公階是爲宣慰使歷事四朝登秩二品有子若孫皆佩金紫開􅀊七十尚躍馬不衰惟爵與齒實一郷之望凡所與游礼冝往慶在吾輩慶冝有詩於是約各爲詩一首言韻古律不拘旣成俾諸孫捧觴􅁔以獻壽公宜每篇爲盡一觴不辭十二月二十九日樵菴序爲仁存丗職得壽見隂功家産千金厚官衘二品隆子孫皆貴顯飲啖尚豪雄五福誰全備吾郷有此公嘉甫從親王鎭懷孟兹游眞可樂兎苑更枌揄孝悌燕南選文章郝氏徒早年多急難晚節足􅂬娱􅀉語賢児姪詩書是逺圖靜修先生文集卷之七
