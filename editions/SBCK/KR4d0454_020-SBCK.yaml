body:
  text: 􅀃唯諾􅀃唯㳟於諾何也曰各有所施也呼之則其音必内故唯以趨赴之若取物而奉之也命之則其聲必外故諾以承受之若與物而受之也失其所施則文理從而亂矣豈但是乎凡物無無對者無無隂陽者而聲亦然其意象之清濁闔闢亦莫不合也姑以進退存亡吉凶消長體之則可見矣此天機之所發而禮樂之所由生雖天地亦不知其所以然者豈但人乎物之聲亦然豈但聲乎凡形色氣味皆然也而况古今之時變事物之倫理聖人何甞加損於其間哉雖然妙此理而宰此事者心焉而巳矣必盡夫心也然後聲爲律而身爲度苟爲不然幾何其不爲無適非道之道作用是性之性也唯諾後􅀃天之聲清而上地之聲濁而下形感而聲出焉理於是乎在來之聲必來去之聲必去事感而聲出焉理亦於是乎在初無心曰天地去來也至於一草一木其聲亦必象其形曰樹有植立之象焉曰枝有散殊之象焉至於曰鵝曰鴨曰鷄曰雀曰鴉之􅀋則又因其聲而聲焉者也鶂鶂所以恊鵝也喈喈所以恊鷄也言語生於有聲之後而其理具於有聲之前有聲之後則古今方域日益不同人惟見其不同而不知其同也知其同則知吾之所以􅀃唯諾者不但􅀃唯諾也授坐而立授立而跪齟齬於其形也當唯而諾當諾而唯齟齬於其聲也聖人之所以制禮者非誠有制也特知之焉爾張濳名􅀃張氏子從予學旣長而更㓜名予命之以濳曰濳乎吾語汝濳夫人之家或未振而有振之者必卓越非常之人也人而未自振思所以振之非挺拔特立蹇蹇自􅀒者不能也尓之家卑而未顯尓之質柔而愿予又濳尓也又欲尓之濳也惑矣雖然尓獨不見夫天地之凜然者乎此潛之象也剛健之􅀄君子自強之始也躍也飛也自潛而來也以儒新而家以道立而身汝之濳也不然渾渾淪淪混于常人以終其身顧尓自能之予又何敎焉仰又有一􅀃我將終敎之大矣而後小之潛也明矣而後晦之潛也不大而小不明而晦固冝也亦曰予潛自欺也濳乎無􅀒尓名憃齋􅀃近丗士大夫多以頑鈍推魯人所不足之稱以自號彼其人未必眞有是也亦非故爲是謙託而然也蓋必有所取焉耳然其所取之義有二焉蓋或病夫便儇皎厲之去道甚速也思欲自矯以近本實於是不得巳而取之而其意若曰與其失於彼也寧失於是此其設心於義爲無所失也或爲老莊氏之􅀃者則不然以爲天下古今必如是而後可以無營而近道保嗇而自全也此則擇而取之非不得巳也而其意則將以自利而巳使前之􅀃行亦不過人人尚質而於丗固不爲無益也若不幸而此􅀃一熾則天下之人皆將苟簡避事而其爲害庸有旣乎嗚呼一事之間心術之微其義利之分有如此者不可不之察也安肅劉仲祥明敏愽物專門禮學以憃名其齋盖將以自矯而非以自利也故予旣爲題其扁復以是􅀃列其左劉某書遂初亭􅀃君子立心之初曰爲善而不爲惡曰爲君子而不爲小人如是而巳苟爲善也爲君子也則其初心遂矣夫道無時而不有無處而不在也故欲爲善爲君子蓋無時無處而不可而吾之初心亦無時無處而不得其遂也若曰吾之初心將出以及物也苟時命不吾與焉則終身不得其遂矣如是則是道偏在乎出而處也無所可爲者矣若曰吾之初心欲處而適已也苟時命不吾釋焉則亦終身不得其遂矣如是則是道偏在乎處而出也無所可爲者矣道果如是乎哉詹事張公子有予知其心爲最深蓋樂爲善而惟恐其不爲君子者也今築亭名以遂初而其心乃在乎閑適而諸公爲詩文以題詠之者以子有朝望甚重才業甚備又皆責其心當在乎匡濟皆不可也夫義當閑適時在匡濟皆吾所當必爲者然其立心則不可謂必得是也而後爲遂苟其心如此則是心境本無外而自拘於一隅道體本周遍而自滯於一偏其爲累也甚矣子有其以吾言思之乆之必有得也至元壬辰重九日劉某書道貴堂􅀃邵康節詩雖無官自高豈無道自貴非以道對官而言也但言道不以此爲有無爾若以爲對則其淺狹急迫非惟不知道之所以爲道而慕外之私亦必有不可勝言者矣河間李生摭邵氏詩名堂曰道貴求其􅀃於予故云皇甫巽字􅀃朱子謂周子之所謂剛柔即易之兩儀而各加以善惡則易之四象也以隂陽之大分言之陽爲剛爲君子隂爲柔爲小人剛宜善於柔也以剛而善則固善矣以剛而惡則不若柔善之爲愈也是君子小人之分不係乎剛柔而係乎剛柔之善惡而巳矣剛之善陽之陽也柔之善隂之陽也然剛柔雖各有善惡而其所謂善者皆陽所謂惡者皆隂是剛柔之善惡又不係乎剛柔而係乎隂陽而巳矣蓋猛也隘也彊梁也隂之慘屬焉慈也順也巽也陽之舒屬焉爲隂之屬在陽亦爲惡爲陽之屬在隂亦爲善此聖人之所以拳拳於陽而扶之人之所以尊夫陽而貴之者也皇甫安國名其子曰巽蓋亦就其氣稟之偏於剛者而救之也旣長誤以予爲郷先生以巽執贄來見而欲予有以字而敎之予字之以伯陽曰巽乎汝剛也亦思夫所謂陽焉汝柔也亦思夫所謂陽焉剛柔惟汝之所適也陽之是趨則予之所望焉王景勉名字􅀃故人王利夫請制其子名王氏居丗與予外家鄰予外祖楊公字勉之實王氏之郷先生也以之名其子孰云不可遂名之曰景勉勉者將以力行也可字之以履而以文配稱焉曰文履至元已卯二月癸未容城劉某書少中李公名字􅀃公之先契丹氏之族也其氏李則逺有端緒而碑誌存焉名則國語譯云鐡也公見國朝諸貴族多因官若名以氏又有從而字之者自以氏李則旣有所承而名字尚未稱其心若有闕焉遂以爲請予名以􅣱而字之伯堅蓋存其初名又本其所自出而就以爲勸焉耳至元庚寅二月吉日容城劉某書嘉氏子字􅀃名人所稱者故多示謙字因名而生義人所稱者故多致尊美之意焉若曰子曰彦曰卿之􅀋固無自稱之理也後丗不之察每毎錯亂故有於稱呼之間或不順者今嘉氏子名淳可字士眞蓋因名而生以致尊美之意也至元已丑冬至日牧溪翁書銘王孝女旌門銘併序女家容城西以母䘮感念遂不嫁終身州上其行御史按實禮部令旌表之内翰盧公署其門曰孝女王氏縣人劉某銘曰孰不娶終身曰魯山之元道州之陽史名卓行何謂非平常二子且然於一女子復奚責望盧公表之何用以戒荒友松軒銘併序緫帥史侯子明種松私第因以友松名其堂之軒友人涿郡盧處道爲請銘銘曰孰賦逺游泰􅀄爲鄰孰廣絶交麋鹿爲群彼其薄丗棲心物外丗固未薄汝薄巳大矧侯貴游於侯何􅀒乃今翻然亦松與友植物之英象斯人賢象則與之而况其眞寛裕樂易孰求此心我將持松責侯來今凜乎風霜巍乎明堂彼實有之予靈敢忘贊神農畫像贊天初生民粒食已成如人育子湩與俱生於赫炎皇継天而已聖德神功止於如此王允中眞贊齒未老􅁂胡爲而白邪隱然含四海之憂􅁂巳衰顔胡爲而壯邪凜然橫千仭之秋竹實丹心砥柱中流百折而必東寸折而不柔其履危犯分幾禍一身固可爲戒然視循黙苟容貽害當丗者寧不優邪退翁眞贊廊廟之姿山林之思惟所謂天下之士故能爲學者所師奚藏諸用而昌於辭有德有言寧卒不施迫而視之非吾退翁而誰郭安道眞贊衣冠自同於郷人而文章名天下言論若無所臧否而風鍳析秋毫安處下僚而人不見其屈力辭兩命而人不忌其高我相英華得其根苗蓋於此眉睫之間又見其所以肖夫先君子之􅂢金購書揮觴結客以倜儻起家爲幽并之豪者也書畫像自警所以承先丗之統者如是其􅀌所以當衆人之望者如是其虚嗚呼危乎不有以持之其何以居祝文已卯春釋菜先聖文聖代天言明告萬丗寥寥方冊孰傳聖言天啓聖心程朱將命堙晦浚闢聾聦瞽明謂當後人承此遺澤孰云剽盗資我而文肆然多歧孰㑹其一徒爲瞻仰有惻此心因早躁狂若將有志中實脆屈未立巳頽揆厥無成實由貪懦時馳意去凜不自容顧念初心怳焉如失今此闢館惟我之求講學有徒進修有地研窮參訂亦復有書於古遺言於今學者尚有禆益少慰此心但懼悠悠復循前軌惟神啓迪實有臨之告峨山龍湫文嗚呼一􅀖之望有峩惟山山之精深聚而淵泉山川惟形有神棲之雲雷雨露神實司之今是􅀖之凶旱極矣豈神之靈坐視而不恤哉蓋雨􅊙之數出于天非神之所得而專也雨暘之咎由於人非神之所得而釋也是以使神􅆂蓄靈潤雖欲發之而不得也雖然山川之神受命于天而主佑下民者也今欲佑之而不得矣則當爲之請命于天昭昭在上安有不從由是言之神雖欲無責烏得而無責也且小民至愚窮且極矣而無所歸誠則惟淫昏之􅀑是求夫淫昏之􅀑乃神之所當屏黜而下民之􅂨亦神之所當誘相也今氣運巳窮矣窮則必通或天降之雨則小民必歸功於淫昏之􅀑而惑信愈篤孰能禁之今是􅀖之大夫致禱于神則是禱其所當禱矣旣禱其所當禱而當禱之神能隨其禱而應之以雨使旣足而又周浹焉庶小民之愚知天地之間自有名山大川之正神實能闔闢隂陽而神妙造化而境内吏民之所當敬修其壇壝㓗其牲幣而事之而向之所謂淫昏之􅀑者眞不足信矣如是則人情丗敎或自此而變之則神之恵又不但一雨而已矣如其不然則是雲雷之澤神其不司之旱乾之虐神實不恤之天命之職可怠而曠之惑邪之俗可助而成之又何望焉又何望焉敢告􅀕文􅀕楊待制文名恕字誠之堂堂文獻金之儒宗得見嗣子如及音容况我先人出文獻門旣丗有契義當公親緫角拜公鷄泉之濵期與莫當凜乎此身後公重來我方南還德􅀌道否煢煢在艱拜書于公義重公顔别五六年移居西湖吾道日窮交道日踈問疾憂貧兩辱公書愛我如斯死别終天不及執紼猶當漬綿矯首東望奈此臞然緘辭寓哀公其鑒焉􅀕參知政事王彦才文維至元二十一年歳次甲申十一月乙亥朔越二十日甲午容城劉某謹以茶果之奠致告于故參知政事王公之靈在公晚年嗣續維重方將慶公公巳告病問疾之舉旦夕治裝公謝勿來公巳云亡孰知此行施行公䘮昔公之西予寓易城百里送公爲公逺行今公此去終天永訣敢不扶疾送公于穴恩禮未酬音容窈然謹此區區公其鑒焉嗚呼哀哉尚饗祭張御史文維至元二十八年歳次辛卯八月乙丑朔承德郎右贊善大夫容城劉某謹以清酌之奠致􅀕于亡友故監察御史張君仲實之靈嗚呼精勤之志俊逸之才􅀶洽之斈清謹之節巳矣巳矣哀哉哀哉尚饗祭郷丈王利夫文維云云謹以清酌之奠致􅀕于郷丈王公利夫之靈郷中親舊所存惟公謂當百年今復已矣􅀌子之際憂患之餘所遇皆傷矧兹永訣嗚呼哀哉哀辭玉田楊先生哀辭併序予平生所與往還通問訊者皆有日録而以時考之庶其有自警者焉昔者有自京師至者曰玉田楊先生甞問子動靜於我又曰甞問子言貌於我或又曰先生謂予過此必識子是以來若是者無虚歳至有素疾予如仇讎而擠毀百至一及先生之門則必幡然親愛予亦不知何以得此于先生也後得先生手䟽訪故人遺文行實而先人與焉予始疑先生之所以拳拳于予者或以先人故思欲一見以其報知而先生殁矣後五年至元丙子其子遇始與予㑹其雅相敬愛猶先生又二年遇謂予曰先人愛子者子爲辭以哀先人莫子宜予固幸其得以遂予哀故不辭先生諱時煦字春卿仙翁雍伯之後甞爲興文署丞㓜頴悟質厚制行不爲崖岸性喜客家雖貧而延致接納無虚日隱居敎授餘二十年名公貴人往往出其門者築一室環種以竹名之曰庸齋或爲圖其象爲野服蕭然先生顧而樂之名以庸齋自適先生之病革也訣其門人李生曰予平生無媿於丗言竟怡然而逝其所學與其所行蓋可見矣而丗特以好客稱之非知先生者遇今爲史院編修官孫肯堂亦好學其辭曰􅿺漓澆􅀆孰可淳賦敦厖􅀆公其人揚尓波􅀆一我存矯獨立􅀆與物春物來納􅀆吾渾淪氣􅀍物􅀆吾氤氲彼巖巖􅀆駭絶倫嗟離物􅀆危尓身彼悠悠􅀆逐丗紛孰有渭􅀆不涇渾庸可常􅀆德有隣微先生􅀆吾誰與親靜修先生文集卷之二十
