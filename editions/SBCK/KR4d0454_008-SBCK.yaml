body:
  text: 七言律詩春隂澹澹春雲暖更輕一身酒力若雲生無人也笑樂所使未醉先休氣始平時雨霑祜或有蘖微風著物不聞聲人生日用本無事閑􅀝西䆫候晚晴秋日有感自恐規模日蹙然毎便孤坐靜無邊仰􅀚俯察無多地往古來今共此天或知或愚能幾里一嗚一止又千年南山正在悠然處目送􅀌鴻手絶絃多病多病年來放盡慵一龕堅定避深冬欲忘言處飲先醉不得意時山故濃只許國人知我陋見邵子無名公序無妨高論笑吾庸見司馬公庸書序西巖近有靈芝種爲謝白雲著意封日午日午雲輕草色蘇出門杖屦自徐徐乾坤俯仰窺難見花柳青紅畫不如靜處規模惟厭小動時文理却嫌踈眼前光景無窮態注盡濂溪太極圖偶成一語未能分付時難言方信到真知道參天地用何小心有羲皇生豈遲後丗直湏要揚子百年即我是鍾期折花笑對滄浪影不覺東風就手吹湖上湖上幽居事事幽卧看書卷坐埀鈎晴䆫閑是長年國暑簟靜爲無􅀬丘心逺何妨在人境室虚元自有天游家人大笑詢生理報我西風咫尺秋十月朔展省後登古城有感手線西風失弊衣高城煙樹掛斜暉徘徊飛鳥不忍去蕩漾滄波如欲歸幾爲霜來驚露往每因物是見人非詩書未辦郷鄰化道德􅀄心恐易違道士孫伯英容城故居并序伯英名􅀖傑丗爲縣之貴族遺山元公爲作墓銘稱其游太學所與交皆天下名士氣甚高見金丗已亂天下事無可爲思得肆志方外以耗壯心而老歳月遂爲黃冠師以終葬亳之太清宫側時年五十一因兒時甞見先君子録其家丗文行之美以示郷人今過其居感而賦詩政敎才氣敵希夷冠帔翻然亦未宜誰辦胡寅論鴻客見讀史管見只除坡老識安期見安期生詩可憐喬木空秋色惟有青山似舊時欲傳先賢問遺事故園猿鶴不勝悲過郷縣西方古故居并序古金大定間人甞舉進士不第遂歸獨居一室置琴書其側不妄與人交縣令佐公服候門亦以遜辭謝遣之有田數十畒食其所穫如菽熟惟食菽郷人好事者欲以米易之不聽曰是天所食者不可易也􅁥察御史按行郡邑聞其行止之不報其爲人蓋亦近於聖學之所謂狷史家之所謂獨行者歟先父每舉以律鄉人之貪鄙者故郷人至今能道之古死無後其丘隴已爲樵牧區今過其居亦莽焉荆􅁄中矣不覺感歎夫發潛德而紀先賢實後生之責也顧力未能焉姑題詩以紀先父之訓云名姓初聞自過庭山田力食老窮經郷閭月旦歸公論耆宿風流尚典刑感事重吟鳧繹集懷賢誰築聘君亭還家游子悲千種念舊思親淚最青登雄州城樓古戍寒雲接渺茫故郷遊子動悲凉江山自古有佳客煙雨爲誰留太行野色分將愁外緑物華呈出夜來霜海門何處秋聲急極目滄波空夕陽夢先隴望望東阡見松桂􅀌雲爲我且踟躇十年一夢等閑過四海此身何慮無千丈春暉空寸草萬山明月只啼烏舊家三徑今誰主羡殺河汾有弊廬􅀫玉泉村先父甞欲卜隱於此怪見清暉逼晚􅁭太行眉宇未消沉徘徊終日不忍去寂寞高盟如可㝷欲向􅀌雲問蹤跡只應老樹記登臨棲遲零落如今此淚盡韋齋刻印心外家西園李花無邊晴雪映柴扉夢裏繁華又一非人與丘山屬零落天敎草樹記芳菲每因寒節來相訪重爲餘香不忍歸里社他年有成約結菴終擬號春暉入山草露蛛絲曉日明亂蟲秋意有先聲屈盤未轉坡陀盡蒼翠忽從懷抱生一徑峯回失南北兩山雲近異隂晴天公若㑹登臨意可信傷心畫得成晚眺巖姿濃淡似吾詩雲􅀧青山學􅁂絲老樹遺臺秋最早斜陽流水鳥偏遲無人能解此時意如我曾來前古誰本爲登臨解陶寫豈知揺落更堪悲山中月夕滿懷幽思自蕭䔥沉對空山夜正遥四壁晴秋霜著色一天明水月生潮歌傳巖谷聲豪宕酒泛星河影動揺醉裏似聞猿鶴語百年人境有今宵惡鳥山中夜夜聞惡鳥惡鳥聲中似訴渠氣運變遷皆以􅀋隂陽對待不相無形聲如此誰憐我天地􅀄生已有子能辦春風長白日願將花柳付提壷五月二十三日登城樓獨􅀝危欄數􅁂毛一簾輕燕晚凉高雲移山影亂初定雨帶風聲來漸豪物外此天才一幕人間何事不秋毫逺遊未盡平生興幾欲狂歌續楚騷曉出西塘塘水隨人緩歩行哀湍激石故輕清太行穠秀霜洗浄全趙規模天鑿成偶爲登臨發悲詠忽從毛髮散秋聲殷勤莫盡尊中酒留到青山佳處傾良辰莫遣閑愁􅀒此身鶯花逐日是良辰乾坤苛癢元關我土木衣冠亦象人大德豈容輕録怨小疵休廢更求醇此中空洞渾無物萬紫千紅緫屬春南樓登臨秋思動郷關展盡晴波落照間嘆老自非縁白髮愛閑元不爲青山幾經分合丗良苦不管興亡天自閑初擬慿欄浩歌發壯懷空與白鷗還野亭㑹飲三首列坐平分草色勻四圍天設翠屏新不可一日無此客安得四時長是春野鶴自成難進狀江鷗不作近前嗔鳥聲似向花枝􅀃好箇羲皇向上人曵杖蕭然一幅巾山夫野老解相親横身物内誰爲我賦象天中彼亦人細數平生無此㑹不來一醉􅀒今春舉杯自壽復自笑萬壑煙霞吾豈貧行樂人生當及辰今朝光景爲誰新林隂薄薄微露日花氣溶溶暖著人春色十分看欲盡鳥聲千種聽難眞東風就手吹殘酒無限青山動翠鱗淺酌淺酌微吟意自眞新詩改罷酒微醺流鶯暗逐春光老獨鶴濳驚夜景分共見白駒如晚景豈知蒼狗是浮雲無邊風月誰無分只恐靈臺未屬君夢鎭州潭園先父舊􅀮昨夜分明是鎭州溪潭先子舊曾游魂來千里太行碧夢覺滿庭煙水秋古淡園林無限意登臨今昔幾人愁當年猿鶴應無恙爭信書郎漫白頭過鎭州太行迎馬􅓹蒼蒼兩岸灘聲帶夕陽霜與秋容增古淡樹因煙景恣微茫閱人􅀊月眞無謂得意江山差自強曾記城南舊時路十年回首儘堪傷井陘淮隂侯廟二首飢僮羸馬倦重游萬將分兵此坐籌滅項豈知秦尚在奪齊便覺漢無憂英彭一體誰遺􅀋絳灌諸孫自列侯愛殺鹿泉泉下水亂山百折只東流許身良犬笑君癡怏怏難勝巳自危知數相推難免死才名如此豈無疑兩年藩鎭眞猶假十載君臣喜又悲最恨當時蕭相國直敎三族到全夷讀漢高帝紀禮樂經秦掃地空遺民洗眼續王風規模自襲挾書律舉錯惟推約法功魯國兩生心獨逺新城三老義誰同只知才到蕭曹盡可信高皇是沛公易臺望中􅀌鳥入消沉雲帶離愁結暮隂萬國河山有燕趙百年風氣尚遼金物華暗與秋光老杯酒不隨人意深無限霜松動巖壑天敎揺落助清吟秋夕大風有感坤輿聞􅀃若行舟乘此眞堪萬里游大塊氣豪知寡和黃紬坐穩覺無求䆫間小草根自賀雲外高松聲亦愁明日西山想清瘦天敎老眼看晴秋盆池自慚眼孔一盆多奈此無邊風月何莫道渾非九雲夢不妨能著百東坡斡旋在手天隨轉虚靜如心景自過誰弄扁舟詫呉越爲言吾老怯風波水燈南湖新緑破春容一炬才分萬炬同共􅀃金膏能有景豈知隂火解生紅魚龍水樂三更後星漢仙槎一色中喚起東坡看清曉向來碧海又青銅方鏡當年玉斧落何方隂魄誰敎擬大陽翻起坤輿看鼇背借來心鏡發天藏衣冠嚴肅知無愧肝膽輪囷覺有芒四海風塵競白日託身分我鑑中凉西䆫洛水秦山夢寐前風流陳邵兩癯僊中峯太華五千仞皇極一元十萬年厮役閱來歸舊隱迷藏畫出稱高眠人間此意今誰㑹卧看西䆫生暮煙有懷飄飄遺丗覺身輕尚友千年凜若生瑞日祥雲程伯子氷壷秋月李延平浮塵滄海人事換晴雪太行眉宇清􅀝杖歸來北䆫下一樽濁酒爲誰傾記夢併序至元戊寅十一月二十四日夢十餘老翁衣冠甚偉以章䟽薦子童中署予爲金文山人而見稱之語甚多旣覺惟記松栢歳寒桑榆晚景之句而毎句之下又各忘其六字遂以詩記之夢中􅀃夢巳成癡更擬從翁問所疑松栢歳寒􅀿有謂桑榆晚景欲何爲名書丹闕非吾望家在金文不自知果有僊山隔塵土先生亦欲住仇池捲簾捲簾雲樹散微明淡似幽人百慮輕眞宰雕􅍢亦良苦洪爐消鑠似無情空巖月出人境失灝露秋嚴山氣生欲寫天機誰領㑹西風吹作棹􅁔聲偶作爲貪風月重登臨感􅁣幽懷不易禁靜裏形神君與我眼中興廢古猶今區區此丗眞何物落落平生只寸心間道江湖好煙水飛鴻滅没有遺音高亭高亭雲錦繞清流便是吾家太乙舟山影酒揺千疊翠雨聲䆫納一天秋􅁭懷灑落境長勝雲影空明天共游笑向白鷗問塵丗幾人曾信有滄洲放歌未湏鵬翼賦垂雲老眼水壷亦自新碧落銀河見高舉紅塵白日屬何人纍纍坐閱秋風客擾擾空悲地上臣左挽浮丘一杯酒吾言夸矣不湏嗔自適乆矣黃塵絶往還惟餘風月到柴關清霜烈日從渠畏野鶴孤雲覺自閑天上銀河連碧落人間秋色對南山高吟大醉堯夫老只有豪誇不易刪老岸老岸隂隂雲樹清紫門寂寂緑苔生空明萬象隨月出水墨四山因雨成千古心期破茅屋百年人事短燈檠道人不是悲秋客聽盡踈蛩夜夜聲丗上丗上悠悠儘自爭眼中隱隱放敎平飛蠅觸鼻人爭怒落葉臨頭我漫驚旣有陽秋暗消長何湏青白太分明蒺藜原上青霜重辛苦十年跣足行幾葉幾葉踈桐萬斛秋四山清露一䆫幽人能知足隨處樂心若忘機百慮休事物閱來如有悟囊箱空慣巳無羞醉中曾聽家人語老子年來不解愁萬古萬古遺編未寂寥一䆫風露晩蕭騷有時陶令羲黃上何物元龍湖海豪鼷䑕千鈞宜自惜蟾蜍寸鐡亦徒勞年來􅀧檢人間事問舎求田計最高老大老大情懷隨處樂幽閑氣味逐時􅄈平生長物不入室一日百錢輒下簾題品雲山寧有諱收羅風月不妨廉客來恐􅀃閑興廢茶罷呼碁信手拈山石山石那容玉獨堅人生磨滅殆天憐畫蛇最戒足無用書馬常憂尾不全誰見虎􅂡眞可捋自慚鷄肋豈勝拳誤人每笑婁師德不領春生未唾前人生人生底用費閑思物理通來盡我師凍雀猶能樂生處秋花元不厭開時齊姜必娶終無偶秦越未生寧乏醫若道求安湏待足百年何日可伸眉夏日即事迂踈爭笑近清狂多病筋骸可預防乆乏園􅂼因種藥不留䆫紙爲抄方閑從鳥雀分晴晝靜與蛩螿共晚凉莫道幽人好標置北䆫自古有羲黃冬日砂瓶豆粥土床煙中有幽人意漫然元晦居山豈懷土仲尼微服即知天閑中作計飽爲上書外論交睡最賢小子應門當拜客病夫便靜乞相憐午䆫終歳柴荆掩寂寥物情多忌恐難逃家居關白惟求省應物寒温亦憚勞陳􅗕只知炊餅大元龍新厭卧床高午䆫葉影風成陣病擁紬衾氣尚豪馬酒漢家挏馬豈無傳力盡皮囊味始全胷次沃焦常八九眼中騋牝少三千百杯誰有神駒氣一幕何分勅勒天彼酪猶能奴命茗南風到此更凄然平昔平昔􅁭期鏡屡看而今渉丗願高年自憐不唾青城地共笑仍憂杞國天履影無傷猶不忍吹虀雖誤亦當然人間萬事思空遍依舊西䆫理㫁編冬日迂踈􅂴散百無能半似田翁半似僧製薬就圍煨芋火檢方聊趂剥麻燈自知豪爽今無復共道癡顚舊不曾閑􅀝南䆫貪覔蝨敲門人怪不時應次人韻樂天方識淡中甜安土無妨著處黏道在市朝皆可隱機忘鷗鳥亦無嫌䆫虚不礙山雲度樹老慣經秋氣嚴丗上閑愁渾幾許而今青鏡滿霜髯中秋天借無雲雨借清月邊凉露滴無聲只知老子興不淺誰信太虚白亦生四海誰當共人影寸心直擬配高明二句夢中得乾坤元有氷壷在回首紅塵意未平人情人情雲雨九疑山丗路風濤八節灘共􅀃長安如日近豈知蜀道比天難浮航莫笑腰舟渡坎井終當繫木􅀚㑹取登高有良法此身何地不平寛温公日登高有法徐行則不困脚踏實地則不危次韻答張夢符侍郎癯然一榻卧成㾗多病人踈自古云執别三年猶念我開緘千里若逢君家聲舊仰遼東鶴才望今稱冀北群每憶琴尊前日雅幾回搔首賦停雲靜修先生文集卷之八
