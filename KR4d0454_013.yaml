front:
  text: 靜修先生文集卷之十三
  hash: sha256:caa9d11a81aa15c1cb93785786c5e3ba46d24f1c738f717f6b117f6ad289bf6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_013-1a}
body:
  text: 七言絶句冬曉歳寒心事在蒲團清曉開簾試一觀木稼乍迎紅日影依稀學似杏花殘可菴莫道無衣不可身更從裘葛辨冬春惡惡不可惡惡可等秤無星恐誤人許由棄瓢圖二首人間極目盡洪波誰引南風入浩歌兩耳區區無著處一瓢孰與萬機多堯天萬古大無鄰何地容君作外臣莫占箕山最深處後來恐有避秦人癸酉書事嬌兒索栗一錢空怪見家人不忍中我不怨天貧賤我吾兒自合享吾窮米元章雲煙疊嶂圖二首筆勢或傳是阿章短屏山影露微茫苦心只辦雲煙好不救人呼作米狂煙影天機滅没邊誰從毫末出清妍畫家也有清談弊到處南華一㗳然宋理宗南樓風月橫披二首試聽隂山勅勒歌朔風悲壯動山河南樓煙月無多景緩歩微吟奈爾何物理興衰不可常每從氣韻見文章誰知萬古中天月只辦南樓一夜凉理宗自題絶句其上有併作南樓一夜凉之句才到中天萬國明宋太祖月詩也題枯木怪石圖物有常形最奈看看時容易畫時難竒峰怪木驚人眼誰信丹青解熱謾探春道邊殘雪護頽墻墻外柔條露淺黃春意雖微巳堪惜輕寒休近柳梢傍酬寫眞者目覺形骸已枯槁何從眉宇尚豪英知君慣畫麒麟像乍寫山翁似手生夢中題吟風亭壁方榮不拆寒爲虐已謝重開兩借恩一種是花元一異多由天氣少由根題秋景扇頭嵐光蒼翠山逺近木葉青黃霜重輕萬里晴秋天著色不曾慘淡入經營月下桂華凉冷渺風鬟灝露一天秋意閑不記醉中呼李白傍人笑道是人間金太子允㳟墨竹二首墨竹猶堪驗一班金源文物見當年博山煙暖春闈靜却笑承乾嗜好偏手澤明昌秘閣收當年緹襲爲誰留露盤流盡金人淚應恨翔鸞不解愁游飲山亭二首十年種木望成隂及至成隂礙山色幾欲斫去心所憐安得高臺數千尺山翁一去不復返亭下幽花空自開慚愧茅簷雙燕子飛鳴猶喜故人來宿山村石邊流水自縈紆樹杪閑雲恣卷舒長怪西山無爽氣只應少我一茅廬里社圖二首賦薄徭輕復有秋天恩帝力爲誰優老盆醉殺村夫子盡道今年好社頭亂後疲民氣未蘇荒煙破屋半榛蕪平生心事羲皇上回首相看是畫圖曾點扇頭晉楚英雄管晏才當時眞眼向誰開狂生攜著魯兒子獨向舞雩風下來獨向舞雩風下來坐忘門外欲生苔歸時過著顔家巷說與城南花正開燕居圖伊川門外雪盈尺茂叔䆫前草不除共識唐虞垂拱意春風元在仲尼居理西齋成朔風裂地雪漫空辦向西齋作蟄蟲有客敲門慿寄語高談方對紫陽翁幽人圖二首無媒徑路草瀟瀟山鬼脩篁夢轉遥手撚幽香意何逺爲誰終日面岧嶤澗響無心和考槃雲容有意近長安野猿窺破中宵夢却恐山靈不易謾郭氏家山圖鹿門煙影接隆中翁媪通家社酒紅只有山童最神駿舊曾床下拜龐公書李渤聮德高蹈圖五首方寸無窮皦皦天豈惟毛髮要歸全臨終一聽曾元語愈嘆黔婁有婦賢天意行藏我自知區區猿鶴亦何爲室無萊婦君休恨免使狂歌誚仲尼江湖魏闕有心期莫怪先生起太遲寄謝移書韓博士山妻元不解啼飢諸生課罷弄煙霞紡績乘閑爲煑茶白鹿高風有誰繼草堂貧女晦菴家萬里江鷗不易馴百年我愛隱居秦歸來匹婦休相笑老眼眞能混丗塵秋山平逺圖南山千古一悠然誤落關仝筆意邊急著新詩欲收領巳從慘淡失天全郭熈山水卷巖姿秋意淡無弦煙影天機滅没邊更着山翁掩書坐只應人境兩翛然憶飲山亭但得酒同張野飲猶勝事對阮生論他年乞我園亭住便喚西疇下潠村晝睡丗事悠悠莫漫驚直消鼻息幾雷鳴高松似㑹幽人意也學齁齁枕上聲客來老懶相逢口倦開山城無酒慰徘徊家僮使慣知人意豫設棋枰待客來啼鳥幾日春隂幾日晴喚來山鳥話平生杜䳌解道淵明語只少鷓鴣相和鳴郝生知林州到處雲山是我詩不愁無物慰相思只從隆慮煙霞色領取幽人笑傲姿謝處士載月圖扁舟西子五湖過謝客西風兩鬢皤一種清江明月底慿君試問夜如何送琴客還池州五首江左衣冠自昔聞紫陽遺學竟誰眞抱琴爲向山中聽林下寒棲恐有人謫僊胷次九芙蓉又落人間劫火中浦思山哀天不管爲絃吾曲和松風過手春風不見㾗曲中悲壯宛猶聞明朝無限空山夜月白風清覺少君人物翩翩美少年不應心事只揮絃書中明理琴中趣更有歸鴻目外天日暮江東有所思未湏千里寄吾詩但看西北浮雲盡是我倚樓閑望時早起飢䑕號多似訴愁破囊空慣巳無羞閑來點檢幽居事鶗鴂聲中又一秋大暑絶句青天只恐還鍊石白日何曾赦覆盆未挽銀河下塵丗欲攜赤縣上崑崙偶書車輪有角丗無用馬足若方人可㝷萬沼千池隨分在只除明月解同心山泉寒溜泠泠爾許清米狂誤拜石爲兄拔山卷地今誰手夜夜南䆫聽此聲即事雲白天青浩不收雨晴山色欲無秋淡煙衰草關何事落日江波空自愁睡起晚醉城南不記回虚簷高枕藉蒼苔酒醒凉意瀟瀟在應是前山送雨來田孝子詩卷比屋春風夢寐前門閭旌孝見今年山林未覺渾無望試手田家第一篇朱孝子割股詩卷二首救本戕肢亦可憐粉身爭忍欲崩天詩書明日良心在應對瘡㾗一泫然便律韓文恐太偏狂童十歳亦堪憐偶從德色耰鋤看重爲朱郎賦此篇鼓城龍湫池龍聞說卧南州一禱曽分一郡憂四海蒼生望霖兩千年誰更傳巖求讀史中才隨丗就功名恰似焦桐㸑下鳴到底中郎惟兩耳人間多少不平聲偶書平生積學連城璧萬古虚名衆口金午睡覺來門巷靜雨晴風細鴿笙鳴雲山晩景圖天機濃淡出巖姿夢境風雲入壯思畫裏青山照白髮行藏渾似倚樓時書田舎壁里胥初過期無事營幕遲來望有年隣舎借醅留客宿土床分席枕瓜眠煑茶細聲蚯蚓發銀瓶已覺春雷齒頰生舉似玉川應有語無絃琴亦是沽名龜蓮圖龜約蓮香上翠盤四靈長向畫中看題詩記我千年恨風月無聲洛水寒祖愚菴家藏畫冊二首敗荷野鴨畫裏瀟湘自要秋詩家野鴨謾多愁試看翠減紅銷處好稱江清月冷舟風柳牧牛逺意升平畫不勝牛邊煙樹渺層層前頭恐有桃林路百喚溪童不解譍讀史漫記眼底權姦漢室空伯喈文舉亦才雄王畿廟號關何事却在區區論建中梅雀扇頭月影波光澹有春秋風草草最愁人慿君欲寄調羮信恐被枝頭凍雀嗔春雲出谷横披筆底天機幾許深雲容直欲見無心苦心只許詩人㑹不爲題詩亦未㝷見梅朔漠梅花到眼中一枝無限是春風江湖煙雨三千里誰識乾坤造化工狂生放曠無端更自神豪誇欺丗語誰眞如何老阮無情甚不願兒郎作大人名吾山亭平生心事與山親不忍稱呼作此君亭自屬君山屬我四時風景要平分宿洪崖觀雲山不受壯心降無限西風撼客䆫應是夜深知月出却收風雨入清江絶句今朝客爲求文至昨日隣嫌借米移木枕質錢多舊帖看囊不必要新詩北䆫看雪背山樓起人呼俗踏雪詩成奴罵狂不俗不狂高枕上爛銀堆裏數峯蒼秋煙疊嶂圖不傳者死不亡存滅没天機尚有㾗曾向煙霏見眞態依然猶是畫家魂次人韻二首花落歸根恐未眞又從碩果強㝷春玄都觀裏桃千樹誰是前身與後身桃花結子更生孫千樹玄都作好春若遇禪家說生死桃根拈與㸑頭薪靜修先生文集卷之十三
