front:
  text: 靜修先生文集卷之六
  hash: sha256:ba180ec7d42a96b1591e4364e219a7ca56a2643b677aab987f7df0f62139a672
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0454_SBCK_006-1a}
body:
  text: 雜言觀雷溪飛狐天下脊老氣盤五回三江瀉天怒合為一水東南來此勢不殺令人愁石門喜見西山開未補青天裂誰鑿渾沌胎竒聲猛狀萬萬古山根幾許猶崔嵬兩山倒傾瀾百丈逢顚崖先聲動毛髮餘爽開襟懷𥘉疑萬壑轉奔石意像髣佛坤軸摧又疑鼓角鳴地中百步未到仍徘徊荒祠下石磴駭目何雄哉春風不到太古雪今日乃得胸中雷穿石誰能窮窟宅流沫勢欲浮蓬萊平生芥蒂今寒灰兩耳到骨無纎埃酈元筆頭天下水石頭之竒猶見推乃知兹游亦竒絶快弄素霓噴瓊瑰東崖一片石坐拂千年苔為招郎山君共捲長鯨杯江妃為檛靈鼓催赤鯶躍出銀山堆先生醉來泉灑面狂歌一和湍聲哀游郎山昨日山東州馬耳索御凌風嘶今日軍市中不覺巳落山之西山之面背一無異不待風煙變化神巳迷危關度雪嶺亂石通荒蹊林間小草不識風日自太古我行終日仰羡木杪幽禽啼但見雨色來雲物颯以凄忽然長嘯得石頂痛快如御駿馬蹄萬里來長風五色開晴霓長劒倚天立皎潔瑩鸊鵜平地拔起不傾側物外想有神物提詩家舊品嵩少同畫圖省見巫山低誰令九華名獨與八桂齊千態萬狀天不知敢以兩目窮端倪騫騰誰避若飛隼側瞰何屈如怒猊千年落窮邊煙草寒萋萋若非酈亭書生此鄉國物色誰省曾分題酈道元注水經說郎山形勢最真今涿郡有酈亭其先丗所居也乾坤至寶㑹有待豈有江山如此不著幽人棲頗聞山中人雲間時聞犬與雞只疑名山別有靈境在不許塵丗窮攀躋不是先生南游有成約徑欲共把白雲犂九疑窺衡湘禹穴探㑹稽玉井爛賞金芙蕖日觀倒捲青玻瓈風煙回首莫瀟灑南游凖擬相招攜掛書牛角圖長安江都搏手空台司光祿誰雌雄大事既去乃爾耳渠頭不斫將安容喑嗚千年楚重瞳將軍視之猶楚公掛書牛角亦偶爾史臣比擬良未同青青澤中蒲秀色自凌空可憐徐包徒學術皆凡庸君不見羣兒驅羊竟何功晉陽桃李亦秋風緱山圖畫有如此何如長作多牛翁浙江潮圖山人懶絶夢亦然鼎如萬牛不可遷誰信畫工筆頭有神力扁舟一夜江聲寒覺來千里雪漫漫中有數點青蛾間人間天門壯觀巳如此豈知大塊喘息四海如鼻端海中仙人氷雪顔吸風御氣非人寰試問濤頭何當還為我寄聲三神山我欲乘興游其間清江曲清江芙蕖玉可憐岸花汀草自年年來鴻去燕不相識曉露無聲香暗泣江樓縹眇如花人望之見之不可親無恨晴雲錦樹新愁眉只向遙山顰遙山一千里長在愁眉底鏡裏繁華過眼空遙山鑄向青銅中遙山遙復遙芙蕖霜早凋明日愁眉為誰掃月白江清天未曉先天漆硯詩併序豫近得漆硯二劉丈茂之所惠者象璧水而先天八卦周焉豫遂名以別之且賦詩以答茂之云揚雄久寂寞載酒誰相過今夕是何夕燭花吐熖浮煙蘿天開氣機動起舞獨婆娑晨光滿壁佳氣集客來怪我衰顔酡袖中隱隱天根雷欲出不出神所訶硯漆未為貴形古天森羅夜月碧落影秋風寰海波茫茫兩儀根日月東西柯環中方寸地樂境涵天和弄丸恣游戲觀物供研磨平生犀韋編退筆如山阿成都墨池自尚玄劉歆醬瓿空作魔今朝得此天所戲令人一歎三摩挲扶搖子安樂􅌪老氣鬱鬱却日戈鞭霆裂月未消歇百年光景空蹉跎冥漠神交恍猶在松風入墨如吟哦東南澤國尾閭瀉西北仰看青山多青山天齊石可磨安得六丁為我隳嵯峨我欲萬牛老筆回江河先生興來不奈何為君醉草太古滄浪歌示孫諧龍山古壯哉欎欎盤煙嵐一讀元子詩泠然玉泉甘江山勝境要佳客而我不到應懷慚雷家髯翁虎耽耽劉氏性理窮河南百年喬木動秋色籃輿誰與供竒探崑山出美玉楚國多楩楠孫郎復貴種良璞須深涵勾萌愼培養雲霄看巖巖野夫老矣一何拙平生只有歸休堪傳經訪道可無愧為我早辦龍山菴靜修先生文集卷之六
